body:
  text: 錢塘沙門釋智圓述德王品之六今皆不然者總斥二家前五下別斥二家至是證斥次家證中下斥開善淺深非一者雖有淺深同明證義次列名下皆引經文明五事多分約理以成深證用斥他師見聖性者即經云因是信故得聖人性直起下經云於諸衆生作質直心作猶起也中懷即心不為緣曲者謂直心不由外緣所動也經云雖見衆生諸惡過咎終不說之恐生煩惱故戒是性成者佛性顯故淨戒具足經云受持菩薩戒得具足戒友全下經云具足梵行名善知識聞於不說者經云若知如來常不說法亦名菩薩具足多聞如此下結意斥古也二信因果者經施有果報施即是因如純陀施食得五常果五信三諦者經信第一義是信中道信善方便是雙照二邊古人不曉故有穿鑿乃作二身二智消之隱顯為異者他謂因人理隱受二智名果人理顯受二身名分別二體者即別體也無施無受者理顯無復果名豈可仍存因號亦復如是者理非二三為衆生故作二三說釋有四意者一堅固二根本三增長四不見如疏次第配釋得聖人性者即初住聖人所顯佛性也彌著去聲顯也照之則深廣顯然亡之則橫竪寂爾遮照體一故竝云彌解因緣故不諂者達因緣虗假故初開經時者指現病品中說三種病人也以在第三顯示涅槃行章之初故云初開若約前章則非初也初中第二者初雙中第二難也經日從中出者從山中東方而出也書云下即論語文也何晏解云溫尋也尋繹故者又知新者可以為師矣通敏者敏達也能主能客者客謂能問主謂能答故楊雄解嘲等皆立主客以為問答昔莊嚴下舉二人明專一事備本傳故注云云五句者即一句生善四句滅惡共有五也取有是新者是現在因故云新無明是故者是過去因故云是故不生生是智德後發故新世諦死是煩惱前除故故暗謝明生雖無前後而義當暗前去明後來以新破新者般若破取有也以故破故者斷德斷無明此乃一往就義分釋為他舟航恩及物故自運舟航報他恩故因緣大樹者過去二支如根現在五支如質現在三支如華未來二支如果故喻之以樹外國亦戰等者外國即天竺也彼才戰勝即竪幢麾麾許為反尚書牧誓云王左杖黃鉞右執白旄以麾孔傳曰鉞以黃金飾斧左手杖鉞示無事於誅右手把旄示有事於教經若能發心至不復名一闡提者以既改先惡則是善人佛據正起惡心的不能發故云不差耳佛性不同善根者佛性是性善善根是修善德王以修性混難故善與佛性俱應不斷今佛以修性分答則闡提斷修善故不差不斷性善故有佛性當知修性善惡出自今宗妙盡教源深窮佛旨古今諸師豈窮其妙故普門玄義云如來不斷性惡闡提不斷性善以不斷性善故緣因本有彼文又云了是顯了智慧莊嚴緣是資助福德莊嚴由二為因佛具二果元此因果本是性德性德緣了本自有之三千即空性了因也三千即假性緣因也三千即中性正因也是故他解唯知闡提不斷正因不知不斷性德緣了故知善惡不出三千彼又問云既有性德善亦有性德惡否答具有問闡提與佛斷何等善惡答闡提斷修善但有性善在如來斷修惡但有性惡在問性德善惡何以不斷答性德但是善惡法門故不可斷一切世間無能毀者如魔燒經卷豈令性善法門盡縱燒惡譜亦不能令性惡法門盡問闡提不斷性善故後時還起善如來不斷性惡故應當後時還起惡答闡提不達性惡故後時還起於修惡不了性善故後時還為修善染是故修善還得起即以修善治修惡則令修惡不得起佛雖不斷於性惡而能了達於性惡而於惡法得自在不為修惡之所染是故修惡不得起故佛永無於修惡自在用於惡法門闡提若能達修惡則與如來無差別故知於善於惡善達修性方曉今經德王約善義同難如來據修性別答極惡欲之邊者以惡極故名之曰邊善巧方便則非無者由住前修得緣了以為方便故於發住顯出理性正因箜篌者風俗通曰箜篌一名坎侯漢武帝祠太一后土令樂人侯調依琴作坎作言其坎坎應節也侯以姓冠章也或曰空侯取其空中釋名云箜篌師延所作靡靡之樂蓋空國之侯所好而今經引喻則西域有之久矣但舉一呵者即經云愚癡之人也是計性義者同外道執因中有果自性之計也經不訟彼缺訟責也歎善自足者歎佛性善也經於師同學等者於師前同學前發露自罪也經不為生天者不為耽天樂也不為恐怖者不為畏三塗苦也不作破戒者不犯四重不作缺戒者不犯十三不作瑕戒者不犯三十已下不作雜戒者不犯定共不作聲聞者不自調自度也此皆惡戒也經得具足戒者達止作法界也不生憍慢者不見持犯相故不以大慢小以持慢犯也必須上定者必得四禪方生色界白骨即背捨禪者以初二背捨內觀骨人故猒穢作背捨易者謂背欲捨著是猒穢義故經尸利毱多者涉公云尸利毱多火坑陷佛毒食藥佛如來于時履火不燒食毒不損彼捨邪見為佛弟子十二文多者合云十一於十二中簡出方廣故二字誤也文少義要者以方廣部直談妙理不涉餘事故十二文言浩博者以十二部通該一切大乘經故故今除前三味兼帶十二部之廣就此經開顯談常之略即是除他經十二部令受持此經十二部也復除全體者始終一經其文尚廣要言妙詞止取四句義該法界如雪山四柱偈等但取常住者四句猶繁但云常住理無不統義無不攝復除常住等者向雖從廣之狹始從十二終至常住皆逐名言未能悟理尚同數寶豈識自心若能達事即理說即無說則涼池坐到寶所匪遠心攝一切故曰具足多聞也損之又損等者周易云以至無損肇云改用今且依之損之又損即前四段從廣之狹也遂至無為即今但取寂默也一家宗教於諸文下皆約觀心豈非承躡有由深符佛旨若不觀心安契寂默法經無性故者以無四性故說即無說法華云知法常無性與此同也不存著者以達法界無性故於難作等不作難想謂不矜其功也儒宗尚云善世不伐老子亦曰功成不居而況大士以法界心為心豈著於功用哉但不能見者本性雖空執之成有故須稱其本理而修於空經色者非地水火風者色即是空故非四大經不離地等者空即是色故亦不離色空相奪故無自性經具足五事者初信二直心等五也經不得現見諸佛菩薩者不得現與諸佛菩薩而為眷屬也舉內法為譬者內法謂正報即色心等一切法也外法謂依報也即鹽蜜等皆依報故於緣是有者隨因緣假立故貪是有法非空使空者能貪之心所貪之色於妄是有於真是無今即妄達真故非空使空此法者即貪心及色境也經闍提者暹師云數論外道也經則不復見一切法性者既見佛性混融唯一故不見有諸法差別之性地持明二法性一事法性性差別故二實法性性真實故經云一切法性是事法性也般若無知無所不知者無妄想慮知故曰無知而有照理之知故曰無所不知以例空本無見無所不見即是無妄想執有之見而具照空之見也引昔證者即釋種為琉璃所誅阿難愁惱也餘皆可見者檀攝二覺謂除捨也尸攝三謂正語業命忍攝四謂念根念力念覺正念進攝八謂四正勤進根進力進覺分正精進禪攝八謂四如意定根定力定覺分正定慧攝十謂四念處慧根慧力擇覺喜覺正見正思此則六度攝三十五也餘有二信通三十五一切諸法信為本故謂信根信力婆沙文中下婆沙以實體十一攝三十七先以七覺收餘六科謂四念處及慧根慧力正見入擇法覺分四正勤進根進力及正方便正方便是正精進入進覺分四如意足及定根定力正定入定覺分念根念力正念入念覺分是即二十四法攝入七覺餘不入者謂二信為一及正思惟一語業命實但二并根本七覺成三十七正命入語業中然於七攝中攝喜入擇攝捨入捨又俱舍中實體但十以合語業命三為一戒支故初功德云下對初德示始終理齊文中徵初德中經以示三德不聞聞下有本多者字誤也意謂此解等者以十德始終同歸三諦橫論則地地具十竪論則對地無乖橫竪任殊三諦無爽以十地位只是分證三諦故也既曉分證地前可知既許橫論則知理具名字觀行相似分真究竟咸具十德以十德即三諦故若然者雖高下兩殊修證有別而聖凡一貫理體無差故知疏主釋經鈎深索隱豈同古說謬判淺深故云方近於理第九已上皆不如此者謂前皆淺也二車竝載者譬喻經云有長者子不別貨父令往外國興易初載栴檀往他國賣久久不售便問他言市頭何者貴耶他人答言炭貴便燒栴檀為炭昔人下引此方事類未治本云見乘驢者著縚帶問楊州何物貴答驢縚甚貴等但云著縚帶不云驢縚也答驢縚貴者謂所乘驢所繫縚也即以馬易驢以金帶易縚也經五種鹽者案四分律藥犍度中有兩五種鹽初五謂黑鹽丸鹽樓鹽摩鹽支頭鹽府移反後五者謂鹵鹽灰鹽新陀婆鹽施遽鹽海鹽此等名或約色辨或約處明若此土五鹽謂顆緣赤白印也鹽有多類大略五耳師子吼品雙題品目者菩薩能問既如師子吼如來能答亦譬師子吼也皆二莊嚴者福故能問慧故能答又慧故能問福故能答徵文據義者上云皆二嚴是據義下文中去是徵文因何下責他人但約能問釋題也廣能兼略者文廣題略也吼通兩處者王及子俱能吼也又師下約字義釋堆多回反匝子合反事理皆匝者匝謂周匝事匝則萬德俱圓理匝則三諦究顯訓帥者帥音率師能師衆為善也訓資者資取也弟子取法於師故謂弟子為資六位下云云者九界衆生即是佛故理具口密聞名識體能為他說名字口密如說而行如行而說觀行口密能以一音滿三千界相似口密分真究竟口密可知前五在因後一是果今明能問是真因能答是極果即兩處也身口下三密俱約六即今順品題且約口密此是世界者因果異故問答令他歡喜故此從為人者弟子從師稟法為生善故此從對治者決定說破偏小惡故從第一義者師居極位悟理周匝故若是入證下次第破前三師證則無說者今云師子吼品正說法化他何謂入證若說下縱計轉破也汝若云是說所證法名入證分者佛應自說何以菩薩題品為是誰問者前問既是迦葉何故今品佛答師子吼耶況經文次第答迦葉但齊大衆問品廣如前釋佛性誰說者佛性既是佛自說之何故却以菩薩題品三師所釋背義乖文故云乖各今明下既云問答涅槃義則是師子吼菩薩問如來說佛性義以答之若得此意無他三失初舉下先標經六門有乘下釋出五六二門義初釋第五門義皆屬了因者萬善本屬緣因由一乘了達萬善致使萬善亦屬了因也經云有乘無乘者謂有一乘是智無一乘即萬善也餘句皆云有無倣此可見是舉果性等者即有性句是有菩提涅槃之性也舉正因性者亦取有衆生為正因謂但有心者即具正因也釋五性名義如前記有因無因下釋第六門義習因因果有因句是習因有果句是習果又三句者取有作有業為報因取有報為報果習報義委如前記有作無作下釋出三句義是煩惱因者煩惱能造作業報故業非煩惱等者三業十支非煩惱故經云有業以簡之報是煩惱業果者由惑潤業此二為因招生死報出世因果即道滅謂有因是道有果是滅世間因果是苦集有作有業句是集有報句是苦而云有因無因者謂有出世因則無世間因也有無相對而來餘句例爾依報無報即問正性者報是五陰五陰即佛性乃正因性也十八條者但依前列六門細數即足同異若此者同謂不出佛性異即如上諸意是則同而不同不同而同也私謂下荊溪研詳文旨以申如來別勸一十八條師子吼總問佛性一義之意也但未為得意者佛舉六門意存佛性若備問六門雖稱佛言未得佛意也總勸下此釋伏難也應難云既許別勸總問何不總勸佛性別問六門耶今釋云收法不遍一者佛若總勸佛性則於諸名相有所遺失故云不遍二者菩薩若別問六門且法實無邊何止於六故云不遍不如從要且問佛性以總攝別義無不該是故斥云未為得意亦稱佛意者如來意在佛性故總勸菩薩承旨故總問此雖稱佛意但恐時機聞總迷別故佛別勸下開總出別故佛別勸攬別歸總故師子吼總問是則總別體一故得互明令衆易解斂字亦為檢字者斂謂收斂檢謂檢束語異義同互存無在譬法身者謂十力無畏等法所成之身也經如師子王者梵云僧伽羅此翻師子爾雅曰狻猊如虥猫食虎豹郭璞注云即師子也虥音士姧反漢書西域傳曰有師子似虎正黃尾端毛大如斗司馬彪續漢書云章和元年安息國遣使獻師子符枝形似麟而無角地即尸羅者戒為萬善之基故經欲壞實非師子者前三教皆不能為師子吼故下合云為諸衆生而師子吼謂說佛性也經令住處淨者下合云開佛行處即三德祕藏是佛所行所住之處今開示衆生令三惑不染故云住處淨也譬惡滅善生之機者謂三障惡滅三德善生乃今經圓機也先舉非者即以野干喻二乘雖當隨侍如來終不能說佛性故經云雖逐師子等言野干者子虗賦中作射干射音夜似狐而小能緣木譬三行者聖梵天也十力下云云者餘事法合尋經可見前有四句者一水性二陸行三飛者四香象開譬下結責他人單以菩薩釋品題也前三問問法等者前問所見之性後問能見之人一問果性者他見經云云何為佛性謂是果性次問因性者見經云以何義故名佛性謂約義立名即是因性雙問者意謂四德通因果此釋乖文故觀師不許今將下今用觀師體義名三以成六即將後人問前法者即將後段能見之人來此問所見佛性高下差別初將一切衆生問理佛性體此言理者收前四即以住前未顯通受理名次將十住菩薩問分佛性義後將如來問究竟佛性名又名義體三位位皆有今捨旁取正各就一種謂理具未顯則名義未彰初住開發則分有其義唯佛究竟公灼揚名眼約性用者問眼是能見何名性用答全能見眼是所見性若離所有能則性體攝法不遍若混然唯一則能所奚分寄語後賢彌須介意歎解六義者即前六問也此土福勝慧者以穢土人多薄福至有食不給衣不供者故以福為勝淨土反是企尚者企去智反望也十住菩薩至通教者住為能依地為所依以通教第十地菩薩同於通佛俱能八相故云十地菩薩為如佛所以菩薩同佛俱屬智慧莊嚴九地已下俱屬福德若消此文者謂既是三藏菩薩何故云無礙常住耶故須作於彼初教密解圓常消之故引天子為證最下既然者天人既容密入二乘菩薩豈不然乎故云例餘亦爾故誡講者消文不可定執以今經重施故如來作前三教以釋二嚴次就平等則是會偏入圓主伴一如生佛互遍故云汝之與我各具二嚴也以問答非二嚴者我若具二嚴亦應能答不應但問佛若具二嚴亦應能問不應但答二義既齊問答不成故云非也一種二種者涅槃理同故名一種生死事異故云二種如下疏釋只由解一二無一二者由解生死非妄涅槃非真體性一如故云無一二也菩薩分解佛究竟解故能問答令他衆生亦解此法故云衆生不解等非是下結顯也佛謂我言一種二種非是定計生死涅槃差別之相故云非是一二於一二乃是約一體無差而談事理差別故云無一二之一二亦是言於無言者以言詮辨無差之理也非是言於言非是以言分別名相一二差別也翻其前難下有本注云云文誤愛無明過現者愛是現惑無明是過惑能知此二此不二者了生死涅槃染淨事異故云能知此二復了體同故云此不二以能知貫下句了事異故無一過了體同故無二過今師子下復宗顯義也初顯師子以雙亡問次佛還下顯如來以雙照答良由即照而亡即亡而照亡照體一故使主伴各據一邊次文三段尋科語可解言若無一二何能無一二者意云先有一二方可雙亡一二若無一二無法可亡正答五問兼答一問者前約法約人總有六問一問理性體二問分性義三問究竟名四問不見性人五問何法有了不了六問何眼有了不了今佛正答前二後三於答第二問舉解惑中明解者能見即兼答第三當知空有非空非有者空則三諦俱亡有則三諦俱照即照而亡智慧是第一義空故曰非有即亡而照第一義空名為智慧故曰非空良由空有體同不離妙性故名中道故使三一展轉互融三諦俱亡故云盡一切相三諦俱照故云照一切境故云一切中者以亡照同體故也文剩云字是故下牒經示三諦義名為佛性者佛性即中道也經文佛性居先今存三諦次第故以佛性在後故知經文三諦義足不見空邊者字誤應云二邊下疏云空者即是二邊須知經言空不空者約中邊相對故未治本乃是二邊知此云空邊誤也見邊見中者中邊俱見即三智圓照名第一義智慧也若此下明三智互融一時具足故非前後邊即中故不淺中即邊故不深即空下以寂照體一結成三觀空是三諦俱寂智是三諦俱照今以寂為空以照為假在文可見無四德者即經云乃至見一切無我也此於四中略舉其一對無四德見空之非以顯有四德見中之是兩種不見者彼謂凡夫二乘一種見者彼謂菩薩以隨情者彼謂菩薩隨情見不了了故經總結云雖有佛性而不得見耳而於名起見者唱云見中道者乃是於中名上妄起中道之見非證見也三人竝然他謂一種見者非也凡夫下凡夫於所著生死起中常之見又俗亦明中如書云中庸之德民協于中等二乘以離斷常謂得中道菩薩以出假於機中適以為中道如此三人皆非佛性中道是知中道名同其體永異定苦樂行者二乘猒生死之苦求涅槃之樂故云定苦樂行甘苦如樂者甘受其苦如三禪樂佛是下次第釋經三句初釋一切諸佛至三菩提句次釋中道句後釋種子句釋初句中言兼得涅槃之果果也者既有菩提智德必具涅槃斷德故云兼也此果從因因生者佛性境為因性具能觀智為因因性由觀智之因因成菩提之智果此果果從因生者由福定之因性成涅槃之斷果中道下釋經次句也中道是理性正因故雙非四性皆顯下釋經後句也皆顯現者者謂四性分顯實由凡心正因本具故悉由佛性為種子此指理具為種非修得種也種子能生等者由性發修故此兩至中道者此以修得為種由修照性故指修得因果為顯性之種更互為種子者修為顯性種性為發修種故云更互無奈此文何者以經云菩提則是修又云中道則屬性下云種子則兼修性若不作更互釋之無以消通經旨通途下雖修性互通種子若別說之定以性具為種以修從性生故問佛性下問意者下經既明因因因果果四種之別種子即是正因之理則為四性之種經文何獨指正因為菩提果性之種耶答中具二意一據從略且云正因為果性種廣明則為四性種也二約傍正應問云一等從略何故獨存果性略餘生耶即答云正因生為果性種傍為餘性種略旁存正故指菩提如十二下釋出傍正義也十二因緣三道即三因合性為一但名正因正因之理亦為餘性種故云非無傍義而達三道即是三因正發觀智故至果上名菩提果所以正因為果性種其義彰顯正能發熱者亦傍發餘病故是不一不異者因是不一果是不異今明下屬當四科不出九界即是佛界故皆云諸佛體之也汝問何義者汝即師子吼也而是兩邊之上者此釋經中何以故即是上故文也此指第一義空出過前凡夫外道二人之上經生死本際者即無明愛二種煩惱是現未生死之本也兩因夾一果者識等五支是現在果也方是妙中者達苦果生死即涅槃佛性故曰妙中故使二死不破而破中間明是者經云無常無斷去是列菩薩章菩薩觀中故云明是此圓菩薩及圓接通別人也兩因兩果者共為四性一因性二因因性三果性四果果性尋此下簡示凡四句先二句簡非次二句顯是初句云不得以因家之因為因因者能觀智已是於因境能發智則境是智因故曰因家之因故所觀境只是單因而已故云不得為因因也次句云不得至果果者文多一果字只合云果家之果為果謂菩提智德已是果更加涅槃斷德乃是果上之果故云果家之果故不得以此重果為單果上句是不得以單因為重因此句是不得以重果為單果以義思之方知文誤或改不得為而得者亦非得以下二句顯是因家之果者境能發智則境是智因智從境發則智是境果又以此智望於菩提復名為因故云因因果家之果類前可解何故爾下釋義觀智從因至於因者從理境之因發觀智之因故云從因至因菩提但是果者請觀此文方驗前列句中多一果字譬與法乖者法中則與二法為二因譬文則以一事為二因二果亦爾今但取法譬俱有二因二果名同為譬故云少分故下文中下引經證十二因緣支支相望各通因果義也例二果亦爾者菩提當體是果復為觀智作果故亦名果果涅槃當體是果復為菩提作果故名果果此以法就譬二因二果各各相望俱有因因果果之名也此亦荊溪一往約義釋之耳彼家用衆生為正因等者衆生是妄事此定在因今云非因非果乃是真理故不相應良由他人不曉即妄而真故使但指妄事以為正因然此五性下今師正釋也緣性則二者以因果二法能顯於正通名緣性是則正性是理緣性是事合二為一者合因果為緣也合緣為正者即因果事是心性理故正無復數者正是一性一尚無一豈有數量哉經無知無見者不可以二智知不可以四眼見又以一切種智知而知無知相佛眼見而見無見相廣釋甚深者六門一一皆明十二因緣即是中道佛性凡小及偏菩薩自體雖具而不能見唯佛明了故曰甚深經無有始終者三世輪轉故今互顯沒者於佛則顯始沒終於菩薩則顯終沒始正言十地者即經十住也一轉等者即第十地是等覺人破最後無明即入妙覺故云終處近據此釋即經云十住是第十地也始則杳然者謂無明無始非等覺智所知故以一品細惑猶存故故向但云去終處近若佛已到於終則見終復勝則此最後所斷是最初起者且寄次第說之起惑如著衣之法從內至外斷惑如脫衣之法從外至內故最終脫者是最始著者當知見終是約斷惑說不見始是約起惑說十住破元品者謂第十地後心能破始起之惑則變易果報究竟不起自性至為易者達事即理則易因緣至則難者約事推尋元始則難今言下章安順釋今言十住者乃指一一住位皆分破無明望於元品悉是後起故云分見其終私謂下荊溪反釋經云菩薩不見始而荊溪作見始義釋之故云亦可云等顯義多含非違經也斷其始故者此據斷說故得見始經約惑起故但見終故知賢位等者此指地前住前也知無始終者達惑法界故鑒其始終者達事緣起故最粗著者著去聲元品者爾雅肇祖元胎始也重明不見者九法界人悉皆不見若爾圓名字已上亦可云見今為簡出聖位故使圓教賢人悉在不見之數前文類此類前定樂行等三者然此下中上下三但與前二同耳以前三中定苦是凡夫故應於苦樂行中開二乘人對今下中二智定樂同今上智而復有異前約出假此據分真然一家教門多引此文以對四教則以上上為圓准今經文乃以上上為究竟上智為分真雖有小異得意無在別得一箇菩提者經文但有四知菩提汝既謂九住不見與十住異則經應明五種菩提也反經非聖過莫大焉非當非現者正因之性衆生現有故非當未顯發故非現無當現之諍者以五性收之說當說現各有所主諍計自消此意者下通示上三段文意也謂體性不殊故生佛平等迷悟緣別故生佛不同事用未足者全未有用亦名未足分有其用亦名未足四出者初出菩薩品二出梵行品准經應作等者偈文上半是差故屬俗下半是無差故屬真俱存則兩亦是中道雙照俱遣則雙非是中道雙遮故知偈旨不出三諦互融不一不異也若生死下開成四句以明生死涅槃各有本有今無也本無涅槃者執事迷理故無不離有而論無者如本有生死即是今無涅槃本有涅槃即是今無生死句雖各立義乃一揆此前三下結四句唯雙非句是無差上文下兩本兩末句中初約反迷成悟事必先迷後悟故生死為本涅槃為末次約背理起惑義似先理後惑故涅槃為本生死為末涅槃始為生死終者中道始顯名涅槃始無明破處名生死終二河相望者生死河涅槃河也互作始終者生死終是涅槃始涅槃始是生死終故云互作然生死定無始涅槃定無終故此二句文中不出末本非本者生死之本非涅槃之本也本末非末者涅槃之末非生死之末也非本非末者生死涅槃之本非本本即末故生死涅槃之末非末末即本故故不屬三世然此本末四番釋之大體不出差與無差何者前三釋上半差第四雙非釋下半無差即是三諦者於前二句各取涅槃本末為真生死本末為俗第三第四二句只是中道遮照三諦互攝即是差即無差無差即差等不即心為佛性者此據離義以說則未來當見故云有耳要須修行方乃見之故經云以巧方便定當得故不取衆生為佛心者當來成佛是真心非今日妄心也佛心亦爾者果佛真心亦非本作凡夫時妄心也他云一乘是萬善者即光定謂法華一乘為萬善同歸也猶是無常涅槃佛性乃是常住今因經明一乘是佛性因便破之六度為莊嚴等者六度是能嚴之福慧一乘是所嚴之理體故云究竟更無別體者全能是所全所是能理體本同隨義異釋者事異故分能所經衆生悉有首楞嚴者此約理具修心者三止圓修十乘妙運名為修治此則正指名字觀行亦攝真修通通諸地者六即俱名楞嚴故也經有五種名者首楞是定般若是慧金剛喻定師子吼喻慧佛性是定慧之體故此五名還是三德三舉類者舉事定以類例楞嚴理定也八大人覺如前疏記呼為大地者俱舍頌云受想思欲觸慧念與作意勝解三摩地遍於一切心釋曰前三句標列第四句釋得名受者謂領納苦樂不苦不樂相也想者取像謂於前境取差別想也思者造作謂能令心有所造作也觸者謂觸對根境識三和合而生能有觸對欲者謂希求所作事業慧者於法有能簡擇念者謂於緣明記不妄作意者作動於意謂能令心警覺為性勝解者謂能於境印可此事如是此事不如是起殊勝解三摩地者此云等持心於一境轉亦持心所從強說心遍於一切心者釋得名也此十心所遍通三性四心三界九地有漏無漏一切心品故名大地地即心王此十法依心地起名大地法起十數者十前後而起不得俱時故云義說為十或云下三塗并人為四合修羅在鬼趣也并六天為十竝是有情所依故名居止釋論名健相者論第四十七云首楞嚴三昧者秦言健相分別知諸三昧行相多少深淺如大將知諸兵力多少故名健相會通者有即說無無即說有名為會通有二十種者俱舍云色有二種一顯二形或開二十如疏日𦦨名光月星火藥諸𦦨名明可見名影翻此為暗形平等為正不平等曰邪佛性非一二三者前三師各執墮於三門既執己非他故不能通理但成諍論如王見象者今家解釋達四無四如大王見象六分同是一身諸師各執如彼羣盲觸尾牙謂為全象兩國中間者界內界外兩楹之中也品數與習氣同者意謂習氣即是無明言元品者元頭也謂頭數品袟也左傳歸先軫之元曲禮一元大武注云元頭也竟不出破煩惱意者經文止明破己見性而向二師但出其名須知見性是破意也故引本業纓絡經得入中道以明破惑之意釋論等者彼以慈心不淨因緣等三治貪等三也此義亦恐未與經會故更引纓絡以明三觀二諦觀者因觀妄俗得證真空故也平等觀者前觀破俗用真此觀破真用俗破用既均故稱平等觀師破違經者即第三解是觀師義若不見性與經相違者經云破煩惱故然後得見若云不見故與經違反此以別接通者此約下根受接即破無明見佛性也三種破惑者一別接通二別初地三圓初住此三皆是見性之位如文所列而不云圓接通別者蓋同止觀兩理交際止論一接也以接歸初地即初住故又一下唯約圓教三人以釋雖知三諦圓融而隨宜樂或宜用空見性如止觀用無生門破遍或宜用假見性如用生門破遍或宜用中見性如用亦生亦不生非生不生門破遍也以一破一切破故俱破五住此文一空一切空等語似通相而是一心若通相觀即前接義也故淨名疏明三種三觀一別相即次第三觀也二通相亦謂一空一切空無中假而不空其但在空不能即假即中一假一切假等亦然故謂通相三觀也三一心三觀問此三何教所修耶答淨名記云別相三觀的在別教歷別觀三諦通相一心的屬圓教問曰此兩觀既竝是圓教何意為兩答曰通相三觀約通論此恐是方等教帶方便之圓非如法華所明也釋曰言帶方便之圓者乃部中圓接通別人所修也如於入空位受接者乃能達空即假即中雖三諦圓融而從本受稱但通名空觀也例如聲聞至法華後已是菩薩而從舊立號且曰羅漢出假修中二位被接類空可知故淨名記又云通相雖圓然帶方等乃成圓中之別相耳有謂通相三觀是修漸次止觀者且淨名記自云通相三觀是方等教非如法華所明今漸次止觀是法華行故不相類問荊溪既云通相是方等圓大師何故但於淨名疏中出此觀相而光明等疏全不明耶答淨名經中有三品之文正明此觀故得明之諸經無文但有其義故餘疏不說又既云通相是帶方便圓例知華嚴般若部中悉應有之以皆有被接人故是就別意者非指別教蓋前別對三教以釋故云別耳前譬就外者即前盲不見色等三皆就外法為譬以色像及月悉是依報外法舉此以喻佛性今譬就內者以十二因緣是舉正報內法以喻佛性故也此唯在人非謂外物者此疏主消經亦外之言非是山河外色蓋約十二因緣中正報之色為能喻耳此乃疏主辨能喻之物非謂所喻佛性不遍外物也荊溪恐他強執章安之語謂性不遍無情故探取喻意以顯內外之言該乎依正與所喻之性法合㳷齊然但依章安義亦無爽荊溪為時人故重更申釋又云下疏主再出異義既以在胎出胎為內外則亦但正報而已內外貪求及為內外事者既云外貪外事是則兼於依報塵境也但取十二以為佛性者為字恐誤應云以喻佛性支支別辨者如云無明是惑行是業等為令下明別辨之意令識三世因果相生故分惑業等別豈可下明互具也如無明時亦具行識乃至老死老死亦具餘十一支中間類爾是故十二各具色心如無明雖在於心既具名色等支當知亦有於色而色兼依正文云亦內亦外蓋謂此也以例佛性界界互具況一切下正明所喻佛性一念凡心十界具足也一切衆生者一切之言不出十界此事造十也念念具足十界百界等者此明理造也依正即三種世間一一世間各具十如因果故成三千既具十如即具十二因緣以十二因緣即十如故故云依正因緣指理具三千依正收盡在凡在聖數無增減此性顯時依正融通能為大用衆生隱故而無事用但有理性因人具果人之性故名佛性故內下經云亦內亦外之言雖約正報因緣不妨兼於外色以喻佛性體遍其義善成故云意兼多義入胎五分者毗婆沙釋從識至於現身死來合有十時胎內五時胎外五時名為五分與今經不同此色與衆生之名者謂攬色之實法立衆生假名也未有想受者未能想像前境領納苦樂也五果之後者受是五果最後支也胎內行心之初者於胎內能起貪嗔之時也初名愛下此約胎中以說中名取者以愛故而起貪求之心後名有者貪求心增長名為有也但轉名名之者以在未來故故轉識名色等名而名生等不具苦受等者但有餘二不具三故名無三受經歌羅邏時死者謂六入未具一歌羅邏二阿浮陀三閉尸四伽那五波羅奢呵翻名辨相如前記如是等時名名色於此位時死者但具前四支而已無中庸之捨者不苦不樂名捨受故始終長望者有二意一三界長望更互受生故二支支長望各具十二故此乃三界衆生等有十二衆生等有佛性者一一衆生心地各具三千依正三諦之法與佛心地更無差別彼彼互遍何所不收待緣方見者待教行緣方至初住見佛性也故下經云若能聽受咨啓大般涅槃則見佛性此即聞圓法起圓信立圓行入圓位也經十二部中雖不聞有者此敘昔小乘十二部也長出三事者即下云何為樂句但有雙非一句准諸句合有苦非苦二句則成三十六句又章門及解釋大體專明衆生本具此理諸法具足皆是三諦與諸佛菩薩更無差別修習即得今明以大涅槃心修者雖是小行以圓頓觀了之即小而大即偏而圓前云有化他故是大未能簡偏保非為極者化城涅槃非是究竟執為究竟也靈味寺名令正人師前云靈味皆指寶亮故今云令正以別之解脫翻無纍者此說無憑解脫是此方之語如何更用翻譯大樂即出家人樂者此釋經一者出家樂也以出家最樂故以大樂釋之故經云在家不樂猶如窂獄應是戒樂者出家以戒學居先故畢竟即菩薩樂者以分見畢竟之理故又菩薩雖是因人望彼權小得畢竟名但有九者無第十以涅槃化衆生故私云皆不爾者今經以大涅槃為體豈用小論以釋因內外緣者應以聞法為外緣思修為內緣藉三慧因緣得未來涅槃之樂又戒為外緣定慧為內緣出菩薩地經者即菩薩善戒論一名菩薩地經故彼經第二云云何名快樂義快樂義有五種一者因樂因行善法得他世樂是名因樂二者受樂從因因緣身得增長心得安隱是名受樂三者斷受樂修習聖道斷諸受故道得增長無有諸受名斷受樂四者遠離樂永離煩惱身心無患名遠離樂五者菩提樂受常樂故名菩提樂始從修因終至佛果故云從淺至深也有本云菩薩樂者文誤地前十住全不見性者此簡別位顯經云十住是圓位住即地故同見佛性經而不能知一切衆生悉有佛性者名字位人尚知他有豈十住菩薩而不知耶此亦抑之云不能知耳聞見者謂聞佛所說因而得解也師子吼品之二若欲聞見者勸於凡夫令依教而聞稱教而見受持十二部經者此約今經十二部故依教修習而得見性前云十二不見乃約偏小耳明見義者若能依教觀察得有見義復須中四明能見之行方得正見經衆生不知如來心相者衆生妄心則三惑喧動如來真心則三諦寂滅云何以妄而得知真上就下對上辨異先對上卷辨異上明眼見勝聞見劣今明聞見勝眼見劣故須釋意上則究竟佛眼見理性故勝分真從他聞說故劣今則凡夫聞法能悟道故勝肉眼但見應色故劣上德下次對德王辨異德王明執迹迷本故成曲見今知迹從本現故名見佛妙本者法身也法身為本應身為迹兩捨是兩教者前兩教但離斷常假立中名而無中體所以初不破諸結屬兩捨相成是別教者即不度衆生句及非一切成句此二屬別謂地前二觀成登地中道名曰相成雙照者即凡有所說及說不為利二句屬雙照也經六年苦行十二遊經云佛以二十九出家三十五得道故云六年苦行也經波羅奈十二遊經翻鹿野經正語等者軟言合法名正語離妄不虗名實語稱機即說名時語言無綺飾稱當法體名真語經二種因緣者聞見眼見名二因緣以此二種依教修行必見如來心相即四依人問者意云四依因人或示粗細我等尚自難知何能依教知如來果人心相耶初二濫後二者初人行細濫第三人次人濫第四人以衆生但見外迹不測內本故見初人謂是第三人見第二人謂是第四人細與正實義歸一揆佛言之巧綺互其文又復應二三是四依初四非四依直置僧寶等者謂四依與凡尚自難別也依此二事者謂見佛色身聞佛說法云何知佛心相乎經菴羅果喻等此喻生熟難知或外熟內生或外生內熟或俱熟俱生經舍利弗影猶故戰栗者此明戒之功用以驗究竟不究竟也經為利養者乃至捨邊求中去凡取聖咸名利養故云當知是戒不見佛性經若為正法者即以大涅槃心達邊即中無取無捨也經是名眼見者見如來色也亦名聞見者聞佛性能解也前疏云聞見強眼見弱者此文是也經為衆生者能見佛性者達自他不二心性無差方能利他如此利他即見佛性經若遇師僧者師謂三師僧謂七證和尚諸師者諸師即羯磨教授師及七證也為作要求者要平聲是市易法者以凡求聖如以賤易貴也任運法爾者十四法相成任運始從持戒至為見佛性也法爾者爾此也謂不假搆造其法自如是也猶云自然也持戒不淺者由見佛性心則不悔所以持戒任運契理故十四句展轉相釋而無淺深向云鄰接良在此也然雖無深淺而深淺宛爾故持戒為因不悔為果等住大涅槃下云云者謂十四句法性自具不假修成由昔不知故成迷倒今既知已何在要求故經云自然而得也有因無果者問前明十四句涅槃但當第十一句而經明第十二句云何故為得大般涅槃為得常樂我淨法故豈非四德是涅槃果耶答後之四句只是涅槃異名故疏云居在衆行之末言異名者涅槃必具德具德故無生滅無生滅由見佛性故知後四同在涅槃涅槃之上更無餘法不同中間諸句展轉互明故以有因無果為責但舉涅槃為難意在此也偏結一邊者偏就涅槃是無常結難向雖雙舉意但在一言戒是常者意竝涅槃成無常以難如來四德之義經云何得名樂我淨耶者既是無常亦無三德釋迦日短者從晨朝至中夜也食頃下云云即法華云時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃此由機緣慕法情深雖長謂短亦是如如來延促之智宜促長令短以例此經機緣宜長故善得演短令長三億歲說機緣宜短故釋迦促長令短止齊半夜當知善得亦短釋迦亦長佛佛道齊斯之謂也故舉法華一往為例經亦因亦因因者信心是因聽法復為信心之因故云亦因因又聽法是因信心復為聽法之因故云亦因因此由有信故聽法聽法必生信故得互為因也經亦果亦果果者聽法為信心之果信心復為聽法之果乃至互說例因可解三木為拒者此外道瓶圓如瓠無足以三杖交之舉於瓶也諸經中或言執三奇立拒或言三叉立拒皆是也以支一瓶者支合作搘拄也渴烏者謂井上𣚃槹衡上下低昂若渴烏飲水也亦名栒𧇀者音笋巨釋名曰所以懸鐘橫曰栒縱曰𧇀此非井上之物又立拒字非栒𧇀字合云亦名𣚃槹恐寫誤或云亦名轆樓者亦誤更互上下者謂一頭低則一頭昂上為下因下為上果例前互說經云立拒舉瓶若依後釋即𣚃槹之端懸瓶取水也若剋定三世等者若取過去二因現在五果現在三因未來二果則顯因因果果之義不便今但取更互相緣顯成其義釋八相譬中先出正義次破論人正義者謂佛自舉昔小乘中八相互相因起以顯今經互為因果之義大生直名至生生者疏釋猶略若悉釋經者於八相中且就大小二生明相因起餘類可知經生能生法不能自生者彼大生相但能生於色心等法不能自生其猶世間眼不自見指不自觸經不自生故由生生生者明其大生由小生生小生偏能生於大生故名生生大生為此生生所生名生生生經生生不自生賴生故生者明其小生由大生生小生雖復能生大生不能自生不自生故賴大生生如是二生亦因亦因因亦果亦果果成論下破論人也成師意云此經是大不應用小八相義故自立一期念念以釋今經此不應然者破成師也破立適時者謂今經雖破小明大而立小喻大令物開解正適時機云何論人不許用毗曇義耶大相是因者能引起小相故所以小相為果言小相是因因者大相已是於因小相復為大相作因故云因因以小生能生大生故亦可云小相是因大相是因因例說可解果義亦然又大相於八有能但舉一相即具八相小相於一有能只能生一大相故是習果者謂種智已圓三德究顯故屬習果沙門婆羅門即佛也衆惡永盡名沙門諸善普會名婆羅門下疏云指佛果為沙門婆羅門果斷生死者斷二種生死而有分證究竟俱稱佛果體是死因者煩惱是生死之因也無報因者行善惡因得善惡報名報因今涅槃無之無生因者涅槃是了因所感故生因是福德莊嚴牽生死報故無相待因者涅槃是絶待因所感故問若爾涅槃應是了因及絶待因耶答涅槃是果定非是因但正為了因及絶待因所感故不簡耳但是語勢者以無義通有六種故且列之以畢竟無正同涅槃豈得為難正取下即提下結文以申今意下結云有時無因故名涅槃是知雖舉六無但以一無為難若然豈但畢竟無是語勢後之四無亦語勢也池沼雨旱者雨時有水旱時無水日月籠散者雲籠似無雲散則有互無之意者如旃陀羅無婆羅門法娑羅門無旃陀羅法互望云無非畢竟無也畢竟無為正難者汝所舉六無借使以畢竟無為正難者尚不全是涅槃但有少分是義故佛且就此義責之乃云何故不引等況以下畢竟最勝尚不全是況汝以互無為其正難豈得契會涅槃耶問云何少分是耶答畢竟無無我我所以涅槃無因俱是寂滅而涅槃體具常樂我淨與畢竟有殊故使次文併非六喻以佛性為因者由了佛性故證涅槃云何能了謂一心三觀也沙門小果者四沙門果也二舉三譬者經從能生法者已下文是三譬者一燈二父母三穀子地水然經中三雙六句明二因義初句猶是約法能生法者者謂福德能招報故名生因福德是能生勝報是所生也經燈能了物者喻智慧能照了本理故名了因經煩惱名生因者結惑能生苦果故喻生因父母名了因者由二親和合方能了畢成辦果身故喻了因經穀子等者穀雖能生必假水潤福能牽報必須智導故以穀子喻生地水喻了悉用親為生因者以福德招報義強為親智慧不爾故疏橫豎相對者了因是八正反三菩提八正是因菩提是果因果相對故豎生因是六度因中橫修故屬橫欲明因取果等者以六度因取菩提果則因是果家之因舉菩提果成六度因則果是因家之果答了下了果即智德生果即斷德此乃生了二因成智斷二果從因立稱名生了果生果即是無常等者此以二果體別為難意謂生是福德不能契理故屬無常了是智慧與理冥合故是常也謂屈此竝者講者皆謂生果是無常而與涅槃常住義反所以屈也屈謂屈伏蓋不知福智理同無常即常常即無常之旨也此乃下疏主引首楞嚴三昧經及今經咸明二果事異理同以通前竝楞嚴下術人喻佛人前幻死即生而死喻常即無常而復還生即死而生喻無常即常二鳥下雌喻無常雄以喻常斯皆明涅槃果有斯二用體性一如何妨生果無常了果是常也經色者如來解脫等者此段言色皆指真善妙色也此作中道說者中道即佛性異名佛性雙非說為中道如步屈蟲者既云不定在身內則捨內取外又云即識神成佛則捨外取內捨一取一如彼蟲行觀師內外俱捨如鳥除翅何者下正約三諦圓融示雙非義不在俗諦者三千依正咸名俗諦故非外之言何所不收問文云五陰是緣生法何關依報耶答色陰之言該內外色即依正也三千空故說名真諦雖云真俗心性一如說為中道故約三諦以解則見有情無情佛性咸遍豈可三諦局在陰質三千遍攝何俟復言任運破諸師者舊解不在身內及成佛但是俗諦一邊觀師內外俱捨所捨內外亦只是俗尚未知二諦體一豈曉三德互融故但舉即空二師自壞初句未成者初句即上雙非句世人求酪取乳者世人求酪則取於乳若求佛性必觀五陰如何而言佛性非內性應在內者何故而言佛性非內耶經我亦不說乳中有酪者我亦不說乳中已有酪果但云有酪性耳乳即是空者以乳藉緣而有緣生非實故空如穀有牙者穀喻因牙喻果春來喻反妄穀內有牙如因中有果遇淨緣時其果則現如春來方出此師子吼所執之意也即空奪破者以即空故乳本無酪若約即假本具酪性今破定執以空蕩之經醪𤏙音勞三蒼說文皆云有滓酒也字應作酵韻集古孝反酒酵也謂起麵酒也經金鐵師者乳若已有酪者衆生有性及已是佛則如一人有其二能既無二種名字云何難言乳已有酪一往縱答者但約角具四大𤏙即火大𤏙既能為出酪之緣故知角中亦有酪性是則乳為酪因𤏙為酪緣也舉非果為難者酪是乳果菴摩非乳果以為乳果之難經乳灌者乳為樹緣因樹子是正因須兩因者正因緣因也經舉四大明一因也復有幾因者此釋經為是何因義也意問為只用一因為總用二因故云幾因正謂衆生者衆生五陰即正因性此約不離義也莊嚴至假名者他見經云正因者謂諸衆生即云假名是正因佛性生其陰軀者謂六度能為陰身正因作緣顯於佛性非謂六度生於陰身也不應餘解者還須如前非內非外而解可更思之者雖非內外而內而外令依三諦思之仙人下葛稚川神仙傳曰孫博河東人學道治墨子之術能吞刀劍引鏡為刀屈刀為鏡後入林慮山合丹仙去若有己面者自生求不可得見他面者他生求亦不可得二求皆不可得定知乳中無於酪果初奪如文者此奪破中經自有二意初以遠近一時能見明光不到眼光若到遠應遲見近應疾見如天月為遠地瓶為近舉眼雙觀一時俱見既無遲疾知非光到方見二以不見中間諸物證光不到如月瓶相去兩楹之間物象何量光既到者則應盡見既不能見知非光到四若不到能見者謂若光不到水下能見魚石者則應光不到壁外應見壁外物也騿馬者音草壯馬也亭亭者高貌文選云亭亭高山柏布護者文選琴賦作布濩注云布濩長多貌從言從水竝通今已患臰者如有人明日欲服酥今日應已聞酥香世無此理驗知此中定無酪果臰亦香也易曰其臭如蘭明當酵𤏙者明日方當酵𤏙於乳以取於酪而今日預已飽足於酪世亦無此理也飫依倨切亦飽也左傳序曰饜而飫之既其不定者師子吼於不定中作定問佛於定中作不定答由定與不定俱無性故亦是師子約即假理具諸法為問佛約即空泯蕩情著為答問答似異其體一同厥或契理忘情則若定不定即照即亡自在無礙下二句相仍而來者雖曰相仍若欲消釋應云佛性非生非滅即是三世有法無有是處然須約三諦以消偈旨方為盡理經因緣故生者即本無今有因緣故滅即本有今無經一切衆生至身如我者此破定執有性故以果事竝之既若有性應同我身萬德莊嚴云何衆生不爾耶經不牽謂不可牽引不捉謂不可捉持此約不可得以破定有之執經虗空界者衆生之身六界所成四大及空識也若無空界一切風血悉不得行轉動俯仰皆悉不得故以衆生等有虗空喻性體遍而不定有經金剛珠者不可毀壞故觀上下總攬前文以示三諦次引偈下明中道雙照故云即空即假次明下即中道雙遮言遍一切處者即一切處寂寂是遮義私謂下荊溪述成疏主之意此由疏主前後諸文但釋衆生佛性而不明言遍於無情故使荊溪申明其旨以為時人至其遍者此明章安不談無情有性之意時人謂傳五性宗者而云佛性三無二有初一闡提二定性聲聞三定性緣覺謂此三人無佛性定不作佛四不定性五菩薩性此之二人有性作佛此五皆是有情而稟權宗者尚執三無故云尚未信有焉可點示佛性遍無情耶故金錍云古人尚云一闡提無云無情無未足可怪且今經多處明佛性遍一切處又章安傳天台心要而達三千依正在乎一心豈一切之言不收草木三千之說寧隔墻壁故知章安具了體遍佛性既具下荊溪正述遍意即三諦者三諦是佛性異名故餘處豈無者餘處謂無情草木等思之思之者世人多昧其旨聞無情有性惑耳驚心故勸依經義深自思之據緣能發因中之果者緣了二因俱能照性通名為緣也因謂正因正因本具之性由緣顯發故云能發因中之果若都下示師子難意因中若都無果則緣因無用故云何用緣耶良由本具待緣方發經有佛性性者暹云有自佛及有果佛之性故云性性此釋非也乃是衆生有佛性之性耳經何須緣因者既由緣有酪故知乳中本無酪性轉緣因作了因名者只由緣名含二因故故於此段作了因說性自是了者既本具正因則已是了義何須智慧而照了之以性望修以境望智則性境名自智修名他故云他了應能自了者應於酵𤏙之中自出別酪何故於乳中出酪已足為八者以我足他我則為了他則是正故云此是自數他數於我我則是正他則為了他數我時他還為自我則為他故云自數他數也別有一法等者了因既不能自了了他理當別更有法也經已同酪壞者同前酪喻中若有性了何須外緣破此同彼也泛舉三答者正在轉答餘二非正故云泛舉經以當見故者以可修可顯在未來故故云有性而因中實無有果經搗押乃得者佛性亦爾緣了資發必當得故曾有等者曾有即過去有正有即現在有法王所為者如來隨機說有說無豈以凡情定執衆生佛性下合譬者應云乳中有酪下經應當觀察者衆生若修緣了必當得見據正因執有者前執由緣了顯發則知本有果性既被破訖故今直執本有正因經雲表星三蒼曰表外也言此星在雲外故不見經不同如是八種等者樹性若有既無八緣則應可見了因了無等者了因外助可云本無於樹正因子中云何無耶經二俱無故者尼拘陀子中無尼拘陀樹及無佉陀羅樹也非果為難者佉陀樹非是尼拘陀子之果也何不出油者既不出油驗知子有於樹經因緣故有者以水土因緣故生樹以搗押因緣故出油草木中無佛性者夫言佛性遍一切處者但是一一有情心遍性遍心具性具則草木瓦石全是己心乃云草木有性非謂一一草木各一佛性故云草木中無佛性若不爾者豈章安疏主不達性遍耶荊溪治定而無私釋耶故金剛錍野客領解云仁所立義灼然異僕於昔所聞僕初聞之乃謂一草一木一礫一塵各一佛性各一因果具足緣了若其然者僕實不忍何者草木有生有滅塵礫隨劫有無豈唯不能修因得果亦乃佛性有滅有生世皆謂此以為無情故曰無情不應有性僕乃誤以世所傳習難仁至理失之甚矣過莫大矣余曰子何因猶存無情之名客曰乃僕重述初迷之見今亦粗知仁所立理只是一一有情心遍性遍心具性具猶如虗空彼彼無礙彼彼各遍身土因果無所增減故法華云世間相常住世間之言凡聖因果依正攝盡請觀今疏及金錍文所談性遍足曉指歸不可才聞色香俱具便謂一一草木各具三千遂不許即色是心色具即心具之義乃云非但心具色亦自具今問有情心具則能隨緣變造十界之事草木既具胡不起善作惡造十界耶救曰各具是理隨緣是事安得以事難理乎破曰若爾衆生之心則具二造草木之性但有理造闕具既異豈稱理融是則草木之處有性無修具理闕事但因無果當知無情成佛之談剎塵俱說之旨不輕唯禮衆生之義今經但明有心作佛之文一切皆失若曉心外無境諸義皆成各具灼然己性常遍凡尋遺教須認大途諸文凡云善惡俱理真妄竝融凡聖無差色心各具意令遷善遠惡反妄歸真革凡成聖體色即心耳豈聞融具便欲縱惡沉妄守下凡滯外境耶若了其旨則諸聖設教皎然可識幸請諸德試為精詳言或有中無以人廢了一心已色香各具復何疑焉由心本融云色香具而有草木等性者此約事明性如藥草冷熱不同也既非外義者前因中有果是外道義故多番問答破之今此但是佛弟子修行起計故止一番三據下進退作難初約佛性發心俱是善法既本有性則已發心何須今發次又佛下明佛性是理是常發心是事是無常故云發則非性經世尊若使下第三結難也經無菩提心者明本無因心亦無阿耨多羅翻本無果心故將例性以結難辭止有八字者即經云一切衆生實有佛性人天不須佛性者若只求人天但唯世善不用知性求佛果者必在知性以知性故則無往反既無往反則得常住經心是無常者然心雖依性發發未稱性故屬無常止觀大意曰不變隨緣名心隨緣不變名性隨緣故無常不變故常住經五緣成者牒前難中生酥要得因緣所謂人功水瓶鑽繩方成酥也經爐冶餘者切說文冶銷也三蒼冶銷鑠也遭熱即流遇冷即合與氷同意故字從冰前無此言者謂無衆生佛性何故不見之言也直是取意者佛知師子難辭之下有此難意故今牒之經緣因者發菩提心者若作三因分之發心屬了加行名緣今合三為二則發心加行同能資發正因所以合受緣稱以例諸文其意自曉經諸佛和合者理與真如法界和事與十界衆生和彼彼互融名諸佛和合經不作心者無菩提志願及行也經疑心者疑自為有佛性為無佛性疑涅槃為有為無等經吝惜身財者如前若聞入地獄經無量劫方得菩提亦不為菩等今聞此說起懈退心經於涅槃至永滅者示有退之人謂言涅槃令一切衆生永入滅度名為涅槃所以生於怖畏不意涅槃是永不滅之法經心不堪忍者不能堪忍修習故心不調柔者或樂人天或樂二乘或樂出假皆是不調柔心餘例可知緣自輕己身者不自信己身有佛性巨有所妨者大妨於道也真修之外等者三學之外至於文辭讚詠咸名俗務若准下觀解則圓修之外偏小之學悉俗務也三不仁者春秋左氏傳曰仲尼曰臧文仲其不仁者三不知者三下子禽展禽柳下惠文仲知柳下惠之賢而使在下位廢六關塞關揚關之屬凡六關所以禁絶未遊而廢之妾織蒱三不仁也家人販席言其與民爭利作虗器居蔡山櫛藻梲也有其器無其位故曰虗縱遲祀聽夏父躋僖公祀爰居三不知也海鳥曰爰居止於魯東門外文仲以為神國人祀也疏云被異彈之等者左氏及公羊穀三梁傳俱無此說但明文仲為仲尼所貶不云異彈之而此言者蓋疏主出仲尼所貶之意耳然此雖指三不仁意取販賣一事以誡僧也俗人下舉况也文仲俗士食祿於君而事販賣貪求財利尚為君子所譏况物外真僧本期出離而乃驅馳騁耕種販賣違佛之制妨道之𠍴其可知也尚應下與俗對辨過失重輕據前經說僧有違戒佛敕國王種種苦治乃至第一卷中明令罷道還俗等豈但如春秋中彈貶而已故云何足及言是知販賣之失於僧彌重於俗尚輕以此事人多喜犯故疏主於六事中委細釋出得意自在者若了三觀一心無所不統則於前經文凡明事相法相之處悉當懸覽反照自心使無封文滯事之𠍴知依解起行之旨矣執耒運斤者耒耜田器也斤斧也坐馳者莊周貴坐忘遺照故曰坐馳無益言坐亡遺照者若能知天之所為者能會其物理體其變化靜坐而忘其事棄遺所照之物任其自然之真理不以他事係心端然懸寂如此者乃能知天地之所為言天之道亦如此也此坐忘等語出莊子大宗師篇今以凡夫心緣五塵未嘗暫息故曰坐馳若能體塵即空名坐忘也自坐馳已下是簡出五乘九界悉名世務五塵六欲是人天乘亦是六道六界又專念下是聲聞緣覺乘又念蒼生下是菩薩乘總前是五乘九法界也若能下明修一心三觀名為佛乘是佛法界方名出俗不壞道心若能無念者明三諦俱亡念於無念等者明三諦俱照念是假無念是空非念非無念是中私謂下治者述疏中少明觀心之意句句觀解者如法華疏等於文非要者於消釋文義非要也但為下使隨聞一句攝事成理即聞而修故妙玄明一家釋義凡伏二人一約事釋為伏文字法師二約觀釋為伏坐禪人然疏主既云得意自在是則今疏觀心一科無文有義況復至解世務委而明之及前釋通序中文亦略示若爾復成有文有義以一例諸一部可曉此非心師者以後心隨前惡心則是後心為前心所教乃成弟子師於前心也後心能止者知前心之過改惡為善則前心是所教弟子後心是能教之師名曰心師以假人制心者妄心內動由人制伏也不隨心作者以制伏故不隨惡心造身口業制心在人則人為心師此不約他人但約自己心緣於法者心謂能觀之智法謂所觀之理制心依理理為心師始從名字終乎究竟悉有心師義故云深淺自在又淺依他解深依今釋義竝無妨故云自在經涉路而去者即前遲得名退人也不退之行者位行念三不退也經傭滿敕龍反爾雅傭均也齊等也經文作𦟛俗字也經奩底力占反蒼頡篇盛鏡器也經身毛上靡靡偃也經七處滿者大品經云兩手兩足兩肩及項也經缺骨充滿者即項下橫骨繞項至咽喉處二寸強曲凹下如盆緣缺名缺盆骨求佛心便者三十二相正是佛果所得故然相好無別但由四教觀慧淺深故成四別三藏可知達相本空通教達相即假別教達相即中雙遮雙照圓教八十種好經文不釋廣如大論及法界次第然相之與好同是色法但相總好別相若無好則不圓滿輪王釋梵亦有相以無好故相不微妙好嚴於相令人愛樂欲親近也既相好相須故知經文存略業果即了因性者了因觀智是非有漏非無漏之業此業能招菩提之果故云業果正指能招之業故屬了因下總結四法者即經云如是四法是總結上文也兩番破義者一破因中有果二破因中無果無性即有性下以有無互融即三諦理故不可作有無定執一切衆生皆有此性故云悉有佛性文理抗行者既失圓融之理意欲消祕藏之宗教是則次第之理不應祕藏之文祕藏之文豈詮次第之理抗行之誚胡以逃之以煩惱起故是常者煩惱是妄常是真理即妄而真故惑起處當體真常此謂煩惱即菩提也此解淺近者以直指佛性為常此則偏指於真不能達妄即真何殊別義故云淺近以所覆佛性雖是常住而能覆煩惱還是無常故云常義不成衆生下正示常義此則廣上初解耳如何是常者正因屬理容可為常且果及果果是果上所得緣了是因中修成悉是本無今有無常之法何得五性俱常住耶萬善即緣因能了佛性者意謂因中了正因佛性故有緣了二性果上了正因佛性故有果及果果性所以因果竝常然此解雖優而但云了佛性則能了所了理事宛然既不明理事互融因果不二尚是可思可議之法故云今謂不然也不思議故常者則能所因果事理俱不二也此是別義者地前以無常為能覆常理為所覆破九界二邊之無常登地分顯佛界中道之常住即別教也前第二解云衆生中佛性是常但得此義
