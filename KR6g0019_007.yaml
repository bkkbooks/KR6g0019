body:
  text: 錢塘沙門釋智圓述四相品以四種相等者涅槃是總四相是別離一涅槃以為四相開示分別令昭然可見四相解般若等者一品之文正談三密四相在口密內百句在意密末文雖參互三德義明開演云何者問開祕演祕之意狀也昔說即指小教所談王宮之身樹下斷惑故有身智未入無餘故無解脫未明於說者向雙徵開說二問而舊釋但通一義此示兩文者但示兩品答問之文而未判開說之異義興皇下興皇委論二義而以橫竪判異昔以下初總釋橫竪次復次下別釋橫竪於總釋中約迦葉竪問為開如來橫答為說昔說無常不談常住故云覆常今明五果俱常破昔無常故云覆無常也佛明下今昔兩說是竪即涅槃二用是橫以橫收竪同歸中道名為說祕復次下別釋橫竪文中先約竪釋智上意地能緣者擇力是智智能破惑惑破之處名為解脫惑是所破智是能緣言意地者小乘無漏全是界外無明意地此即竪明等者開昔無常之三成今常住之三今昔相對即是竪義竪故明開為於邪常者為昔外計邪常混濫真常故且說無常不得說常也二用具足者昔已說無常今又說常乃見涅槃一體二用雙具此即是橫今昔相成者以今常住成昔無常以昔無常成今常住共顯涅槃二用具足故云共顯一道約說為橫義在於此是義下今師正解先破興皇次示今義破興皇中初約四句立義皆覆正理者四句起執不契實相名之為覆非獨常與無常相覆也邪見火燒者實相般若譬如火聚若不取著則四邊俱有溫身熟食之用厥或取著則四邊俱有焦肌燒手之患四邊喻四句也皆方便門者不生取著皆能入理譬王稱仙陀婆一名而有鹽水器馬之四實故云密語主如妙理語如四句智臣能解以喻無著是則四俱是用何獨二耶對治四執者常破無常無常破常兩亦破單執雙非破兩亦故云對治皆是正理者無常即空常即是假餘之二句只是中道雙非雙照既三諦互融展轉無礙故知四句無非正理何獨雙非是理耶一切法即四句安樂性即正理總此四意以成四悉覆理是世界方便門是為人對治如文正理是第一義若爾下竝破興皇也故知興皇立義遍僻無四悉意自行為開等者乃知迦葉所問開微密是約自行為問演說祕密是約化他為問該括凡聖者四句只是三諦始自理即終乎究竟六位雖異三諦無殊故云該括凡謂理等四即聖謂分真究竟不獨在佛者顯迦葉所問義該六即他人安得獨約果佛釋義耶常無所宣名說者即杜口默然常說是經也如是下結示各論也亦無差別者既自他等各有開說二義則知迦葉所問雖有開說兩殊而義歸一揆問向共論中已將開祕配自說祕配他何故此云無差別耶答共論則捨旁取正故以開說分對自他各論則義可互通故無差別今家用此三章者即承用第三師明三密即開三德義也從多判者但多談口密少說身意則判為口密二文例然無相離相者滅色觀空故無四相即相無相者即色是空故有四相不求無相者若離相求無相者如避空求空此文破偏乃是以圓破藏也一相即四下示中道第一義諦也法身無我者昔觀真空無有邪我如般若下云云者應云非我非無我以成三諦準前可了離非絶句是離文字求解脫今解下即文字是解脫故例如前說者例如般若以明三諦也然此三德既各三諦乃是即一而三三諦共成一德乃是即三而一互融之旨其在此矣尋文可見初云下先標示舉二號下次第釋義其義不異者無所從來亦無所去故名如來覺此無去無來之理故名為佛悉約自行故云自正義便又復下釋正智及正境義向標云正智即是一切種智而此種智即是佛眼故此云又復等也照因緣境實相者即是佛見因緣生法即空假中名為實相故法華云如來知見無有錯謬非因下正示實相體絶四執不在內因外緣等是則但云因緣實相猶屬性德四句推之方成修境既佛眼所照乃修德之極故云了達至為見也是知但言實相不知推撿還同鳥空以見下釋正教義以己所證說示於他故所見正所說亦正舉淺況深者以見火之淺事比況佛境之深理為從薪生者薪是火緣即是從他生也觀身下合法也身即五陰是因緣法合火聚也不有下離四執故下經云自觀己身猶如火聚斯乃外觀火聚內識心源僧宗於此引枯樹經現文自顯不須別引終不邪見若有若無等者此有二意終不於能譬火及所譬理起茲四見何者抱火但壞肉身起見則壞法身是故寧抱火聚終不起見問誓云寧抱火終不謗經何故疏主約不起邪見釋義耶答內無邪見外方不謗謗即邪說也故云亦不邪說等比丘正見者即指名字已上六根已還況復諸佛者分果極果二俱名佛開一寶為三者一即佛寶以自覺覺他與自正正他語義相近故以為難為緣異說者涅槃開二相佛寶唯一種善對機宜有此異說不得為一者若能正還是佛智今約所正即他稟教以正於身是故他身與自身別灼然二相豈同覺智只在佛心釋正他中初分科懸示次隨文正釋分科中云歡喜正他等者歡喜即世界謂得人天戒善故喜也無我即令生真諦之善也常樂即破二乘之惡也第一義則寶藏唯付善子善子以喻菩薩菩薩即入理之人也故此四悉小大共論前二在昔教後二唯今經初文下略對四悉調伏賢聖者此指鹿苑七賢七聖及二蘇中稟藏通教者既生二乘善根故俱屬為人破世無常者以二乘無常但出分段世未出變易世故云世無常也理甚分明者問若據經文佛示女人唅酥之法類顯自己能量衆生堪任小大亦是先譬次法何得便將唅酥之譬以為世界之益而云尋文會義耶答次文合法既舉小乘無常例知小果之前必由人天戒善但是如來從要而合直舉無常以今經正為引小入大故也是知唅酥等譬備譬四益經文影略且合後三疏主尋其文意且以能譬以當世界則是說人天善稱機歡喜也況復譬文明有女人歡喜之語則疏云理甚分明斯言有旨夫乳下廣釋四悉止可唅酥等者酥譬人天乘軟食譬小強食譬大食俱不可者謂佛始出世觀彼機緣但可且說五戒十善如為提謂文鄰等若小乘生善大教彈斥俱不可也正他下合法微謂世界著則入理漸而下始談戒善令彼歡喜次說小乘令生真諦之善次說常樂以破偏空之惡故曰漸而正之女人下女人柔弱以譬佛慈慈出諸法如女生子嬰兒譬初信者衆生初稟佛言信於戒善也聞法自資者謂聞五戒三歸之法也含者字林從玉作琀諸書從口作唅同胡紺反穀梁傳曰貝玉曰含謂資人含與也今取其義夭壽者廣雅云夭折也不盡天年謂之夭喜逸妨道者若一向讚嘆歸戒尚恐物機耽著人天妨出世道況復小乘生善大乘對治耶應以況字貫下對治謂機緣劣弱尚未可廣談歸戒況說苦空厥或說之必無受者尚未可說小況談大乘厥或說之必定生謗是知如來觀機逗法如彼女人籌量養子問何故但至對治不言入理耶答自行之益但至對治則破小入大既約付藏以為入理則屬化他故此不論含酥下結成且據現文有世界義故引經文證成其義故云令我歡喜又女下引經證正他義又嬰下明為人稍大等者小機已熟故節歸戒之酥乳與無常之軟食生諸功德者即無常等四也修此四者則得小果故云功德又兒下破惡便食等者尚可彈呵況復小乘及歸戒乎功德稍著者已證無學也如能自行來堪可下來至今經以大斥小悉皆受化如消硬食爾雅云如切如磋道學也郭注云骨象須切磋而成器人須學問以成德今意亦爾既受彈斥學問大乘以成四德生善破惡已周者生善則為實施權破惡則開權顯實一期化訖故曰已周安置祕藏故云宗極蓋引昔事者此經已前曾見此女故佛引之以成今義例如化童者如前聽戒童子也寓寄也經消化化音花女人稱佛者寶亮智秀俱作此解佛自稱者僧宗解也既經語難明故疏無定判今將下不同舊人定將此文為合譬也若消不消者即初稟歸戒如消酥乳未宜小大如不消軟硬正是生善者即初為五人說無常等令生小乘之善也料簡下此明鹿苑且宜談小不宜說大以大乘常樂之名濫外道故機緣未熟決定不受注云云者為人生善但指小初對治彈斥直指今教此乃大小相對如前純陀難佛義也問今經彈斥與方等何別答方等被彈但能耻小論其所證猶止草庵今經蒙斥即入圓常捨彼偏真咸歸祕藏故知今經以大斥小乃是廢權顯實之異名耳先牒不堪者謂昔不堪對治也次明對治者經從若我聲聞已去文是經本所與酥等者謂小果已證大機正發則昔日歸戒小乘俱不稱機故云本所與酥則不供足也此乃牒譬顯今堪受大法明昔不堪經我之所有下正明昔日不堪故科為牒不堪也以出下釋對治經文經堪任修等者亦是合上凡所食噉等也出世三味即常樂我世三味即無常苦無我以二乘所證未出變易故名為世故經自云彼世間中有三種味也佛以凡夫六種報得之味以喻二途即是以大斥小也酢醎苦等者苦以變樂為用如酢能變甜故以酢喻苦諸法所以遷流以無常逼切故猶如醎味能使非醎作醎也故以醎喻無常無我之言不自在故如苦味不悅人也故以苦喻無我賢聖道味者謂小乘賢聖以真道為味故云道味凡聖合稱者凡夫報味是喻賢聖道味是法以譬從法同名世間甜辛淡等者樂以悅己為義猶如甜味人之所嗜故以甜喻樂我者制御自由物無能礙如辛味之通發故以辛喻我常理堪然一相無異如淡味之無分別也故以淡喻常合稱者以譬從法法既出世能喻亦然舉要言之所謂前三是世間法喻後三是出世法喻耳具應有八約世六味但說六種淨與不淨二義粗顯故略不論此別有意者此通伏難也應難云前釋純陀品廣破舊師明今經是破病常義乃示四悉以斥偏執今科此文以為對治則與舊義何別故今通云此別有意也言別意者雖通四悉而以大斥小別在對治別義含通豈同舊說經從彼世間去分定勝劣也向雖以六味譬之而其所譬未分勝劣故此判之則前三是小是劣後三是勝是大既指小為世間則大名出世初明世間煩惱下明出世先舉法次舉人法者無明為智火所焚名之為薪智焚惑薪故復名火相因得名小乘劣修即無明惑今焚惑薪達障即德故成涅槃法從喻稱說之為食經謂常下就彼涅槃列出三味經令諸下舉人法是所修人是能修諸弟子者正在分真通收五即甘嗜者廣雅甘樂也嗜貪也甘嗜無猒以喻順道法愛然據經文既云我於是經為說六味則知所斥劣修即今涅槃一邊之用在昔機緣迷而不達第一義中文為二者謂分其四悉以為二意喻善惡子非謂科經為兩段也以經中善惡相參而說故不可分若約先譬次法為二段者此則可然三悉是惡子者問對治正是今經以大斥小令小入大何故亦是惡耶答佛抑挫未悟大者敦令發心故例以八實聲聞亦為惡子耳前哀嘆中云付摩訶迦葉即是且據入實人論以此對前亦是折攝二意今從折伏義邊雖已入實而昔是聲聞從本故使獲對治益者亦屬惡子後第一義別指菩薩所證也不付下因明付藏重示今經明四悉意也若就昔教小乘其實偏真是第一義今為簡出菩薩故須約圓又取下應問云第一義既約菩薩理應三悉皆約圓論何以向取小乘偏真為生善益耶故此答云又取等以今經正為引小歸大四教竝談故得以歡喜生善約小破惡入理約大也故云共為四悉此人解常者解通五即正在住前以正為汲引初心故也若觀己心三千三諦生佛無差常住不變則佛在家中何須遠覔又五陰為家陰即三諦名家有佛故華嚴云一切法無生一切法無滅若能如是解諸佛常現前應知一切萬法攝屬於心心外無餘豈復甄隔庶幾來學勤而思之智秀云夫善依信立以信為家以此善心念念所緣唯在常住是則常住法身常在信家無方問者暹云無人能問故佛自舉方者法也即是越於規矩法度而設問也餘事例爾者餘事即餘五度不持戒名尸等者如祇陀末利唯酒唯戒也煩惱既即菩提此乃不智名般若也乃至之言略餘三度可以比智經檀越此云施主答有五句者一施奴婢二施女色三施酒肉四施過中五施華香疏主趣舉酒肉示義餘可例知不食魚肉者昔雖未制而有恕己不食之人又小雖不制而梵網楞伽大乘已制故有稟大不食人也二云下夫施財為易施人名聞為難故今次義就名聞釋欲顯彼德者施主本意為顯此人德行不在捨財是以於稠人廣衆之中施肉不受彼既不受則不損我財而彼慈心不食之譽於斯顯著施彼名聞名為大施又見下更約二義釋成大施初以隨喜名施次以解苦為施隨喜者大論云菩薩摩訶薩隨喜於他福如賣買香人及與傍看者三人俱得益故隨喜福大方便解之者愁苦之人往往致死能以善巧言辭解之令彼歡悅利益既深得名大施但用善語而不費財然并前二義總成四解前二為正後二泛論故前二義雖約施肉五句皆然比說可了經聲聞天下者聞音問詩云鶴鳴九臯聲聞于天若取己名達彼應作問音若取彼聞我名應作文音則兩音竝通也立斷肉制者斷音短此蓋如來欲立斯制故先答無方之問而云斷酒肉者施以酒肉故使迦葉承言而問發起其事也經不聽聲聞弟子食肉者菩薩先制已在梵網楞伽二經是中但制小乘也以涅槃已前小乘戒律許食三淨今則悉斷變化無方者易曰神無方易無體孔頴達曰不定繫一方也今謂菩薩垂形五道豈定一方或現畜身故食肉者豈免害聖精血下大論云一切衆生身分皆是父母精血所成以可惡故寧得食也六云下恕尸預反聲類云以心度物曰恕自思己身不能受痛而欲傷割噉食他身本自無怨者彼非我怨也乖化道者大士化人慈濟為本望十方有分者釋上罪多義謂食肉之人望十方有情境上皆結殺罪故此他師立義疏主引用若準四卷楞伽復有多義故被經第四云佛告大慧有無量因緣不應食肉今當略說謂一切衆生從本已來展轉因緣常為六親以親想故不應食肉驢騾駱駝狐狗牛馬人獸等肉屠者雜賣故不應食肉不淨氣分所生長故不應食肉衆生聞氣悉生怖如旃陀羅及談婆等狗見增惡驚怖群吠故不應食肉又令修行者慈心不生故不應食肉凡愚所嗜臭穢不淨無善名稱故不應食肉令諸呪術不成故不應食肉以殺生者見形起識深味著故不應食肉多惡夢故不應食肉空間林中虎狼聞香故不應食肉令飲食無節故不應食肉令修行者不生猒離故不應食肉我常說言凡所飲食作食子肉想作服藥想故不應食肉聽食肉者無有是處復次大慧過去有王名師子蘇陀婆食種種肉遂至食人臣民不堪即便謀反斷其俸祿以其食肉者有如是過不應食肉問此經斷肉與楞伽何異答彼為菩薩此為聲聞故楞伽大慧菩薩說偈問佛彼諸菩薩等志求佛道者酒肉及與蔥飲食為云何乃至云唯願為我說食不食罪福此經乃云從今日始不聽聲聞弟子食肉故知楞伽未制聲聞當曉此經正是小乘斷肉之憑據也古人執律諍計云云問菩薩律儀梵網頓制何待楞伽答梵網頓部專被別圓若藏通菩薩所持戒法與聲聞同故大論云釋迦法中無別菩薩僧俱入聲聞衆依次而坐者蓋言藏通菩薩耳以般若帶二兼其所破故有藏教楞伽部屬方等故制藏通菩薩也今經但制聲聞者只由菩薩楞伽已制故也不作此釋云何會通智者詳之或有深致如食下牒經釋義也故楞伽云以大悲前行故視一切衆生猶如一子是故不聽令食子肉昔事者大報恩經云須闍太子父母被羅睺賊所篡逃逝外國失路絶糧乃割己肉供須父母令達前路皆他命分者所受之物皆是他人支持身命之分肉想下云云者此第四意即楞伽云凡所飲食作食子肉想作服藥想也經云何至食肉者聽平聲許也意問食肉有何過患不許食耶故言斷種者由食肉故不得成佛及入初地等故若不見等者雖不見不聞但令疑是殺者任是自死亦不許食此則不論他人為我殺不為我殺也須云為我者謂不疑即得食若云為我將肉來即不得食亦不論殺與不殺此據心雖不疑以口索故亦不名淨應須不見不聞不疑他自持與非己口索方名三淨是知次解制急於前以前口索亦名淨故梵行下列十名獼猴下釋其不食所以也人是同類既不得食猴狀如人以念人故亦不食也龍能興雲致雨成熟五穀於人有恩龍作蛇形恐食龍故象馬代勞狗能守禦雞能伺晨於人有恩猪噉穢狐妖魅二俱鄙惡此釋與疏小異又疏闕象雞二義覽者詳之根本下云云者應於見聞疑中各說三相且見中三者謂見牽畜去時乃至持刀臨煞名前方便正煞即根本煞已歡喜名後方便無此三者名為清淨聞三亦然疑三者初瞥爾舉心名前方便分別思忖疑為已煞名根本疑已歡喜名後方便無此三者名為清淨故知迦葉前問食三淨肉乃約總論此問九種只是開三成九從總派別耳又寶亮解云不見有三謂未食時喜食時食已二喜不聞不疑各三亦爾僧宗云見中三者見斷命時見牽去時見煞後屠割時聞中三者聞煞時聞牽去時聞屠割時疑三者此為為我煞耶乃至前後方便亦疑北遠云九種清淨自未見文人傳釋云前十種外餘衆生中不見他煞亦無聞疑及不為己即以為四先乾自死及與鳥殘通前為七不期遇得及他自煞請已而食通前為九雖有諸解疏主為正以經前問三淨後問九淨只是開合故亮宗所釋其義稍通北遠之說恐未盡善經因事漸制者以聲聞戒是漸制故如十二年中但說略戒後因須提那子之犯始制初戒後皆因事漸漸而制至二百五十佛答先許九淨今皆斷者亦是漸制不同菩薩梵網頓制也隨他語者隨順世人權云魚肉是美經石蜜者以甘蔗米等煎合而成其堅如石即此方乾餳之類經種種衣者謂三衣百一等要是壞色者所許畜衣恐生貪故尚須壞色豈可貪著魚肉而不斷耶言壞色者非五方正色及五方間色故云壞色正色可知間色者即五行相剋而成謂東方木青西方金白以金剋木故白間青而為碧色木剋土土色黃以黃間青為緑土剋水水色黑以黑間黃為緇色水剋火火色赤以黑間赤為紫色火剋金以白間赤為紅色此皆悅意之色起人貪心故制不聽青黑木蘭即壞色尼楗下尼楗裸形故不須衣服自餓故不受牛味尼楗應云泥楗連譯言不繫謂不為衣食所繫縛也叨餮者上音叨下音鐵貪財曰叨貪食曰餮此謂俗士也若過若不及者尼楗餓裸則太過俗士叨餮故不及俱不得其中庸也比丘畜衣服受牛味故異尼楗不畜八不淨財不食魚肉故異俗士中庸之德其至矣乎此中下疏主判定經意也以向迦葉問中具舉衣服牛味及金銀等佛答但云不同尼楗故須依律斟酌可不非謂俱許畜也如寶下即前經云珂貝至金銀盆器也尚不應畜者金等皆重物故以金銀等妨道中最則不許畜如下經云雖聽受畜要須淨施篤信檀越五味者者如問所列謂一乳二酪三酪漿四生酥五熟酥準律乳酪漿名時藥酥油生酥蜜石蜜是七日藥非正身分者以乳酪等雖從牛出非是屠割身分故先斷三種相者謂有見聞疑相則不許食其不見不聞不疑者名為三淨方許食也三種外故者見許食三而更想十故須斷十雖斷十種而貪想三淨及自死等故使今經一切悉斷故云貪想等即是疏主釋經想字是貪義也三頓制者即是從漸至頓謂初斷三次斷十至今悉斷也不同梵網經發軫頓制也對昔唱今者昔許食肉今唱悉斷而菩薩下此明梵網對大乘機頓制食肉始成便制至今涅槃已五十年故云久制又遠本初成華臺便制望今名久輕垢之罪者即四十八輕中第三條也故彼云若佛子故食肉一切肉不得食斷大慈悲性等為度下明漸制意為度小機從梵網頓開出小乘之漸許食三淨大機今熟故收漸入頓一切悉斷故知今經與梵網同但今會小彼經隔小為異雖現下菩薩隨機順緣食彼三淨也經悉皆恐怖者智秀云人無害獸之心獸亦不害於人是以探鯁虎於山中狎翔鷗於海上若既食其肉豈害心永滅哉所以聞其肉氣生怨嫌想經清淨食者暹云法身菩薩分衛之食猶尚不食經四道即四果也經被服皮寄反被帶也六明下起惡事者皆食肉之人經星宿者思胄反釋名云宿宿也言星各止住其所也經蠱道功戶反聲類云弋者反蠱蟲物病害人也說文曰蠱腹中蟲謂蟲行毒也經樗蒲敕於他奴二反謂枚擲也博物志云老子作之用卜今人擲之為戲經食者得罪者依梵網得輕垢罪也問依小乘得何罪答小開三淨無罪可結是知今經扶律談常收漸歸頓故制食肉得罪之言還指梵網其諸戒律或小乘已制至於今經囑付而已凡諸結罪更無別途只是指前大小所制俾夫滅後漸頓無諍大小兼行故知南山撰鈔小乘有聞而用大乘添補者將非深見今經收漸歸頓之意乎故彼鈔云今有凡愚多嗜諸肉罪中之大勿過於此故屠者販賣但為食肉之人必無食者亦無屠煞故知食者同屠造業沾殺生分可不誡乎三藏事相等者小教析法理外有事故偏得因緣之名如欲下述經偏指律藏意也先須緣起者如明初戒先說提那與本二行淫之事次明戒體是重體謂輕重等體非謂無作後廣出持犯方便根本之相律文諸戒皆爾故得因緣之稱一是總者即深妙之義該於下三故云總下三只是派開深妙之義故云別也如來下先總釋大意波斯下別釋經文五篇者一波羅夷二僧殘三波逸提四提舍尼五突吉羅七聚者前二同前三偷蘭遮四波逸提五提舍尼六突吉羅七惡說待其下責其漸制也多問於王者既問國法以制戒律則是以王參議篇聚漸制之事故經云何故不為王說是法門等也戒是下今經頓制扶律顯常故名深妙經云或時等者今經頓制故深已前漸制故淺今經食肉則犯已前食肉不犯此責佛所說不定也第二問墮下合云第三問律第四問木叉如文然則前文已列不假更言若爾則文剩第二問墮四字也而不下此約律藏五種異名與經和會也五名者一戒二律三誦四毗尼五木叉經但問二而義兼五墮非異名蓋約所犯之報耳五名如釋長壽品記文云云舊用為五問者以據有五段故今師以答雖五段義只有四以木叉重出故是其義者木叉本翻解脫而含知足等義次答墮者經中三義明墮前二就受報後一就造因於前二中初一通對四趣後一別對地獄而疏文次第釋出墮通輕重者準律唯第三篇名墮此則不爾犯五篇戒墮四惡趣通得隨名重則地獄輕則三趣也偏在犯重者以經云乃至阿鼻故此據初篇明受報也八大獄中阿鼻最下故曰乃至長養下應云此偏輕重疏云此偏在輕者文誤言長養者由破戒為因長養三惡輕墮二途者謂僧殘已去總名為輕則墮鬼畜初篇名重則墮地獄故經云長養地獄畜生餓鬼也據經三義以初後對中則二通一別以初後明四趣三途通輕重故以初中對後則二果一因據律及餘經五篇俱墮獄隨機教門異故此說不同然此且對戒有輕重而明果報差殊若論作罪由心應以心勘若重心破輕戒得罪則重如以無慚心撥因果等名重心也若輕心破重戒其得報亦輕即不起上心偶爾破戒名輕心也故明了云破戒得罪輕重不定也重答木叉者以離三業不善是解脫義故入戒威儀者入猶染也文選云玩其所以先入注云入染也此謂染習三藏應以入字貫下二藏制斷重罪名入戒即初篇也遮離輕過名入威儀即下四篇論藏辨柝經義發生妙慧故云善義從輕至重者以少為輕以多為重謂因事漸制始從初戒至今斷肉則從少至多也經滋蔓者滋益也蔓延也謂添益延長也左傳曰無使滋蔓經納衣謂補衣人也譬頓教者即梵網頓制輕重不待因犯也會漸歸頓即今經即捨位出家者輪王之法至其年老即出家學道以紹仙種頓漸開合者謂已前從頓開漸今經合漸入頓皆佛隨機口密故非凡小所能圖度等經能說法下即是感應道交非感而感非應而應同契祕藏俱不思議一相四相即理而事也四相一相即事而理也非一非四等者只是雙非事理雙照事理爾故知三諦一心理事不二今文正意且明即事而理也三德下云云者指哀歎品三點文也證名自正者即經云自正者所謂得涅槃也得謂證得故云證名自正也常破下次第貼經可見名異體同者謂所證涅槃能破真常所演妙義伊字三點四名雖異其體本同以涅槃必三點三點不縱不橫名為妙義而此妙義本無遷變故曰常存四相一相旨在斯也故云更非別法等上文下釋經解脫至成祕密文也上文即衰歎品法身為別等者彼云摩訶般若解脫之法如來之身皆非涅槃則以三法具足方曰涅槃故知涅槃總釋三德今以下即經云解脫涅槃般若成祕密藏也則知涅槃是法身異名故云為引祕藏既收三法故得是總然顯下明祕藏之名亦受別稱以經中或以果上所顯名法身因中本具名如來藏故知藏是法身異名非別如何或時下蓋隨文用義稱可物宜故使法身總別不定解脫下以二德例法身也故知般若解脫亦應為總為別三德互融其體不二故經慧眼即佛眼也經假使下反質釋疑今開為四初疑二質三答四通疑云四事本殊云何為一言是一者是虗妄說即以虗空四名一體而反質之質亦問也一名虗空二名無所有三名不動四名無礙不也下答誠如佛說以空為例四相即一非是虗妄故云不也如是下通諸句即四相所謂空義者如空四名一體也世界下云云者且約三點不同是隔別義又此四悉俱約理明雖有四名義無高下名異於昔者小乘中無四名故昔滅因縛者因縛即見思煩惱其因既滅其果必亡故云無依正空不具法故使涅槃無有依正無別涅槃者只指煩惱空處即是涅槃更無常住實理可證也有常住法者煩惱既不滅而滅涅槃乃無常即常滅諸有者滅二十五有而證但空有妙有者三界雖空即空而假理具諸法故云妙有有所師法者即依報以約事而談唯己身是正報師徒眷屬皆依報故今以所師之名當依報也所師即是常住理境有如來者如來是人故屬正報此皆懸取經文以示異義至下釋經自顯故不委記若不下結意也出名與昔同其體永異故須料簡一明下滅惑是滅因滅有是滅果滅依者以經舉如衣壞盡衣是依報故滅正者以經舉斬首故似作三難者文雖二段難意則含三道而不顯灼故云似也有即三有果報即苦道也故得有有者以惑潤業故有三有果報也那得妙有者因滅果亡其理決定云何大乘滅惑而存妙有耶復生別惑者斷粗惑已細惑顯現名之為生名常下云云者小乘聖人既受變易故名凡夫五凡夫論等覺望佛尚名凡夫豈小聖望大不名凡耶故凡夫之名該乎二邊躡前兩意者即凡夫與佛常無常意也轉譬者謂轉換前譬也如文物謝下瓶體已破是物謝於前有破瓶名是名生於後以喻無常惑滅而有常住理存此則不滅而滅名為惑滅言偏意圓諸如此例經諸煩惱結者即以中道無漏之慧破二邊衆生通別煩惱故云諸也是則無漏智火能銷凡夫難融之鐵我淨下云云者經云安樂之處已舉樂德義必融三經遊諸覺華者涅槃如園園必有華即七覺是故下經云布以七淨華也六道殊形者如下經明示為犯重乃至大鷲等皆佛聖人所作餘七方便人不能為也殊形下似剩為遮二字或別有意今開六道九界是法身名開身密也涅槃即是法身般若者以涅槃是總三德名故開之既是般若合則總含二德今更開法身等者此即開出之開非開顯之開也只是下例前應云只是涅槃涅槃即是般若解脫文省涅槃即是四字耳問開法身出種種身合則應云合種種身即是法身何故云涅槃耶答涅槃即法身異名法身體融豈隔二德約今經名相為便故且以涅槃總名以包餘二然法身等名或時為總或時為別事如前釋一物覆等者他謂已前三密俱覆說四相已方開口密故云一物開口密雖開身密猶覆故云一物覆顯身密時意密猶隱故云一物顯等故須遍說三乃俱開以身口意三義不同故故云各開各顯等然顯只是開隱只是覆綺文互異各立二名理豈下今謂三密一如色心不二覆一所開則三密俱覆故云只覆於開開一所覆則三密俱開故云只開於覆是故三番各具三密從多而判各立一名如品初疏文已說成論下三家解變化義論人謂下經明須彌入芥等皆聖人權巧故凡夫不解其事既推屬聖人故置而不釋今明下今破餘何可解如經所談無非聖人境界既皆釋義驗悉解知那於權巧獨云不解地不同論師推為聖境而自釋云納芥等事是法界用也意謂由聖證得涅槃法界之體故能起此大用若據此義稍近今宗但不云體用互融故招今責今明下今師責其不融也他明下巨即須彌細謂芥子聖人術事者謂聖人大用如世人有術法而幻變自由故云術事今明下今斥且以用喻術其義或然而聖人術用之興豈可徒設必藉機發然乃施為感應道交見如是事故云何有一術而非因緣因緣即機應也或因於凡而緣於聖或因於聖而緣於凡豈非聖由三千理滿故能應凡由三千理具故能感應遍機遍咸即事而理故云因緣即空假中欣赴不差即理而事故云度者乃見寧非因緣者總結大用必藉因緣但云術事未為雅當故知今家釋茲大用存乎二義一者用不徒施須明感應二者體用一如非單就用故地人他師兩家立義其旨大同但用以術事名少異耳前斥地人且以體用相即為破後破他師具約二義因緣妙慧等者只聖人內達凡聖一如理事不二故得外用巨細相容故云能以一塵等內外且殊心性唯一一塵等者即下經云住大涅槃以十方世界內一塵中也故云一塵容無量又云無量容一塵者只是反覆釋成上句則是一塵之中容入無量國土下句還云無量國土容入一塵之中亦如云須彌納芥子芥子納須彌也有本於上句容下添於字下句容上添不字於是語助於理無乖若加不字全無義旨暹記曲解事同穿鑿未治本中亦無於不二字延促過現者即延一日為無量劫是延現短令長促無量劫為一日即促過未令短為成句故但云過現義必該三此延促事今文雖闕餘文有之既論大用說之何妨引擲彼此者謂引彼歸此擲此往彼即經云斷取十方世界置於右掌擲置他方即擲此往彼也又云斷取一切世界悉內己身即引彼歸此也自在無礙者結上三雙悉由內證妙體外彰大用理事體一豈有抅執隔礙之憂耶莊周下舉劣況勝莊子云栩栩然胡也自喻適志與不知周也俄然覺然蘧蘧周也不知周之夢為胡與胡之夢為周與周與胡必有分矣此謂物化也達體者謂周達了身體化為胡也昏恍下謂周昏恍之夢尚達八尺之軀為彼小蟲二無妨礙況彼聖人內證至德巨細一如豈有塵剎延促而不相容哉此言名聞者以德齊太子天人知識故曰名聞宮生者佛出家後耶輸有娠有胎六年生於宮中故曰宮生又云翻覆障亦障月經能建大義者謂佛住涅槃隨順機宜普現色身彌亘法界豈只納妃生子而已故云大義義宜也所現之身所立之事有所宜也下諸復次皆是建大義也通舉菩薩者蓋以分真況出極果故先通次別初中下釋初復次文中但引古今以明建義之位若巨細相容之旨前文已顯此無復論但是信住者通至等覺悉名信住唯以果佛為真住也非關菩薩者若非菩薩則顯背經文以經皆云菩薩住大涅槃故若是信住等者意謂大義唯佛能為逈出因果者涅槃是理因果屬事理非事故故云逈出雖非下明理體虗通不礙於事故云而能因果若將下謂理體本一悟解淺深故分因果分真所顯名因涅槃妙覺所顯名果涅槃此同普賢觀云大乘因果俱是實相也從初發心等者若論圓位始從名字便觀涅槃今明有用的指分證經初復次文有二段初明應二唯應度下明機初應又二謂體及用住大涅槃內體也須彌山去外用也從體起用用必被機機應互融二無二相巨細相入何所怪哉下五段皆爾此生應現中緣起見瑞應經二卷須者往撿經林微尼新云藍軬扶晚反尼此云鹽即上古守園婢名也河西下引三家解七步義南方下引諸家解十方義冶城示過六道但可表三藏佛也非今經意以南為右者西土之禮君父師皆東向而坐故以東為前西為後北為左南為右謂言死地者秋凋萬物如死也梵本言勝者以丹曰此云勝故經毀禁示作霜雹者治罰破戒如霜雹之摧苗稼也經天祠者即大自在天廟也祠似茲反爾雅同祭也經師子璫者釋名云穿耳施珠曰璫中天悉穿邊國則不事備西域記經角力禮記習射御角力廣雅角量也呂氏春秋注云角試也字皆單作或從手作捔者非乃古文粗字耳辨餘生者謂過去於此閻浮出家等也重辨此生中經以草為座等亦如瑞應經說經頭目至木槍償對者事載興起行經過去佛為小兒見捕魚人探魚著岸上在陸而跳即以小杖打魚頭以是因緣墮地獄中無數千歲我今雖得成佛由是殘緣我得頭痛又由過去為剎帝利力士與婆羅力士相撲挫折其脊爾時殘緣故有脊痛又佛過去為醫子與病長者非藥病遂增劇便致無常故有骨節煩疼病生又佛入羅閲祇乞食見此里中有破剛木長尺二於佛前立佛便止念此是宿緣乃至佛上梵天木亦隨上世尊後還竹園僧伽藍自處己房佛展右足木槍便從足趺上下徹過入地佛說本因由過去為賈客爭船以鉾刺他腳徹過命終今受此報此等因緣竝在興起行經上卷須者往撿木槍千羊反說文槍拒也三蒼木兩專而鋭曰槍經文或作鏘非說文鏘鈴聲也經博奕文選博奕論注云博者局戲奕者圍棊經初無衆生師想者初猶都也謂從初至末不作師想也經如來正覺下是總結諸方便經迦葉以是下是總結經彼器無常非如來也辨法異喻不應以喻難法經釋那含云不還來二十五有者然那含但不來欲界今通云二十五有者以上流人於上二界但一經歷更不重來也一云下他解也然但據一生歷經不於色等諸天重受身故其義自通何須局作欲界而解故向經云阿那含者非數數來豈非於色等諸天但一經歷無重生義云非數耶大乘下今師義也此則名通義圓不受二邊即初住人也此約今經開小入大取意而說非正消答難義也四相品下通開三密者正開意密兼具餘二不須偏說者斥前兩家方便三業前三教也真三業者圓教也咸令下衆生是他意業屬心身口屬色心知佛心眼見佛色故云知見示諸下示寶藏口密顯額珠身密置祕藏意密我從下常說口密我今下身密若子下意密我解下解一句口密見佛性身密佛性即法佛見應是法故屬身密入大涅槃意密此皆一往對密義足故注云云開密下云云者應以四句之文各配三業已如向釋無開無覆者開覆由情理無二異龍樹別意者且據般若明菩薩是佛因於義易解故非密法華二乘作佛與昔教反於義難解故是密若論開權則法華是顯般若是密龍樹別意具取淺易為顯示耳人師不解則害諸經此文下出害輕之失且如此經亦以圓常斥小無常豈以斥小便是不了義教耶緣有開覆者昔小今大昔覆今開經咸令下據佛本意既證妙理欲令一切皆共得之為昔機生故且說小豈同幻者不欲人知據佛意則理無開覆隨機緣則教有顯密經愚人不解等者聲聞小教元為佛乘迷故不知妄取空證唯開無密者大機已發故即經云智者了達也經責主者字應從人作債側革側賣反二音俱通切韻負財也經隱不欲現者以藏平聲避釋藏去聲義也向下經中牒名作去聲解義作平聲思之經而亦不藏平聲佛如富人缺責而不藏避但彼自不來索耳故向云如來不爾也經何以下釋不藏意父之於子豈有藏避而不欲與子之財物耶豈有行因等者興皇意謂不但因中本誓度生得果亦為度生但衆生界不可盡則本誓未滿故如負債未還俱不異河西者以二師俱約度生不盡以釋唯負之義故也兩釋者謂初約負貸次約荷負初心謂初發心住得果謂妙覺極果住前弘願誓度衆生猶如貧時取他財寶名字已來法財未備義之如貧初住分證猶如小富妙覺究竟譬以大富俱能不忘本誓垂十界身施三輪化喻如既富力可還財故云能度衆生其無機者不肯受化猶如其人不從缺責之主求索元物主雖欲還無人可付故云主當與誰彼自不索我無負意但以未付義言負耳故云實無所負下龍王譬義與此合龍降大雨普欲霑益不下種者自無收獲其猶自不來索非主不還又佛下約荷負釋也猒棄諸有者有謂三有分段變易俱有此三則是誓令捨棄二邊則世法之言該乎三教前云世間三昧義正同此出世之法即中道圓常也始終不捨者始因終果不捨此誓荷負衆生其堅如地若作荷負釋者則義與喻反以喻云貧人多負是缺惡故是知負貸義正荷負傍通負貸者他代反切韻云借也施也假也以物與人應更還主經典釋文他特反左傳曰盡於家貸於公今久缺負未還故云負貸經永斷此根者若以小乘化我則墮慳貪慳貪之過喻以穢根唯施小化其猶衣覆今無緣普被實無慳貪故云永斷經唯有一子者一切衆生皆同佛性名一子無緣慈力天性相關故云憐念師喻法身諸佛所師所謂法也將以此機造詣法身受學圓頓經懼不下以其大機未熟恐其聞大起謗墜墮三惡故云懼不速成故隱大施小以丈六應身為說漸教故曰將還其文問答者經善男下佛問也不也世尊是迦葉答也經如是下即是結文經祕藏平聲舊引下古師據常存之語是佛用大乘合毗伽羅滿字論喻也故知小半無常大滿是常無常通大小者他人通難也古以十二年後悉是大乘而般若方等法華猶是無常唯今經明常住故大品是大乘而明無常也並云下興皇並也汝既據半滿之論以喻大小既大有無常則滿亦應爾經既以滿字獨喻今經則使今經反成無常也今明下約四教以明則常與無常不可剋判大小也以三藏唯小後三是大而此四教橫遍五時則前三味何妨明常但祕而未開偏小相隔常無常是通者鈍根菩薩證與小同故無常利根被接見中道理故是常別教初心便知中理故是常圓人三諦始終融即故云即常等經云常存不變即圓教三一互融之常也分別衆經者則華嚴二教鹿苑但小方等對三般若帶二常與無常區以別矣何妨大品有常無常波斯匿者新云鉢邏犀那侍多此云勝軍致招此過者抑實為權謗佛所證致感現報過應作禍謗佛是過𠍴舌落是禍報彭城下引事顯經猶尚不易者舌雖已爛猶說無常案梁僧傳即宋京師中興寺僧嵩也應是先居彭城故今云耳故傳第七云嵩亦兼明政論末年僻執謂佛不應常住臨終之日舌本先爛焉佛答下先分經聲聞下釋義舉積明無積者先舉財寶是積聚物聲聞菩薩以不畜此名無積也無積之積者不積世財而積智斷積之無積者雖積智斷不積八不淨財聲聞是有為等者正釋無積之積經文也非時取證即不待說所因也積聚智斷取證涅槃菩薩下釋經如來行也如來是果行則是因行行之人名為菩薩名無積聚下云云者菩薩不滯空邊名無積聚而實積聚中道智斷也故經云無為積聚即如來行准疏主意即約世財等展轉以論謂聲聞不積世財而積無漏菩薩不積無漏而積中道是故大小俱有二義經所謂下即八不淨財以此經扶律談常會漸歸頓是其正意故約聲聞更廣明之若菩薩僧則不積涅槃經文存略經卷縮奇員反詩云有卷者阿傳曰卷曲也問經文前明積聚有二與後僧二何別答前約二僧所證法後約能證人經是名知足者聲聞不貪不淨財名知足而捨生死貪求涅槃之食名不知足菩薩達生死即涅槃更無他求名為知足經迹難尋者二乘之道非凡夫所知菩薩之道非偏小所知故知鳥迹人不能尋開小即大故近佛道經雖去無至者雖去生死而證涅槃達生死即涅槃故無所至知足是樂者無貪求之苦故難尋是我者自在無拘故無至是常者理無取捨故有道故無集者煩惱即菩提故有滅故無苦者生死即涅槃故經星辰諸宿者五星北辰為衆星所拱故別舉之諸宿即二十八宿也三點不相離者廣大即法身無瘡疣即解脫處即般若以是智所照處故且從能以屬般若伊字三點既不縱橫故所譬三德一一相攝今此三段皆明解脫而具三義者是即一而三也體用成就者法身為體二德為用自他具足者佛證此三名自衆生理具名他既自他性同故至果位自乃益他義理粗周者謂據經文三意而有三德互融體用成就自他具足之義也貴在正法者謂一人具八也謂一少欲二知足三遠離四精進五正念六正定七正慧八不戲論如四依品初釋也又大乘藏中別有八大人覺經一卷須者往撿此總翻彼總者大滅度是此方總名經瘡疣羽求反肉之凸病釋名疣丘也出皮上聚高如丘並喻三惑亦可瘡喻三惑疣喻二死經有信之人者即名字位人起圓信心加功不已定至分真涅槃也舊解下出四師釋是色佛果有色者謂應色無窮異彼灰斷又一下次師自有二解佛果無色者無應色也而言下正釋經文是色之義蓋取妙慧有見理義故云是色實非質礙二能應下即此師第二解也又有下第三師三聚謂色聚心聚非色非心聚二聚非色者心與不相應行也取色下正釋經義謂經云是色蓋從譬得名而所譬佛果實非色也興皇下第四師也不應安或者或是不定之辭經文既云或有是色等諸師何得定作色與非色解耶聲聞下約法身二用以消經文桎梏械也在手曰梏在足曰桎音質谷兩緣者大小機也為大機說色故常存為小機說非色故灰斷故云故言色非色也非色下二句顯體性融即無常即常故云非色亦色常即無常故云色亦非色次一句結成故云色非色不可思議也有本云非非色者文誤故知興皇但云為小說無色為大言妙色者豈曉二體本融哉經云何得住者假執昔教為難佛答舉非想天為喻以彰二乘得解脫非色亦色是以得住豈非二乘涅槃全是無明無明即法性故得住也經非想亦色非色者佛說四空有色諸經大同華嚴宣說菩薩鼻根聞於無色宮殿之香阿含經中說舍利弗般涅槃時色無色天空中淚下如春細雨波闍波提般涅槃時色無色天佛前側立故云亦色衡音者讀經應行字為句首云行解脫之義也八十四五者但數又解脫為頭但八十四九十七八者加十三夫解脫者只九十七略不可解者不稱經旨故不引用靈石寺名在台州黃巖懸重言惜哉者嗟嘆之甚也備於下明句句中備上略說三義也橫竪即初舉廣大義以前文法橫譬竪義互現故到解下前解脫處有二謂自解脫及調伏他何者下徵釋各具前三所以也以即一而三故使解脫具斯三義止可下謂百句一一攝三而三收盡百句即三而一即一而三其理幽遠只可內心懸照而已安可措置言辭而解說乎蓋云言不盡意也為力不足者疏主謙也雖欲效智者作方句廣明而且患智力不足論語冉求曰非不說子之道力不足也鑽仰下明略釋之意雖力不足而鑽其堅仰其高耽玩不能休已因是專輒分文也論語云仰之彌高鑽之彌堅瞻之在前忽焉在後廣上無瘡疣義者初句云遠離繫縛末句云於諸衆生無有逼切繫縛逼切即二死三惑俱名瘡疣其間諸句義皆可例故此三紙來文正明解脫義也廣上解脫處義者初句云無動末句云闡提不生一念之善解脫無是事等豈非智能照境不為二邊所動故云無動無二邊惡故云解脫無是事等故此二十七行是明解脫具般若義廣上性廣博義者初云譬如穀聚其量可知真解脫者則不如是末云如幻物不可執持解脫亦爾不可執持廣故量不可知空故手不可執空體無量亦即廣也故此一紙十六行文是明解脫具法身義下之三段重廣上義比說可知讀者至文句句消釋令順三義遠法師云一句中應具五意一列名二解釋三結四即如來五難解者重更分別而文中多少不定或有初無後或有後無初或有中間而無初後於解釋中或但法說或兼喻說喻有反順其順喻者則云解脫亦爾其反喻者則云解脫不爾法喻相對前却不定或有初法次喻後合或有先喻次法後合或但法喻無合文相不定應預知之至文易曉前三段經疏文無釋經清夷羊脂反說文夷平經卒得蒼沒反經聲㽄蘇奚反埤蒼云瓦聲散也作嘶者非蜱麻字宜作𦳈三蒼布迷反草名呂靜韻集云𦳈麻其形似樹經文作蜱音脾螳螂子也非此所用經𪹼裂方孝補角普剝三反說文𪹼灼也謂皮散起經婆師華正云婆利史迦此云雨以此華雨時開故經是名曰恆非不恆者以人天趣必歸磨滅故身壞命終是恆定法而喻解脫滅惑離苦是恆定故彼此相對者對生死此岸說涅槃彼岸此相待義也若雙非下若絶待者生死涅槃一如無二故云如非彼此此彼既去者謂相待既去故以雙非結顯絶待之名例如下舉例既許絶待涅槃理非小大而結名大般涅槃故可例今絶待解脫非彼非此而結為彼岸也經畏虎墮井畏生死虎墮涅槃井即小乘解脫故大解脫不爾也經而子堅實者反迷成悟如從竹生子經增益於我者理智自在名我經食已而吐食涅槃吐諸有經七葉中無者七葉華臭決定無香解脫法中無煩惱香經修無我自小入大故曰入中汲引小乘也隨順於師譬智順於理取四鈍者義通界外方合經旨因斷多分者破十一品無明故果斷一分者妙覺唯破一品故皆稱佛智者四十二位悉圓證故皆非斷非不斷者如法界理不當二途不斷性惡而斷修惡即修是性全事而理故云斷即不斷理外下生死反理故云外涅槃順理故云內有所得諸道者以有所得釋塞字義封執四句名有所得若我下經文但列三句者以兩亦只是我無我相對故四句皆除名無所得理內之我者即法身自在即理內我四句執計名理外我即是雙非者斷之一字是能非中道塞諸道三字是所非二邊經所謂下列塞諸道耳我即有邊無我即空兩亦是有雙非是空明哲自見者哲智也經不空空者有四德故不空脫二死故是空尼犍無四德故空又非解脫故曰空空三跳他吊達澆二反謂懸擲也問經以三跳喻三諦何故疏主指此別結上文耶答據跳遠怖故對無疣三歸向正故對脫處此亦一往就義分文對之若論譬本譬法三跳離怖必有所歸則亦結脫處三歸向正理合翻邪則亦結無疣他解下以獦師喻魔外怖鴿下引證歸僧去魔尚近身子習氣故鴿戰怖習氣即煩惱魔也前是下此文對後論義故云前也文云怖畏生死等者即怖二死歸三德此明即一而三是三字義以三下即三歸一故曰三歸是歸字義經佛名為覺等者佛即能觀智故受覺名法是所觀境故名不覺境智和合覺即不覺不覺即覺十界依正悉我自心三寶一體其義皎爾經虗空名非善者遠法師云非戒定慧中行善也謂法性空體是勝義善攝寶師云是無記性故對佛說名非善經摩訶波闍此云大愛道瞿曇彌亦憍曇彌此云衆主出家為衆生故是佛姨母佛生七日母便命終波闍乳養佛後出家波闍憶戀手自織成金縷之氎待佛還宮擬用奉佛佛後還宮遂用奉獻佛時告曰恩愛心施無大功德當供養僧若供養僧即供三歸故今舉波闍次問佛後為解初領旨者即經是義二字也云何下者復應引上是義二字連云何字說之亦兩向取文耳經是事不然者無生無滅其辭雖同其義全別以頑空無知解脫有知故也經迦蘭陀亦云迦蘭䭾迦下云迦蘭迦是也鳥名其形如鵲經身亦不同者以佛但云聲不同故故以身同為難或言一三者即一而三是昔別相或言三一者即三而一是今同體害佛下以空譬身如逆罪成空不可喻如身不壞經穀𧂐子四反埤蒼𧂐積也經領解中具領三義如來至處是領上解脫處境智相應也處若無盡是橫周壽命無盡是竪窮即領上性廣博包攝無外也處壽既俱無盡則患纍都除即領上無瘡疣也已蒙廣說三義故今具領其旨四依品釋題中初略釋一切世間者謂九界三種世間依憑佛界四人得益也憑有下廣釋文具四悉皆以今昔相對以昔教制不依人今經依人故須相對以成四義憑自即昔教憑他即今經若唯下顯昔非若憑下明今是問昔令依法依義等本名四依何云不名為依答但得名四依不得名四依人以今云四者悉約人故兼得法者昔簡無法之人故令不依今人有法故得依憑利益義強者即赴他樂欲是世界益直論下明昔若得下明今人若得法此人可依依人即依法故人必有法得法即是理善發生故屬為人人雜真僞者鹿苑初興外道猶盛儻令依人恐親賊住故須依四諦真法以簡外道僞人所說既邪不以形親所說苟正不以形疏法混大小者昔已施小今方說大大雖會少而小教猶存故真空涅槃之名大小淆混新學初機無以甄別故令依大人簡小法人既大乘則所說非小今依下對昔顯今昔不依人是簡邪人今令依人是依正人故此正人必有正法依憑取解以破邪小即對治義法亦不遍者既捨人依法非但人處無法亦是法不該人故云不遍且法是真空空本一致故無二別若捨人求法何異捨此虗空以求彼空人即秉法者人處有法妙理統收既無取捨有入理益是用下總結四果非正人者以大斥小故云非正不得至之像者既在滅後若作佛形便濫佛出餘像難者者若言作四果像化道易行則應作餘九界像化道難行也若言難行何故首楞嚴三昧經中明菩薩住楞嚴三昧現種種身化衆生耶通論至四果者通論則現十界身無方利物別存則示四果像滅後弘通自有下雖許通論悉作而順前問且以四依對如來四果各成四句共成八句約數雖八其實有七以四果不能為四依則是無四果為四依句也前四句中初句則是妙覺現八相也此亦本迹俱高次句即本是極果示為因人此亦本高迹下也如文殊本是古佛而於釋迦滅後結集宣通一性宗義即其人也三句即分真菩薩示為八相此如觀音應以佛身得度即現佛身此亦本下迹高也四句即是依其實證而言次位也此如馬鳴龍樹皆號菩薩也望前本迹俱高應是本迹俱下此第四句又為下對四果句中初句則須兩向取之次對四果明四句者前第四句於此成初即同前四中如來為如來句也次句如迦葉阿難法華開顯已是分真滅後弘通還稱小聖則此句正是今品意也四句即如滅後小乘師也既小乘不能現大故無第三四果為四依句若據現文的唯六句若以四依為四依句兩向取之則有七句總舉則八問若言四果不能為四依像者且天魔尚為毱多變為佛形豈羅漢神通不能變身為菩薩耶答雖能變勝身不能說大法今品正依有法之人故云不能耳今取一途者則取化道易行故然若曉此文各開四句方識付法藏傳二十四祖俱是四依大士而說其人或小或大即是四依為四依四依為四果二句所收或是如來為四依則具三句乃至此方古德果是小乘而弘大法者其例亦爾今從至四依者涅槃即所證之理四依即能證之人雖所證理同而能證位別即理而事故云從涅槃開出四依合則至是佛者四依位殊一理無異皆稱即佛佛即涅槃故云合則還是佛此乃即事而理也是佛下多為四依三字蓋昧者妄添未治本云合則還是如來亦無為四依三宇荊溪但改如來為佛耳問何下初令阿含昔教後令即是今品答中初出世即道樹初成今人鈍者正於滅後人根不如佛世故制依人言今人者滅後四依化世是今品所談故曰今人文云下顯今亦令依法非獨依人法性是法如來是人三十心前者即十信位也以未破見思故是弟子是師位者以三十心中斷二惑故即初依也皆師位者謂四依皆是師位成論下約十住十行而以四番分師弟位六心已前者六住已前斷思未盡故是弟子七位下即七住斷思盡故得是師位十二心即第二行道種終心者出假位極故也此成論師四番定初依位極至十行即以十回向去配後三依初有煩惱等者即中論師消會經文以經說初依具煩惱性故彼謂初住方破一品存者尚多故云有也由具惑多故則無究竟涅槃後有下涅槃究竟在不久故云有微細無明唯一品故云無初後下以四十位皆有上地無明皆已分顯中理他人下以於初地立二依故中論下彼以初住破無明即是圓義若以初住配初依位則未全當成論下若三十心中立初依者其義可然以初依具煩惱故但論師第四義初依極齊十行二依即十向十向仍具無明豈是二依須知經明二依已破別惑故云於中立依即是斥其於三十心中立二依有過耳別教二依定在初地圓在初住彼云十向故乖二教今約下今師判位地上至三依者者即初地至六地為二依七至九為三依十為四依就圓下示圓位通別四十心共作者十信為初十住為二行向為三地等為四別者下以圓破惑位長故此配位餘皆例爾者即行向地各各分對三依皆例十住但初依一位定在十信以經云有人出世具煩惱性是名第一其位則定初依唯弟子者以別惑全在故後依唯師者居分真之頂故亦師亦弟子者望下稱師望上稱弟子不令他緣者不令魔外凡小擾亂己行也此如毱多降魔龍樹破外則是於有法處能護也於無下此如摩騰入漢僧會來吳則是於無法處建立也又有小無大處建立大乘益他中由前自無擾故令他增上由自興顯故使他見聞由自住持故他依止不得至惱事者通惑已斷則無界內現行之事別惑被伏事亦不起但有別惑性在名具煩惱性問別惑事者何等是耶答理即凡夫不了自心遍處起著名別惑事今別圓內凡達了諸法無非佛性名伏別惑不起妄執名事不起初地至六地者以教道所談則初地名見道二至六名修道七至十名無學道故二依位齊修道也准通下二依既約通判則知初依位在性地所以但約三教判者以經明二依已去皆破惑故三藏菩薩煩惱全在故不約之又三藏教理俱權別教教權理實通教通別通圓故釋四依唯後三教見地下見地與初果齊薄地已斷欲思六品故得薄名若准下如金光明帝王經說圓人有一生超登十地之義故欲界身在尚有虎根之難例知通教亦有一生至第六離欲第七已辦地者故有未離欲界肉身之人注云云者意在於此然文中略應云見地至離欲地是二依若第七地屬第三依也是八九地者應云七八九地文略七字圓云八住亦是略舉准小下以三依人外現阿那含像故且準小乘判位則阿那含此云不還即不還生欲界也準大下且約通教七地正是三依則思惑究盡與羅漢齊故不還三界云云者若約別圓則不還變易然此三依既約大小以解名義則前二後一例亦應爾如初果逆流在小可解別圓則逆變易之流也第四下約通是八地別圓即十地十住注云云者如前約分真四十位各作三依以對住前為初依等戒慧二學者經從若有人至正法戒學也從佛至文義慧學也化他者即經云轉為他人已去說八大覺是生善教令悔懺是破惡總而下即指經文善知去二句是約權實總結謂自行化他悉有權實也遺教經者問馬鳴遺教經論判為大乘而天台智者於法華玄中判屬小乘云何會通答是㭊法六度故云大非談常辨性故云小以初教三乘同名小故以凡簡聖者即初二句以聖簡凡即次二句以因簡果即後二句而定下釋三番簡意謂前二番顯初依是內凡非分聖後一番顯初依是菩薩因人非佛果人有本於是凡字上多初字文誤也用共地釋之者佛以通教位釋此乃名通義圓也疏解八人有二義初謂八人即是八忍故云是斷道即前十五心也又從下從第十佛地逆數向前即八人地正當第八別惑等者即初住破無明顯中道也若約名通義圓則是八人見地也修道下即分證涅槃由住前修道而得心純是法者以無功用道自然流入故無非法舊云下古人二釋初約三界即欲界定為第一色定為第二無色為第三次約四忍即以伏順合為第一無生第二寂滅第三以前簡後者以前初依簡後二依則阿那正是第二以後簡前等者第二即四依第三即三依準小下引小乘例釋如阿育王經以身子為第二世尊等此人者正指第二依人然依疏主所釋義已盡善今以管見聊助一釋應知經文正明二依則以本位為第一故三依去本依當第二四依當第三也古來下重引二家河西之意即是果上從因受稱故第四依從三依升進而得故使第四且名第三下二例爾觀師乃合四成三曲消經語凡聖兩人者凡即初依聖即二依依增下即觀師引所憑之文同是功用者此二同破欲思未盡但名功用三依已離欲界且名無功亦不應等者正破觀師既於初依已破通惑尚齊羅漢豈得依增一將二依作實行初果等釋耶經客塵等者僧宗云三界外惑為舊三界內惑為客不藏下藏平聲經云真實舍利即是法身則知應身肉骨名虗僞舍利也骨肉下明昔施權覆實今法下明今開權顯實經云我者即是邪我云無我者即是中道不思議空無二邊之我經不久成菩提者即指究竟菩提耳初文下釋證相中點出羅漢名含三義果喪即無生義餘如文不教菩薩降者自能體達魔界佛界一如無二故經我今不依等者意謂如佛昔說魔尚能為佛像豈况四依是故我今依法即得何用依此四人經面部圓滿者部應作輔後人妄改為部也左傳曰輔車相依脣亡齒寒先儒解云輔謂頰輔車謂牙車周易云咸其輔頰舌孔頴達曰輔頰俱為口旁之肉大論三十二云方頰車相是也經汝當檢挍者令依小乘法義撿校也如來昔為美音說四諦彼悟初果如來去後魔來惑亂化作佛身告言長者我向為汝說法不盡於四諦外更有一種神我諦在長者推尋都無是理遂往白佛佛即教之若魔作佛汝當撿驗知已降伏崔師羅新云具史羅一然問者然猶許可也智照下令依今教用實智圓信於佛下以佛况魔權實二教俱佛所說尚須簡權信實况復餘人魔魔外等偷狗者偷謂盜賊狗謂狗犬世此二物皆好乘暗私入人舍五尸者未見文相傳死狗死蛇死人死猪死狐也五處謂頭及兩手兩足也若付法藏傳及阿育王經皆云三尸繫項不云五繫也故彼經第五云毱多說法魔王化作天女作天妓樂惑亂人心未得道者心皆惑著乃至無有一人得道毱多入定觀察魔便以華鬘著毱多項上尊者即觀知魔所作尊者作是念魔數壞我說法佛何不降觀佛本意欲使毱多而調伏之毱多即以三種死尸一者死蛇二者死狗三者死人以此三種化作華鬘即往魔所魔即申頭受鬘多以三尸結於魔項魔見三尸著項而作是言豈應捉是死尸著我項頸耶尊者言如比丘不應著華鬘而汝著之亦知汝不應以死尸繫項而我繫之乃至魔自力不解乃詣梵王求解梵王答言十力世尊弟子所作我力微弱終不能解魔乃歸依毱多毱多語言先當與汝作要然當為解從今日後至于法盡更不聽女惱亂比丘魔曰當受尊教乃至令魔現作佛身魔言我本曾現佛形誑首羅長者彼時所作今為汝作云云與付法藏大同五不淨謂種子不淨等如釋列衆記文五門即苦等四及寂滅也經若能如是等者謂佛令依四真諦法檢校於魔自近涅槃何必依人言大般涅槃者且執昔日真空名為大耳經未必可信者恐魔現作四人故雖天而肉者雖有天眼徹山壁障而不徹心性之理何殊凡夫肉眼以俱不徹理故雖肉而佛者學大乘者雖是肉眼既達妙理故即肉眼而是佛眼達魔即佛凡所有相皆是虗妄如是觀者魔無能為注云云者聲聞已得慧眼但見偏空不見中道故與天肉二眼同不徹理經文從初且舉天肉佛教聲聞中釋譬皆依昔教不應濫用圓義勇健譬佛性者文剩性字只應云譬佛所謂佛具無畏稱曰勇健十力摧邪說為威猛念處如弓者下乘修行道品念處最初其猶將射必先執弓應以彎時喻正勤五善根生喻如箭發又根深難拔亦如箭也運通化物如矟㓨人疏闕長鉤應喻四辨教戒者持戒嚴防豈怖毀犯視他者即經云視人天也無漏三昧輕弱邪外教慧者真慧觀察是名勇健經種種器杖者杖經典釋文直亮反左傳曰杖戈而先大呼者呼虗故反恐他也招彼曰呼平聲五諦下於諦陰界入之外皆計神我故也經不生憂怖者如美音之檢察毱多之五繫也經下從他習者下同怯弱者依附他人習持弓等也內乘下解第二段釋不降經文也外憑佛力者即指已曾供養去經文也經如彼藥力者依經修觀一切唯心不畏衆魔如藥消毒經憋惡者脾滅反方言憋惡也郭璞云急性也經或以眼視等者僧護經說有四種毒龍謂視噓聲觸今略舉二聲聞受化者如今經及楞嚴中阿難為魔所罥也經以師子虎豹等以喻聲聞喪命下失小乘善根即受化也此據初心以說問向以龍喻魔師子等喻聲聞今降魔中以呪力調伏亦及師子等應是降聲聞耶答小受魔化已是魔屬故大乘呪力皆令柔善還本乃至發心者非但還復小善亦發大心經怖畏魔事者斷見愛取菩提是怖煩惱魔故下經云於諸煩惱而生怖畏也捨生死求涅槃是怖陰死兩魔由怖此三故怖天魔經乃生怖畏者大機發也怖無為深坑樂實相平地經而作障礙者不執小謗大也出時下是時即滅後非時即佛世飽德下稟法開悟德著道成如豐如飽當此之世豈假四依無醫譬上佛滅無藥譬上法衰正像末者正像各千年末法一萬年義如前記經純善衆生即四依也經說不同下諸經異說不出此五一云下次第列出蓋由下和會也機緣濃厚者則見正像奢遠機緣淡薄者則見正像短促若據大愛道尼經說度女人出家滅五百年正法制行八敬復得千年優波下育王經亦云毱多念曰我今雖見法身不覩如來色身相好有一比丘尼年百二十合得知之今當往問於是令人先報云尊者欲來尼乃入定觀之知問佛在時事從定出已滿鉢盛油置於戶後尊者入房推門不覺傾油數滴既問訊請坐已問佛在日教化有情何如今日尼曰豈不聞有六群耶答曰斯為粗暴之人何足言說尼曰彼雖粗暴佛在數入此房不曾傾油一滴明知今日羅漢不及六群毱多聞言深生慙耻尼安慰曰何用傷感世尊初日入滅二日不如三日已後轉復卑劣況於今日百有餘年去聖時遙何足可怪毱多不能融會者僧祇律後序云佛泥洹後大迦葉集律藏為大師宗次阿難次未田地次舍那婆私皆具持八萬法藏次優波毱多世尊記無相佛而不具持八萬法藏於是遂有五部名生初曇摩掘多別為一部次彌沙塞次迦葉維次薩婆多於是五部竝立紛然競起各以自義為是時阿育王言我今何以測其是非於是問僧佛法斷事云何皆言法應從多王言若爾者當行籌知何衆多於是行籌取本衆籌者甚多以衆多故名摩訶僧祇摩訶僧祇者大衆也此以根本僧祇對前四部而為五也若準大集經說更有婆粗富羅部是則起計不同自分五部并根本僧祇乃成六部此乃佛滅百年也今云百一十六年乃據大天乖諍分為二部也謂向雖分五部並是聖人理和猶同一說戒後對大天乖諍事興分為二部即人法皆分向之六部悉名上座部即窟內結集門人故取迦葉上座之號大天所計名大衆部大天是窟外結集之後裔故立大衆之名王作大會即阿育王也澆醨者醨薄酒也當知下迦葉阿難各二十年此二親覩佛化行法似佛故令法興其年六十者以佛住世五十年故四十年秉教者則年百二十也過此下此據經云然後隱沒之言是不見始終人也迦葉長子者所有經法悉付迦葉利根智慧不同餘人佛覺三昧者祇是佛加覺力如佛故名佛覺三昧由得此三昧故自能聞大論云阿難集法日自云佛初轉法輪我爾時不見如是展轉聞經純食粟米者譬小乘人唯讚羅漢第一經若是福人至不聞者明大乘人始從華嚴終至今經皆不聞無常苦等名也粳糧譬常者以世人常食故石蜜譬我者石蜜之性遇暖即軟遇冷即堅堅軟自在故以譬我以求有心者即下經云為利養等五種過也又小機捨生死求涅槃離文字求解脫悉名求有車載下即下經合云持是經典送至彼方也車即世間之車不約所表故屬事解方便智曉者謂曲巧曉喻令悟大乘大行訓之者以一心三觀而訓誨之汝等所行是菩薩道為利是地獄有者以法易財是地獄因諂求虗譽故屬鬼因恃解凌他我慢自得是修羅因欲他依止是好群聚屬畜生因將此妙典貿換餘經若小若外非解脫業徒成辨聰故是外道業也前四云有外道云業者望果名有就因稱業為有造業故得互明寄語後賢深宜自省弘通斯典作何有業能離四趣及以外道方逮佛因或起向心唯當自訟又此五過即九界因四趣如文應知外業含彼五界以餘經之語通諸教故若易戒善之經即人天因若易小乘三藏即二乘因若易方便大乘即菩薩因佛乘斥之咸名外道問既有五過何故經云無量菩薩耶答理即菩薩耳其猶通謂一切衆生為佛子也王至深山者借前文喻來成今意地即等者地是所依故譬理人能行地故譬行餘八十下凡兩解初解不約正法延促但取正法將盡餘有八十年也次解先定延促言一千五百者此據經說不同或云千年正法或云五百年正法也未滅八十者若一千若五百但取未滅餘人十年在分擘玄毫者玄謂黑色毫謂秋毫蓋喻深經妙義如黑色之隱奧秋毫之微細難以分別也指南者博物志云黃帝戰尤於涿鹿之野尤作百里霧使兵士迷方失所有智人造指南車於上作木人手常指南古今注云周公所作使越常氏載之以歸扶南也今以四依宣揚經義破迷指悟如彼車也宇宙者纂要云四方上下謂之宇往古來今謂之宙或謂天地為宇宙今謂分擘宣揚舒之則充滿法界卷之則莫知所有有無唯心開演在此應作說文才冬反慮也從心𮏥聲又音囟或作悰者亦誤當斯大任唯是四依尊妙之人耳戒毀是命濁者由破殺戒受短命報又末法壽促之時人不持戒五種法師者合受持為一但成五種四河中大者恆沙長八萬四千由旬闊處四十里狹處十里方一肘直下至泥得一萬斛沙其沙細如麵若就行者謂聞而不謗等是所行之行也四恆至則難者依今師判位三恆猶是初依四恆方是二依二依即初住位始破無明從凡入聖故云從惑取解故下經云發心畢竟二不別如是二心前心難只由從惑生解故難所以四恆但加一分五恆亦是二依而二住已上已證中道復入上位故是從解取解非無上惑以有真解故名從解此乃無功用道自然流入故加八分勝前七倍比前為易六恆等者應先問云五恆既加四恆七倍何故六恆但加五恆四倍乃至八恆但加七恆二倍既並從取解豈前勝而後劣耶故答云更深細為難此謂顯理既深其惑轉細解義則難故倍前數少如仕下喻上難易太尉者齊職儀云太尉司徒司空皆古官也應劭云自上安下曰尉魚豢曰太尉掌武事古者兵獄官皆以尉為名尉罻也言兵獄羅罻姧非又應劭云徒衆也司徒主人衆也空穴也同空主土古者穴居主穿土為穴以居人也隋唐之世皆以太尉司徒司空為三公丞相者管子曰黃帝得六相而天下治神明至堯得舜殷湯得仲虺伊尹高宗得傅說周有周公邵公秦悼王置丞相分甘茂樗里疾為之秦莊公以呂不韋為之二世以李斯趙高為之漢高祖以簫何為之後拜曹參代為丞相後漢以三公主丞相務建安中復置丞相宋又置相國齊以丞相贈官梁又置大冢宰隋曰內史又曰納言亦以他官參掌機密或知政事或平章軍國重事竝是宰相也漢書百官公卿表曰相國或相應劭曰丞者承也相者助也掌亟天子助理萬機今謂太尉之官歷職可至故易丞相之任簡自帝心故難以喻合法大旨可知此猶難解者舊師雖以難易消文而未定判其位故云難若以今明四依位判此亦易明四依云云者仙慧於初依前立弟子位如前釋題判位中明開善下二家皆用四種性判位則習種十住性種十行道種十向聖種十地九恆但是前三是地前賢位故屬初依若全下今師徵難二家也文中有進退兩難皆先牒彼義次今難他既以九恆俱在初依且經舉十六分是數之極故成一斤此之一斤為喻極果為喻因法汝若進取極果喻一斤者則應地前已是究竟以彼九恆俱初依故既已究竟後之三依復顯何法應云至二三四依文逸二字若稱至一斤牒彼義也謂退取初依似解以喻一斤也以二家皆用地前配初依故此乃下今難何關佛法者且經云不謗是法等正指果德涅槃以為是法既一斤唯是初依所解則何關果佛法耶今明下今師釋義乃取一斤正喻果法故四依所得分證階差則以九恆具收四位一分八分為二依者定位既爾若解其義還依舊釋謂從惑取解等也但舊師不明其位故向疏主斥云猶難耳故知舊釋義不全非若仙慧等三義位全失文云下經既顯云具足豈非十六分全此以十地等覺已至極果之邊一生即入故名具足故今判位方了經旨凞連已前者則是理即及名字入也問名字位人豈有謗耶答觀行未成或遇事起謗其獨拒逆下合云三惡也恐是文略不信下即總結謂初一惡是不信佛故言滅快二惡是不信僧故捨戒三惡是不信法故拒大乘謗相者此三顯然可以覽別故云相也經木頭幡者喻無用也互舉一邊者經明自行云具足無量功德乃能信是大乘此舉已生善增長也經明化他乃云其人聞已過去惡業除滅此舉已生惡滅也既已生善增長必未生令生既已生惡除滅必未生惡不生各舉一條故云互舉又自行亦滅惡而且明生善化他亦生善且明滅惡亦是互舉經讐郤正應作隟丘逆反舋也作無戒譬者即經云未得受沙彌十戒也沙彌云息慈謂息惡行慈故也十戒名相如觀經疏始自凡夫發心者即以無戒譬名字觀行發圓心人也階十住者此乃名別義圓十地即圓十住三十心即當六根故十住之言正指六根似位雖未下假名五品雖粗垢未落而落在不久故云位階十住即是二即因中說相似果也上惡下三報以生望生一往是橫三障約次第前後一往是竪則近菩提者初住菩提也鑒誡下引信者善果既深則知謗者惡報亦重勸福誡罪鑒照在茲云何識田者云何識知四人是良福田相也以重奪輕者身命尚捨而況財物皆應供養者以禮拜是身業供養故故與昔日律制相違經稊稗上音啼下蒲界反草之似穀者二結者經持戒至是說是結尊不禮少雖持禁戒禮少則犯不應吉經世尊下結持不禮破或言下若作三結則以初句兼結僧不禮俗故成三也經如是所證下即請答也文少意廣者但云為菩薩是文少則是許菩薩以持禮破以尊禮少以僧禮俗是意廣也三三之疑者即定難結各三成九也撥亂反正者撥除五濁之亂反復五清之正故云濁不濁也未得機便者機緣未熟也如此破戒等者謂四依和光不舉破戒則同其事業亦名破人也既是大權安得不禮若年下例成二義又大小乘者小乘不許持禮破等執小以難大也故須下以持毀事消前二段以大小義消糾譬文也經儲君者直於反備也蔡雍勸學云副君也經篡居又患反說文逆而奪取曰篡如童子者即指婆羅門受募譬也守邏郎佐反切韻遊兵也作威作福者塞持戒路是作威開放逸門是作福素貴等者謂婆羅門清素高貴也四分律云取白牛角盛四大海水及種子以王置金輦上使諸小王輿婆羅門以水灌頂白表衆色之本右角吉祥相海水表潤澤種子表生長如是作時若是四輪王各有輪寶現故名灌頂王縱非輪王亦如白蓋在空如無憂王等今云瓶盛四海水者即如華嚴第三十九云取四大海水置金瓶內灌太子頂也如此下此方帝王傳禪寶位皆升壇受禪書授璽𥿈璽斯是反玉印也秦始皇得楚之良玉琢之為璽李斯篆其文曰受命于天既壽永昌漢魏已降歷代相傳謂之國寶分半國者謂共知僧事也鳥回下十律八法諍事法云鬪諍事云何以二毗尼滅隨以何住處有鬪諍相言比丘是事付闥賴吒比丘應受此事如法如毗尼如佛教滅若闥賴吒能如法如毗尼如佛教滅者是事名滅若是闥賴吒不能如法如毗尼如佛教斷是事者應捨付僧僧又不能斷者爾時應僧中立二鳥回鳩羅應羯磨此人令斷是事等准望此方則是僧正僧都之職也此方僧正始於僞秦僧䂮為之僧都始於元魏文帝勑曇曜為之正者政也自正正人克敷政令也都者統攝僧倫使遵法度也破戒者為主者即經云與旃陀羅共住等弱冠者古玩反禮云男子二十冠而字之成人之道也釋名云弱冠者言雖成人而冠體尚弱也今以二十表權實二智長髮覆首如大慈被物是不見機者佛九恆已前始行之者未能鑒機專守己道不解施權故嫌任汝開化者既破戒之衆本具佛性任彼四依為其開曉攝來大化也者此解即持歸家也謂攝彼戒衆歸大乘家以開化之經躃脾伇反倒也依律下將修妙觀必先懺淨故依律制隨犯何罪用七種治如前長壽品疏今云苦切等言通該前七佛海死尸者此據犯重為言前大下通前束成三根也破戒亂常者破戒之僧為衆主如亂常之賊為國君善機失益猶萬民擾亂旃陀篡位亂帝王之常道故曰亂常經法不應者法式不應也經經理者經營整理也實相懺悔之方者即令觀心實相我心本空罪福無主犯無犯相即是以解藥令醒前依律治罰是事懺生重憂悔故如服毒今示實相是理懺心悟本空故如服解故知今經無別事儀只以大乘理觀對前小乘治罰以為事理二懺不同諸經別施方法扶律談常開小即大意在茲矣廢小乘等者內觀了達持犯一如名之為廢外之治罰一不可虧經不失婆羅法者先同後異反常合道豈乖淨行但合二者合同同糾也以方至家法者方便是權家法是實捨實用權名捨家法釋論下准論即有羞無差啞羊真實今云破戒即是無羞雜僧應是啞羊如釋通序中記經爾時菩薩者始行人也若見至比丘者即四依行權之人也以始行之實持禮四依之權破故云即往至禮拜等經什物者三蒼什十也聚也雜也物即器也疏列八不淨名字未顯今依善生優婆塞戒經具列之一畜田宅二種殖根栽三貯聚稻粟居鹽求利四畜奴婢人民五畜養群畜六畜金銀錢寶七畜象牙諸寶大牀綿褥氍氀八畜一切銅鐵釜鑊畜此八種乖出家道能污淨戒故云污道等經爾時菩薩至是人亦即始行禮四依經受畜下又顯四依同彼事業受畜無罪故疏云是亦無罪故知佛明無罪雙關二人一明始行實持禮四依權毀無罪二明四依受八不淨亦無罪釋無罪意者經文但釋四依受畜無罪耳持受毀供等者文誤應云毀受持供即是四依權毀受始行持成人供養無罪也經云讚護法之人如讚童子以喻顯法豈非權毀是所供耶經以無憍慢者菩薩權施本無犯罪示同懺悔耳經第二天者如三十二天奉帝釋也只應是一問者據現文只是問緩答既有二則知問中云為具在不則當問失不失數師至污戒者薩婆多云寧可一時發一切戒不可一時犯一切戒且如淫戒女人身上發得二十一戒大小便道及口各歷七毒男子身上得十四戒餘法界中男女亦爾今或貪心犯一女一道但名污一淫戒比丘自餘諸淫戒體光潔無行可違稱本受體如懺初篇還得清淨不言更受由有本戒故云戒體常在等下文下引迦葉品二十一番諍論文也經隄塘爾雅云隄謂之梁漢書云無隄之輿韋昭云積土為封限也穿決音穴說文下流也周易藩決不羸王弼徐邈等皆音穴淋漏漉水下也得中道本者中道即理乘也其猶綱維戒即事戒如彼網目提綱目正故云自圓今明下今師正釋也總斥二解故云不爾經遍下若知遍舉自見二師解義之失若具下正示今義若通論乘戒一切善法一切觀行皆通論乘戒人天亦得名乘中道亦得名戒故若別判者三歸五戒十善八齊出家律儀乃至定共能防身口遮惡道果得人天報名之為戒若聞經生解若觀智推尋四諦十二緣無生理智能破惑運出三界名之為乘經明急乘緩戒蓋從別判聲聞菩薩者聲聞且約三藏菩薩的指圓人今經對論率多此例且聲聞四句者一戒乘俱急戒急受人天報乘急見佛聞生滅法悟道陳如五人即其事也二戒緩乘急戒緩墮三塗乘急得聖果諸小乘經列龍鬼衆即其人也三戒急乘緩戒急得人天身乘緩不得值佛設值佛亦不聞經悟道如佛出著樂諸天及舍衛六億即其類也四乘戒俱緩戒緩墮惡道乘緩不見佛流轉生死未有邊際菩薩四句例亦可見俱以圓頓為乘值佛悟大為異耳應知乘戒是因值佛是果今經即菩薩四句中偏舉第二句以斥第三句人也且約四依權現破戒故云戒緩耳故知此句比初句為劣對三四名勝且乘緩戒急之人雖得生天果報若盡終淪惡道如頭藍弗雖生非想卒作飛狸故云於乘緩者乃名為緩此斥第三句也乘急戒緩者雖墮三塗終悟聖道如調達本得𤏙法造逆墮獄出得人身則成支佛故云於戒緩者不名為緩此讚第一句也此明四依權示毀戒故此比量寄語初心俱急為上故大師云幸在人天受樂何須苦入三塗經云於此大乘至奉戒者此約通義理亦名戒又有因緣故犯亦名持例如末利祇陀唯酒唯戒故云是名奉戒經結云不名為緩者則是乘戒俱急且約示同前云戒緩耳如別記者則指法華淨名二疏及止觀中具約四教五時各為四句廣在彼文此不細釋經有四種人者四依示毀則內熟外生四依持戒則內外俱熟假名比丘外熟內生惡比丘內外俱生經耘除者耘除草也或作藝者非草名耳使平等施者經云不問是田非田也與此相違者此云是名聖衆福田應為人天供養豈非簡却破戒非田既有去有取則不平等故云相違故簡真僞者欲依於真故須簡僞又此下誡福田則令出家衆忖己德行無濫受於信施俾離犯而成持誡施主則令在家衆運心普廣內不起於愛惡使無罪而有福請觀二誡主對有殊且俗易生嫌苟用今文則彌增其纍僧多起過若依梵行則更益無慙以例諸經意不出此比有以簡田之文二果之喻誡僧言教以示俗徒意欲重我輕他豈知彼此陷沒毗尼祕密不許俗聞深可思量無宜自負故南山云事起非法言成訛濫反生不善何名引接譬於持犯者鎮頭是甘果譬持戒迦羅是毒果譬犯戒凡愚執事者即不間教法不別是非衆主也經詣市喻衆生分僧於檀越之家也衒者說文行且賣也立清淨行者則是觀涅槃以行道也故使一止一作常冥三德名真持戒詐狡執事者前女人不別甘毒悉皆拾取故喻凡愚衆主今賣者明識妙雜欺詐買人故喻姧狡衆主內雖精別持犯為利養故以破戒僧外誑檀那毀者不別者外形與持戒無異也不別者買者牒經也非但別僞因等者由破戒因招惡道報天眼之通豈但別知現在破戒亦懸見未來受報本給施禮拜持戒之人今既破戒故不應禮施此別僞因也本為禮施敬田未來墮惡則屬悲田因中見果故應不禮施故云復能見果也次第有異者阿含以依了義當第二今居第四梁武至為定者意謂此經是終窮之說故依今經次第為定諸法下迦葉既是舉昔為難故知次第須依阿含或言下既指今文為譯人之誤則亦准阿含為定也或言下意指昔教對邪名了望今大教還是未了是故迦葉以昔第二居乎第四則是以了不了總判前三已上四說第三符順諸師第四似依梁武皆是人情非不一途故無所破今且下今迦葉既是敘昔是故且依阿含然聖教難知或別有意故不應云出經者誤等也文中云常與大皆在昔教非對今經以今迦葉正舉昔故昔人無常者佛教初興真化未洽魔外雜亂作四果像邪人濫正故無常准故云昔人無常苟令依人恐染邪法故不可依法常者法謂苦空無常無我寂滅三印生死一印涅槃依此法門必出三界其或形服似邪而能說斯正法必須依法如薩遮尼乾經尼乾為王說佛相好等豈非大權外現邪人而揚正法斯則人無常定法有常定故可依法故法常之言不可濫作今經常住之解迦葉舉昔疏主釋成豈可章安乖文背義下云小大其例亦然法有下此正依阿含生起也雖正法可依而藏教三乘俱名正法自調自度名不了義故不可依六度大乘志求作佛名為了義是故須依語若下三乘之法悉是言教若著名相是一非諸煩惱從生安能會道故須得義妄言不生惑著識著下識是有漏暗情智是無漏明解故妄情解義未免惑著依義修觀觀察無漏方契真源是故依智正請會通者昔令不依於人今令依止四人今昔相違而皆佛說未知其意故請會通先別下別會則但會昔教初依總會則通該昔教四義人法不異者即經云依法者即是如來也法即所說之教如來是能說之人能所事殊心性理等若人若法唯心所變故使人法當體即心咸空假中融通無礙故經云即是法性等也以法下謂以正法簡邪人也結還下此指阿含第四依是依智不依識智還解法故是結法故知後三悉簡初法依了是大乘之法依義是法下之義故四依雖殊大意在法以人下今經以依大乘四人故能簡去小乘之法結還下即經結云是故如來常住不變也意云雖明人法不異事須依人是滅後正意也昔人下昔二乘之人已被今破所說小法任運亦除以昔望今則昔之人法悉不可依今人下令依四人故云今人既存人本傳法故云今法須取以今望昔則今之人法悉可依也但今下顯今一如簡昔異體昔人下解上昔人既破等也若不下不悟須斥若了下既悟妙理大小無殊汝等所行是菩薩道故云不除此法明昔不依等者問昔但依小法簡邪人經云不知不見是法性者不應依止則是簡小乘之人豈是昔義耶答跨節明義約佛意說故於昔日便欲依大乘頓法簡去偏人機宜未堪且簡邪人依小法耳經即名如來者初依名相似如來後三依名分真如來外凡者即名字觀行位人就今教會者名雖用昔義順今經妙有之法者一念十界攝盡四教故觀言教唯見理具名妙有也昔教下出昔所依之義是今所廢也解脫具等者入無餘時灰身滅智故解脫不滿者身智在時始得有餘未入無餘故云不滿有二解者應以次解為正則經云諸論已指邪教如佛所說乃是權經生凡夫過者佛說權經凡夫不了生於取著順文邪命也如昔許食三種淨肉故使凡夫貪求無猒不得下今經已廢前教故不得依此修行也又可諸論是權論如佛下是權經律亦名經則是昔說三藏悉不可依亂正者謬云佛許畜不淨乃至不受而噉等以亂正教也經真知即名字已去了達法身悉名真知經方便之身即應化身也當知應化即法二身竝常若言三科攝者則是無常兩緣來望者一乘本同聲聞疑怪故成不了菩薩知解故名了義法體無殊機緣見異經隨其自心者謂達本還源心外無境即入祕藏故云無礙大智辨宗者辨上五雙宗本也經小大二文俱云方便者應以體內體外分之人謂但三者自古人即分此文也此初下文中先點示文節次正釋次此後等者據此只明第二依耳但以因便明不依人致成共釋語勢相仍者仍因也只因上文云而亦可見故隨語勢便云若有說言不可見者如是之人所不應依故云仍明不依人即是依法者以圓融無礙法義無別故於依義文下即明依法經云如來常者名為依法等是也是故下由法與義同故使第二段經用第一依但有不依人一邊義耳已上示文節竟此即下正釋現文也後具等者此顯分經須作初兩共釋也以下結文具結二依故第二段經結云是故依法不依人第三段結云是故依義不依語是故今師依古分文總為三段而四依義足經質直者三德之總名故下云質直名為常住也以三德圓融無邪僞故名為質直光明等三即三德之別稱光明即般若不羸即法身如來即解脫經說言不可見者說小灰斷也經以微妙語者綺飾文詞演說灰斷意令他信經隨宜方便至執著者既體權識實不執權謗實故云不生執著經以不了如是義者不了即權而實無常即常取著小乘毀謗大教故使果在地獄借使證小乘果乃是隨無為坑亦名墮獄故淨名云供養汝者墮三惡道四緣者即經若諸弟子無有檀越去是也解者下凡有三釋而第三釋雅符經旨以經文列上三緣然後聽畜故云我聽弟子受畜等而結云要常當淨施篤信檀越皆須二緣者如無檀越供給雖許受畜要須淨施時飢建立其事亦然故云皆須二緣也言淨施者薩婆多論云先求知法白衣語之若不知者告令解之至彼所云比丘之法不得畜錢寶金銀穀米等今以檀越為淨施主後得財寶盡施檀越經說輕為重等者無二緣則不許是說輕為重有四緣則聽畜是說重為輕以不許為重聽畜為輕故使經文翻倒其語障內外者肉見內天見外凡聖之殊者分證聖人得中道慧眼也二乘空慧亦名為肉
