front:
  text: 刻涅槃經疏三德指歸序釋迦文佛五十年間轉大法輪其究竟極倡無上寶録者則莫過乎法華涅槃兩經矣蓋以開權之説諸經未明顯本之談兩經獨擅也今家判此兩經同譬醍醐良由茲焉而其本迹顯實雖文義浩繁究其要歸則不出吾人介爾之心焉荊溪尊者曰妙法秪是一心三德又曰若了三德在一心中則大經一部居于方寸旨哉言乎誠義學者之最所當服膺也又雖復安經同味然涅槃經扶律談常遍被末代則今時學人所當急研討也然智者大師之弘經但疏法華而不及涅槃雖固可惜而章安尊者依智者義意作涅槃疏則兩疏並行宛觀雙璧荊溪尊者之作記亦但釋法華疏而不及涅槃疏豈非缺乎雖有暹滿二記不滿人意議者衆矣且逮近世亡而弗傳是故古今學徒患乎此疏文古義幽難解難曉宋孤山圓師以高世之才師安之學作三德指歸二十卷於是其難解難曉者皆渙然氷釋粲然日明大有益於物則亦可謂備矣況復題以三德者欲俾學者由記以通疏由疏以會經乃悟一心三德其意甚好矣第恨其為山外宗師而間陳其所相承也故其所示三德亦似不臻乎圓極矣四明曰若不即三道而顯三德者乃教道所説也富哉言乎足以辨山外之異見而彰圓頓之正宗賢達為能信徹乎斯然後讀是書焉則三德祕藏之旨庶乎不差矣是書不入明藏本又未廣行學者憾之久矣余曩曾請輪王大王借濃州長瀧寺古藏宋板書數十部是書其一也喜而視之闕第十五卷雖恨其未完合抱不以尺折廢蓋與四方同志共焉遂令二三子旁加國語付諸書林重繡梨棗近者雕刻既成書林乞序於余余深隨喜其傳永久又願他日藏完書者樂補其闕因操觚直書以辨簡端云時正德乙未春老苾芻光謙謹撰涅槃經疏三德指歸序涅槃疏者實吾祖章安法師約龍樹宗旨用智者法門依經辨理大明乎三德之妙義也既而章安師沒荊溪師作筆削斯文再治再定抑又因舊章見新意如諸文之下或加私謂文句之題改之曰疏是也然後得盡善矣邇世空文僅存莫有傳者錢唐沙門釋智圓字無外其荊溪十世之法孫也痛微言之將墜慨後學之不聞於是乎撰記以申明之勒成二十卷號三德指歸凡於文高旨遠言約義微之處而皆離堅合異派深析重指而歸之俾夫來者識經之所詮疏之立義盡在於生佛無差一心三德之理也無奔走於迷塗姑務於理觀講授矣惟懷道者知我志乎時大宋大中祥符四年歲次辛亥八月既望於錢唐西湖崇福寺講堂首事筆削越六年癸丑九月二十六日於大慈山崇法寺方丈功畢序云涅槃經疏三德指皈目次卷第一序釋序品第一卷第二釋序品之餘卷第三釋純陀品第二釋哀嘆品第三卷第四釋哀歎品之餘卷第五釋哀歎品之餘釋長壽品第四卷第六釋長壽品之餘釋金剛身品第五釋名字功德品第六卷第七釋四相品第七釋四依品第八卷第八釋邪正品第九釋四諦品第十釋四倒品第十一釋如來性品第十二卷第九釋文字品第十三釋鳥喻品第十四釋月喻品第十五釋菩薩品第十六釋大衆問品第十七卷第十釋現病品第十八釋聖行品第十九卷第十一釋聖行品上之餘釋聖行品之中釋聖行品之下卷第十二釋梵行品第二十釋梵行品之二卷第十三釋梵行品之三釋梵行品之四釋嬰兒行品第二十一卷第十四釋德王品第二十二釋德王品之二卷第十五逸失卷第十六釋德王品之六釋師子吼品第二十三釋師子吼品之二卷第十七釋師子吼品之三釋師子吼品之四釋師子吼品之五釋師子吼品之六卷第十八釋迦葉品第二十四釋迦葉品之二卷第十九釋迦葉品之三釋迦葉品之四釋憍陳如品第二十五卷第二十釋陳如品之二釋陳如品之末以下釋後分經釋遺教品第一釋還源品第二釋荼毗品第三釋廓潤品第四涅槃經疏三德指歸目次終
