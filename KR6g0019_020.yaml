body:
  text: 錢塘沙門釋智圓述陳如品之二愛是現在那忽言故者彼自立難也乃強下恐被他難故有此釋由行得愛者此愛即行已屬過去非現在愛義不符文名為強解無明愛為新者此取始託胎時閏生無明及現在愛既俱今世所起故並屬新此直據煩惱道説也而經云故者乃約業道望之則惑能閏業既在業前乃名為故取有為故者直約業道能招苦果則因故果新而經云新者乃以煩惱望之業是後起所以名新此師解義極成迂曲然又不顧取是煩惱而謬判為業故招今破那忽為新者忽應作不蓋字誤也此責古人汝若據煩惱無明愛為新且取亦煩惱何得為故故云那不為所無明愛新下此並破也無明愛取並三煩惱二既為新取支那忽屬業為故耶此乃以惑為業抑新為故反違己説何謬如之故云最為不可取從無明愛起者應云取有文逸有字即是枝末者無明愛是根本即故取有乃枝末是新無前諸失者無上二師失也初師有以現為過失次師有以惑為業失與觀師同者今家用觀師義也經云取有名新者此二皆現在因故云新也問愛亦現因既以未來望現得名故者取有何故不爾答愛是現惑之始取是現惑之終乃以始惑別受故名有是現因之末新義自顯此新故義并前古師共有四解今師之美無得而稱今更私加一釋以顯經意多含言無明屬故其義可知愛雖現惑若望取有既在前起故亦屬故取有望愛悉名為新所以但舉惑業以明新故者此二為因能招苦果因滅果亡故約此二經儒雅者儒仁也雅正也經而來咨啓者左傳曰訪問於善為咨乃開問端者即經云隨所疑問吾當答之經三種即三毒十種即十惡三毒是惑十惡是業問十惡中意三豈非惑耶答與身口指應者屬業但在意地屬惑一切有即二十五有也少分得度者那含欲惑方盡分證涅槃故云少分優婆塞經明必四月者四分亦同律云有裸形外道名布薩與身子論義結舌歎云𭔰小者尚爾況堂堂者乎至跋難陀所而求出家後問其義而不能答即生念言沙門釋子愚暗無知即便休道比丘白佛佛言若有異學來投出家四月共住只是一時者佛法立三時謂春夏冬則一時有四月也根性不同等者謂根利之人不必四月或言止觀等者奢摩他此云止或云定毗婆舍那此云觀或云慧麻襦杯度者並東晉時人而無名字但見常著麻襦及能乘杯度水世人因以立號事迹如梁傳襦者説文襦短衣也但分文在人者經文節段非佛親分既屬人情理宣擇善故依觀師分為四段弘廣問終者弘廣是下經第九外道古師皆謂與此納衣立義相關故徵下對辨問始是問流來等者此用攝大乘師七種生死義以配此文言七種者一流來二反出三分段四方便五因緣六有後七無後流來是迷真之始反出是背妄之初而云問終是問反出者謂涅槃之始是生死之終也佛常默然者如前所引十四難皆不答也復何處來者如前疏文破識窟義知答不去者以佛答文不去前難故知前問不難流來所以如來隨問解釋若問流來佛定不答納衣下正示所問義也初立義徵文解此下二師異解於生陰前起愛者謂見地獄反更生愛正在中陰故云生陰前也有身有惑皆約中有亦起愛心者亦起才起也即便得身者謂於中有身上起愛而得生陰之身身前煩惱在後者於中有身起生陰愛故於死陰後起愛潤生者此不論中有之身但約於死後起惑而受生陰故經云反更生愛即生其中也此下牒佛等者經從何以故去若煩惱在先全未有身等者此外道據衆生有始以難既元未有身此時煩惱從誰而起故下荊溪云諸大乘經云無始者不獨身不獨煩惱若一在前一則有始故知古人云問流來者非不一途但失始領無量世中作善不善等義故為今師所破應知此經正難佛説因緣潤生傍執外宗有始為難若煩惱復因煩惱者若云未有身時有煩惱不從身生還從煩惱而起後起煩惱因先煩惱而有若然者煩惱不得為先以身前煩惱復更因前煩惱而有如是展轉相因至于無窮則身前煩惱不得為最先也總結三義者即經云先後一時也一惑先身後二身先惑後三身惑一時如此土嚴具者鬘等類如此方冠辨鞶帶嚴身之具也工匠揆木者揆度也左傳曰山有木工則度之經車輿與諸反説文車輿也誰之刻畫者蚶形誰刻蛤文誰畫引此助證自性之説經中但言龜等不云蚶蛤然此外道與此方蒙莊所計其義頗齊故莊子云鵠不日浴而白烏不日黔而黑又曰雨為雲乎雲為雨乎孰降施是皆其自然也經釣餌服虔云釣魚曰餌性是其宗者自性義是其宗計故佛逐破等者以此外道但計五大為常諸法悉是無常而云俱無因緣故招並破不應祠祀者爾雅春祭曰祠注云祠之言食禮曰禱祠祭祀供給鬼神縱則應定者經云當知諸法各有定性即是縱也經若有下縱而復難也甘蔗只合常守自性何故作漿作蜜等驗知皆從因緣生也經酒時不飲者謂漿蜜經停變成酒也飲則犯提後為苦酒者苦酒醋也謂酒變為醋飲之無罪別難中即無者雙難中但難先後別難但難一時不具三意故云即無結難中有之者即經云先後一時義皆不可即具三意也次正答三難者文誤應云次答正難相對而來等者此明外道正難煩惱在先難身在先者相對傍難故云非其本意還成我義者明佛不曾説身在先若云在先是汝自立還為我破則成我所立煩惱為身因之義也除彼所計之一時者非外人定計因中有果果中有因之一時也若是下彼明一時乃是邪計故云此則不可此是前後之一時者雖煩惱為因以身為果則因前果後而煩惱與身一時而有故云前後而一時亦是下雖一時有要因煩惱而得有身則似因前果後故知約理則一時就事則前後次文自顯故注云云緣成由果者中論第一觀因緣品云緣成由於果以果復緣先故名未有果何名為緣故論偈云果先於緣中有無俱不可先無誰能緣先有何用緣此即總破一切因緣也今經明一時前後以山因果彼破此立其義不同故云此別有意不獨云身不獨煩惱者以衆生無始故則煩惱及身俱無始也此則實教所談今經下以機緣宜聞權説意令對治破惑故説煩惱為先仍帶理説者理無前後事有前後故云雖也故知實理等者實不稱機却成餘法實而下約實理明之則因果唯心孰分前後豈但過去現在亦然並由理具三千故使同歸不二何以故下徵釋無前後義也因果無二者因果之事豈離十如界界十如同在一念一念無別豈有兩殊故云無二色心體一者若因若果不出色心色由心造當體即心色即是心色外無法心即是色心外無法故云體一三道至無乖者苦道即法身煩惱道即般若業道即解脫若道即果二道是因百界三道咸即三德不縱不橫剎那理等故云一念無乖五陰至理等者色解脫乃至識解脫百界五陰咸即解脫此五解脫五一互融一念無乖故云剎那理等舉要言之一念三千攝無不遍因果同時何須致惑貴在下結示經意實理本無前後只由外道執無因果故明前因後果以破其執邪執既破了一實性同太虗空豈有前因後果之殊亦無內惑外身之別故云空無前後內外誰施三十下總顯一經咸同此性當知卷卷品品名相雖異要其所歸不出三德故使攬別成總以立首題故云三十六軸唯從涅槃從順也唯順所詮三德以立涅槃之稱五十二下三十六軸即能詮之教五十二衆即稟教之人教詮人證豈出斯理上云涅槃此云佛性名字兩異理體一同三滅三因即是三德納衣了解成當機人守株尚迷乃結緣衆兩段者即初一時二前後共有二行文也一時則正明實理前後則兼帶權説執破權亡一理彌頻釋疑之要豈虗言哉舊説下意謂須約衆生之始乃得因果同時自餘但是因前果後用業得身必由煩惱者既由煩惱潤業復由煩惱潤生潤業故牽果潤生故受身故云必由也故於文中列出二種言潤業者由煩惱故造作三業如因水潤牙乃能滋長故曰潤業煩惱潤生者即初託胎時於母起愛於父起嗔乘此煩惱遂受識名色等報故曰潤生煩惱此惑正在生陰之初也身果為奢者潤過去業感現在報潤現在業感來世報隔生賖遠則非同時今之下即經云要因煩惱而得有身者正明潤生煩惱如前疏云惡因緣元見地獄時反生愛等即此類也若依下引諸師明起潤生煩惱之處數人及靈味皆約生陰之初起潤生惑則得因果一時之義其餘諸師並約死陰起惑以潤來生非一時義今所不用但今依後解者依靈味解也故下結云微採靈味之説得言下示今義也凡引三文初引迦葉品次引十地經後引漸備經皆證潤生煩惱與識同時即是因果一時義也文中先引文次潤生下釋義初引文中愛無明等者由於父母有憎愛心故所以託胎故云得住壽命有漏有取心即是識也熱惱種子即潤生惑也由中陰識心起惑故使現識託胎故云生熱惱種子及有漏種子也潤生下釋十地及漸備義也之異者異應作惑字誤也謂潤生之惑雖在現識前起而正由中陰妄識是有漏故所以起惑令現識託胎故云是潤生至結之也是為下結顯二經明由識起惑令識託胎故云有漏有取心生熱惱種子也已有下即顯三經所明皆是生陰之初有染汙識即結果報豈非身惑一時有耶故云即是至之義也有本作三義者字誤也微採靈味之説者結示前文稍依靈味彼前至亦不可牒前納衣難問今答一時而有此義者雖因果同時而有因前果後之義豈同外道自性之計故云殊堪反於邪難實有相因之義者相因即前後也還明一切法實有因緣者此即佛法明正因緣直云下即是外人邪因緣此乃佛反破之汝既不許我説正因緣汝亦不應説邪因緣也三師外道者即迦毗羅僧佉勒沙婆如前説彼家者諸外道也現在一世相生者外人但計二十五諦從性生大等有主有依以為因緣不云從過去業力因緣為此義故與佛因緣異也主諦依諦者梵云陀羅驃此云主諦求那此云依諦色是火家求那者即展轉相望以為主依也如五大為主五根為依由根取塵則五根為主五塵為依故云色是火家求那也云云者謂風大造鼻水大造舌地大造身主依亦然主則是因依則是緣故一世相生有因緣義破五大性者彼執地性堅乃至空性無礙體性自爾非因緣成五大既爾一切亦然以成自性之義今佛以五大隨緣不守自性以破邪執是彼家地者外道計酥臘等是地大也故佛約此破自性之執或時為水等者遇火則融為水冷時則凝為地舉為五大者佛廣破地火二大二大既無自性餘三可例不言三大等者即釋經是五大性即是因緣義也若無因緣汝何不説三大四大既須定説五大豈非因緣經如世人等者舉事類責汝將五大類一切法者何異世人説出家之人持戒精進便謂旃陀羅亦精進持戒也此中兩雙者此用成論中外道義以消此文香相品者成論第五香相品初問曰多摩羅跋等衆香合故其香異本為即此等衆香更生異香否答曰因香和合更生異香如青黃色雜更生緑色有以種種業因緣故生種種香又衛世師人謂白鑞鉛鍚金銀銅等皆是火物而是中有香故知非唯地有故云説香為地從後雙者下全是彼論第三四大相品文不隨寒緣是地者汝謂本是水故所以不云是地豈非有因緣耶此是芰角難者謂菱角斜難也以風之初動難水之後凍以此初難彼後名芰角也若例難者即橫並齊難謂以此初難彼初以此後難彼後名例難只為經文義通兩句故此從容釋之應有物不動尚不為風者不字誤應作名字如物不動則不名風何故不流者猶得名水此橫例以難而今下作芰角釋義甚符經文水本下只是以風之初動難水之後凍耳又解下約例並尋文可見凍時名凍者但云凍水不云是地也善惡覺觀即生貪嗔者應云即生貪嗔解脫疏闕文經外因緣故則能增長者外能助內故內有善覺縱對惡境亦皆增長解脫也如內修忍辱外逢逼惱內忍轉增豬揩金山喻意可識內有惡覺縱值三寶善境亦只增惡以毀謗不信故果報參差者應知或時根具是後報貧窮是生報貧窮是後報根具是生報今雖殘缺後或根具今雖貧窮後或富貴此乃順經三報以釋謂因或並具但受報參差故有根具貧窮等異若約修因有偏以説者富貴由行布施根具由不嗔害因中多施而嗔害故果上根缺而饒富餘皆例爾二種無法者前計虗空兔角二法也棄通從別者隨機授法大小適宜遍乎一代故曰通五時次第前小後大故曰別初起下示一期用法次第文中且指小初故云初起道樹也多用因緣破性者如為提謂説五戒等即人天因名正因緣以破外道自性之執次用無常者自執雖破仍滯人天生死故説無常令他出離此皆鹿苑時也用體破析者方等雖四教並談意在轉藏成通故用分別破析體者般若意在轉通成別故中道破二者法華一實廢三教故廢析體是破空邊廢分別是破有邊圓常破偏漸者涅槃談圓常破三教之偏漸也圓常即中道偏漸即二邊名異義同法華涅槃所以同味遍乎經論者以五時經各有其論菩薩造論通經各依本部申義今大下示今經隨機不定若依次第則今經但合談圓常破偏漸既有外計還用初教因緣以破之故云蓋隨其病等此乃今經重施之意也初後既然者後教既用初藥例知初教亦用圓常但此顯彼密耳中間亦爾者謂方等般若唯除法華以法華唯是一圓仍無祕密故也於一切下明五時化物隨四悉機或顯或密常用四教而次第宛然者約一分先小後大之機則不失五時次第但諸味中有新入者故須互用更須懸作等者此段雖無前後已有故須於此準義懸作如哀歎品中比丘説劣三修即是以無常析空破正因緣如諸品中説如幻如化等即是以體破析説次第五行菩薩法門即是以分別破體析復有一行名如來行即是以圓常破偏漸諸如此例覽經思義皆可意得不暇煩文內道正教正義者即人天教正因緣義小乘賢聖等者即柝法也教謂三藏教行謂柝色行位即七賢七聖理即偏真涅槃大乘下即體法及分別也以通別二教俱名大故教行等約二教説之包括下舉況謂展轉相破或依五時次第而施或於諸味隨病互用尚至破別何況破外故云況復執性外道邪一一須作者以十仙俱是外道新入如來悉用初教正因緣義破之諸段疏文悉合具敘不定次第二意但避煩文而於此中備述以例前七後二皆悉同然復次應知雖用偏小而皆會圓則與前四味其旨永異其本有四念者謂常無常曲直也佛亦作四句者彼但默念淺事謂乞食等佛乃顯答深法謂涅槃等以淺形深欲令捨邪入正故也與其名同者謂常等四名而意則異者我謂乞食為常佛以涅槃為常即意異也佛方為説者説彼邪執之意也乃跨節者彼念世間民事佛答大乘深理故名跨節所表之理者謂外道所立常無常曲直之名密表佛法四義故佛因彼邪名示以正義此亦開邪示正之方軌也後世化物可以為規函關下柱者方言云關東謂之鍵關西謂之鑰函柱二字並誤説文鑰關下牡也牡亡後反牡所以封固關令不可開也至理中衆生無盡者以本具十界之性始終無減是以在凡不滅性善故四聖不減在聖不滅性惡故六凡不減凡聖常十生豈盡乎私謂準文恐且約事者荊溪依準經文言衆生無盡者正是約事謂衆生無邊度不可盡非約理具也不敢頓違疏義故云恐且然亦不違以事無量者必由理無盡故所以疏主捨事從理置文示意若爾則章安荊溪兩義相濟舊用下復是章安之語非私謂也須跋自佷者俍戾不順佛化也經世尊知已者如來已知阿難為魔所亂將欲發起付囑是以故問陳如問天魔何以但亂阿難答阿難是其傳法藏人恐佛付法令傳末代所以亂之應是對𫾻者尚書説命云説拜稽首對揚天子之休命孔傳曰對答也答受美命而稱揚之欲折阿難高心者恐阿難自忖是佛親侍過一切人故須此折經入定見如來心在阿難者佛力所加故目連下位能知佛心經如師子等者無畏如師子自在如龍威猛如火亦是表佛三品究竟也師子殺獸如戒防非龍能潛水如佛在定火能破暗如慧斷惑如來內證三品外有三德我之內外穢弱豈任為侍經具足煩惱至不生欲心者阿難是初果人欲惑全在故問或云阿難已證三果雖具上界煩惱而欲惑已盡何故歎其不生欲心答慧解脫人遇好境多退為初果以至捨戒還家今阿難不退正可稱歎脫有本有舍浮者謂毗字誤為有字也七佛名義如前記各有重任者以慈悲化物為重任也奪故不堪者以彼元是小乘故與故言堪者今已開小入大故此是從弟者即堂弟也但欲論近者以親近故則凡有所説人必信受故隱從名但云吾弟猶己母弟也既非外道者破第一解又非通説者破第二解於三解中第二義長文少不來者梵本未至也至唐麟德中後分適來而有遺教一品即其文也以解阿難者阿難為魔罥繫以呪解之梵音兼義者謂內有持慧外具辨才故名兼義斷辛等者通俗衆故故斷辛等名婆嵐彌者惑恐古本經婆字上有名字或恐字誤此本携字者然作携音者字應作𦋅纂文云姓也與嵐字不同而下云山字有邪正等未詳所據此中字義恐是後人擅添非疏主親出荊溪從舊故且存之讀音為嵐者力含咸應法師云案諸字部無如此字惟應璩詩云嵐山寒折骨作此字説文云夏德也者或作憂德並字誤應作厚繒切韻注釋分明知此字誤然此字音並是梵語何須訓釋然因示其音略指其義亦應無妨廣明呪義如前疏記新金明者即指真諦所翻七卷為新經也思之可見者久本始證亦有肉身故本中亦假呪護故云本迹何殊又雖已久證而無明未盡可指無明為狼虎畏等然今疏文不取此釋但約應迹以解故下疏云就應身為論此當示畏故人多釋下先示難次而有下示義皆依前釋者作應迹釋也但古來下追示呪義但三寶名種種不同者諸陀羅尼雖種種密語不同三寶攝盡蓋密詮一體三寶也魔竭大魚者大論第七云五百賈客入海採寶值須摩竭魚王開口船去甚疾船師問樓上人何所見邪答言見三日及大白山水流奔趣如入大坑船師云三日者一是實日二是魚目白山是魚齒水奔是入魚口我曹了矣時船中各稱所事都無徵驗中有優婆塞語衆人言吾等當共稱佛名字佛為無上救苦厄者衆人一心共稱南無佛是魚先世曾受五戒得宿命智聞佛名字即自悔責魚便合口衆人命存鸚鵡生天者賢愚經云須達長者敬信佛法一切所須悉皆供給時諸比丘日日往來説法教誨須達家內有二鸚鵡一名律提二名賖律提稟性黠慧能知人語諸比丘往來每先告家內聞知整理敷具後時阿難往到其家見鳥聰黠愛之在心而語之言欲教汝法二鳥歡喜授四諦法偈言豆佉苦三牟提耶集尼樓陀滅末伽道其家門前有樹二鳥聞法歡悅樹上次第上下七反誦習其暮宿樹為狸所食緣此善心即生四王天阿難明日遂到其舍聞二鸚鵡為狸所殺還白佛言須達家內有二鸚鵡昨教誦四諦法其夜命終不審識神生於阿折佛告阿難緣汝授法生四王天乃至第六天七反生天無有中夭阿難又問六天壽盡當生何處佛言下閻浮提出家成辟支佛一名曇摩二修曇摩真境無名等者理本無名因名會理故依一理立種種名大品下彼經第九大明品云復次憍尸迦是善男子善女人聞是深般若波羅蜜受持親近讀誦正憶念不離薩婆若心若以毒藥燻若以蠱道若以火坑若以深水若欲刀殺等皆不能傷何以故般若波羅蜜是大明呪是無上呪此即一心三智之般若尚能遍蕩三惑二死之毒何況世間之毒而能傷耶照理不虗名曰大明更無加過故稱無上一數二隨等者以彼經説三呪其第三者名六字章句而於呪後廣説六道六根六妙乃知前呪只是密説三種六法故名六字然六道是所破生死六根是所破煩惱以經明六根與六塵相應各起三毒故六妙是能破之行今文略舉行義以攝餘二安癢數息從一至十名數門攝心在緣隨息出入名隨門不念數隨凝寂其心名止門於定心中以慧分別名觀門反觀觀心境觀俱寂名還門不起諸垢心如本淨名淨門妙是涅槃之理六是能入之門能所合標名六妙門廣如別説鬼神王名者稱其王名部落敬主不能為害今此神呪乃是密談三德則應遍有五能如阿伽陀藥遍療衆病若不爾者豈魔衆暫聞而能發菩提心耶彼既得非想定等者即釋背上起義也得非想定而計為涅槃即是非果計果名為見取自恃所證輕他得下定者故知此慢從見取背上起也以外人但伏思惑見惑全在故昔非想地等者指須跋舊習故云昔也非想地自有慢心非前散心之慢故云猶有慢在而彼得下定者即是他人得下八地定也我心殊多者謂我已得非想故輕慢於他但無現在因緣者以不知衆生雖有過去壽業要賴現在飲食因緣及現作苦樂因現受苦樂報等但云過業以感現果所以成邪現在無因等者經云本業既盡即現在無因也衆苦盡滅即未來無果也其人邪見撥無者謂蘭那撥三世因果亦不許過業感今現果故云不説業行正謂無定之報者謂不定果也經若以斷業因緣至不得解脫者斥彼顯過也以造業由心必斷惑心乃得解脫多作六行等者謂猒下苦粗障欣上止妙離亦曰勝妙出作八行觀者亦名八聖種觀然此八觀有總有別總者總以八觀觀彼四陰和合不實別者以無常等治四陰理無常觀識若觀於受空觀於想無我觀行以癕瘡等治四陰事謂觀受如癕觀想如瘡觀行如毒觀識如箭若止觀中引用即云受如病想如癕行如瘡識如刺又觀空處如病識處如癕無所有處如瘡非想處如刺其名雖異其治大同以有此八心易生猒疾能捨離修習無漏問四禪但以苦粗障三而為方便空等四處何須用八答空處定細不説八過過患難識凡夫亦有依六行者不及聖種之速疾今此須跋等者此之經文即外道修八觀之顯據也但例等者若例佛教應須具八而今但七闕無我故以外道下釋闕無我之意然又佛教八觀但破無色今外用之通於色界涅槃無想者真實涅槃實無想心汝今妄計非想以為涅槃是故存於細想後墮無間受是惡身者從地獄出受飛狸身此乃如來懸記其事經況其餘者況劣藍弗外道也歸伏文為三者後分未來故只三段今有後分乃有第四須跋出家也想是智名等者智即能觀三觀境即所觀三諦三諦分顯則斷分段變易兩種三有故經云能斷一切諸有也經一切法無自相等用衍門四句推撿令入畢竟實相空理也此空遣於俗有者以畢竟空蕩二死有三乘異觀者乃是今家析法三乘耳三乘同觀者即衍門體法三乘也故引大品三獸度河為例同觀中道者以今經同了圓常故同觀中道則是行漸解圓若以圓位收之則聲聞菩提當七信位支佛菩提當八信位菩薩菩提是初住已上雖同觀中道而隨根利鈍證入淺深此與前四智觀因緣不得相類前四偏圓解脫以成四教今三則行漸解圓同歸一實是知前四今三不無所以如法華經損生者即分別品中一生至八世界微塵一一配位以説而今經有發二乘心者以重施故然雖發小心與前三味不同今此乃是解圓行漸但寄二乘法中修行云發聲聞等心耳亦可作大乘聲聞釋之即法華云以佛道聲令一切聞也須跋悟道者北涼梵本未足故此得道之文方有九字今後分既來此之九字合在後卷出家文後安之開善下開善哀幸也謂如來最後度須跋一人而便入滅故云自斯至哀傷也然皆下其餘雖未得度而幸聞法結緣故佛滅後四依傳法得聖道者其人甚衆斯皆此會下種結緣之人也今經下今師勸勉涅槃五分其文已周所闕其餘但是用章少分而已故云經教滿足故誡後人逢斯至典唯宜勉力自行他化雖曰未證必謂之近脫復下其有不遇斯典不達圓常則三惑浩然二死重積方將沒溺苦海如何可出故云沒苦如何居士下引經證闕據彼經所談知此猶闕三品然今後分乃有四品遺教還源二品則當囑纍茶毗廓潤二品則當燒身起塔之文尚未至此抑又今後分四品與此所指三品數既不等前却亦殊將非譯人隨情安置故有不同或恐天竺梵文由來自異例如仲尼之教出自此方尚有齊論魯論開章各別況彼佛滅時賖結集兩異傳來梵天豈得皆同凡諸經翻譯前後不同者皆如此例也嗚呼章安祖師未逢後分顧我眇劣而覩全文隨力讚揚幸莫大矣陳如品末此後分經者案譯經圖紀云沙門若那跋陀羅唐言智賢南海波凌國人麟德年中益府城都沙門會寧故遊天竺觀禮聖迹泛舶西遊路經波凌國遂共智賢譯大般涅槃茶毗分一部二卷寄經達交州會寧方之天竺後儀鳳年初交州都督梁難敵遣使附經入京三年戊寅大慈恩寺僧靈會於東宮啓請施行此經批文云婆羅門師者即智賢三藏以四姓中婆羅門取為清貴故天竺通稱婆羅門國其僧亦曰婆羅門僧出西域記古來講者遂以此分二卷續前大部為三十七三十八也此文猶是第五用章初陳如半品即歸伏中第四須跋出家也甚深妙法者聞上佛説無想之法乃是實智實境境智名別其體元同境智相冥三一互攝故云甚深妙法也而得法眼即初果初聖果現證中初經家敘事法性智水下經家歎德初三句正歎智斷初二句歎智德中先歎境能發智如源出水則是法性之源出智慧水故云法性智水次句歎智能照境如水從源出還溢於源如智從境發還照於境故云灌注心源後一句歎斷德即是境智冥合能斷三惑二死之縛故云無復縛著漏盡下結歎智斷漏盡結斷德意解結智德二德具故名阿羅漢行漸解圓意如前示蒙如來恩者佛令阿難召我殷勤教誨令我捨邪故云恩也世尊下歎佛悲智之德由大智故自出生死故云智慧大海由大悲故令我捨邪故云慈愍無量行苦遷逼者以苦依身在未免遷逼壞器毒身者四大無堅如壞易壞身如蛇篋故曰毒身無歸無依無趣者以佛喻君父師佛今既滅則臣無主可歸子無父可依資無師可趣上略標無主下具釋三義若具標者應云無主無父無師也八種聲者一極好二柔耎三和適四尊慧五不女六不誤七深遠八不竭遍緣境界等者緣六塵境起三種惑謂於好色起貪惡色起恚中庸起癡聲等皆然以惑潤業能感生死名造生死業法應如是者欲令衆生修善斷惡故方便示滅也如來涅槃甚深等者以滅即不滅不滅即滅亦即非滅非不滅故重言甚深所以如來示滅上達其本下悲其迹中根處悲達之間二乘皆在下悲之限現病品云下愚凡見言必涅槃唯諸菩薩文殊師利等能知如來常住不變即噓長歎者噓吹也歎平聲無緣者耻躬不逮所以長歎唱言下有機者能見賢思齊所以稱善疏云亦應生起四品者須跋既得道入滅則如來化事已周故以教法遺囑時衆故有遺教品既囑纍已畢則聖心無慮宣入祕藏故次有還源品既已還源須焚應質故次有茶毗品火葬既訖靈骨猶存故散及人天令供養獲益故有廓潤品遺教品此下四品即第五用章中次明化周掩迹用也疏云亦可稱為第六意如前記然此四品總成一對初品即聲益以遺教利物故後三即形益皆遺身利物故釋品題者急就章云遺者有餘也法華玄義云教者聖人被下之言也遺餘言教付囑群機故云遺教品問此與遺教經同異耶答不同彼小此大故法華玄義明遺教經結阿含部是小乘也問馬鳴遺教論何故判為大乘耶答馬鳴據小中之大判為大乘即三藏教中聲聞為小乘支佛為中乘菩薩為大乘也而此大乘猶是小教故知馬鳴天台其義無爽得四教意必無乖諍應知遺教經中不談常辨性驗是初教耳爾時佛告至我大涅槃是標大涅槃難思法體勸令護持我於下釋其難得以勸修習利益自他今已顯説者自法華前以權覆實不名顯説來至法華及以今經彰灼開權同入祕藏故云今已顯説十方三世一切諸佛者亦如法華開權顯實引五佛化同所以十方三世諸佛一一皆為令衆生至一切種智今亦如是皆同諸佛住大涅槃言周圓者生滅一如聖凡互具故曰周圓放捨身命者放捨應迹遺軀也此滅即不滅亦即非滅非不滅故名涅槃諸佛摩頂者若依經修習則法身如來以權實不二之手摩我一心三諦之頂不起二邊之著名不失正念若能如是諸佛法體常現其前示入外道法中是外學也諸佛化邪皆先同後異故先在外如乾草葉者須跋於外道衆中為最上首一化便歸猶如乾草投大火𦦨況餘劣者耶入諸境界者不出六師故云受行邪法喑咽者上於金反切韻啼無聲也下嗚結反六群者難陀跋難陀二人善間算數陰陽説法而性多嗔迦留陀夷闡陀二人深曲財道善解毗曇而性多癡馬師滿宿二人善間音樂戲笑而性多嗔迦留陀夷是婆羅門種餘並王種此六常為群黨故號六群唯然者禮曰父召無諾先生召無諾唯而起鄭玄曰應辭唯恭於諾今經明車匿與大論文異意同彼云惡口車匿依梵壇法治若其心耎伏教那陀迦旃延經即得入道此文異也今云漸當調伏即用梵壇法令觀十二因緣方得入道彼舉能詮教此示所詮行此但言調伏彼出調伏之法即意同也梵壇謂默擯觀十二因緣者達三道即三德也尸波羅蜜者達止作法界也依四念處者圓四念處即是用十乘觀觀於陰境名依念處嚴心而住若無十乘何以至道犯盜佛物罪者南山云盜佛物者正望佛邊無盜罪由佛於物無我所心無惱害故但得偷蘭以同非人物攝十誦盜天神像衣結偷蘭涅槃亦云造立佛寺用珠華鬘供養不問輒取若知不知皆犯偷蘭若有守護主者三寶物邊皆結重罪無守護主望斷施主福邊結罪疏云後一結難者謂滅後供芥子許舍利尚與現在供佛無異況供其多故不應以優劣差別為難也其轉輪王以少福德下是歎輪王也於世間法已作霜雹者世間苦集因果如禾苗聖道對治喻以霜雹其轉輪王雖未解脫者文中不云次羅漢者以未斷煩惱故皆紹王位者以於城中茶毗故受是福悉當為王既各為王必相討伐則民受其苦一不可也亦令一切下若於城中茶毗則福但厚於此城而薄於諸國遂令如來利益不等二不可也阿難下但可城外福及四方言討伐者禮記叛者君討鄭注曰討誅伐也左傳有鐘鼓曰伐阿羅塔成以四層者下三果次第降殺疏云四佛止請半身者四應作下即預指下文四字誤也疏云許少者天帝是佛檀越得佛一牙有殊餘衆但對半身故稱許少修多羅亦云修妬路義翻為線取貫穿攝持義故毗那耶亦云毗奈耶亦云毗尼此翻為律摩達磨亦阿毗達磨亦阿毗曇此翻無比法謂無漏之法慧為最勝故即是論藏詮慧學也愁毒者毒苦也疏云前滅身益者前二段皆明滅後利益故此一文放光現相益時衆故入第三禪難生是中者三禪最難得生故大涅槃光者由內證涅槃故外有大用又令衆生蒙光所照咸悟涅槃故曰涅槃光也例如思益云又如來光名曰能捨佛以此光能破衆生慳貪之心能令行施等又臨涅槃時所放之光名涅槃光總成三釋各有意趣思之還源品二期化畢故曰應盡入祕密藏故曰還源即是攝應身之指歸法身之本也然法身常遍豈始還源神化無方寧論應盡特是機緣宜聞示滅故此施為從初禪出入第二禪等者但是已離初禪未入第二故名為出非是出散心中也從三禪出等例爾準摩耶經此即無間三昧亦名練禪即九次第定此乃如來以大涅槃心達禪法界尚非別教次第況同兩教二乘次間入出者此即薰禪亦名師子奮迅三昧猶如師子奮諸塵上謂奮迅入出為熟靜散心故順入者其入九定從初禪以至滅定逆者從滅定起復入非想如是次第復至初禪如是逆順皆經入一散心三超入出者此入修禪即超越三昧從初禪起已入非想悲想起入滅定滅定起入二禪二禪起入滅定上界皆須滅定為主下則漸漸滅入三四空識不用處非想至悲想已還入滅定此即順入也逆者從滅定起入初禪初禪起入非想非想起入初禪此即初禪為主則上漸漸滅至二種已還入初禪復有逆順相對交過者從滅定起入初禪初禪起入非想非想起入二禪二禪起入不用處不用處起入三禪三禪起入識處識處起入四禪四禪起入空處空處起更入四禪四禪起入識處識處起入三禪三禪起入無所有無所有起入二禪三禪起入非想非想起入初禪初禪起還入滅定入既有三出亦具三皆經散心為異也此依摩耶經略出其相然今經語略大體則同應如彼廣三段説法初云甚深般若次云摩訶般若後云佛眼者前二約智後一約斷堅窮三諦故曰甚深橫周法界故曰摩訶既即智而斷故佛眼亦應具甚深摩訶二義是知三智圓明五眼具足從勝而説即種智佛眼遍照十界若依若正當體空中於七寶床右脅而臥者左陰表實智右陽表權智床表寂光即權智化用已周究竟安住寂光之土故右脅而臥也頭枕北方等者東集南苦西道北滅頭北足南表證滅離苦向西背東表修道斷集然此乃表如來所證究竟無作四諦四而不四所謂陰入皆如無苦可捨煩惱即菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證欲令衆生同悟此理故枕北方等以表示之而此諦理雙非八倒故在八樹之間即時慘然變白等者於集衆時林已變白如序品中云其林變白猶如白鶴而今又言變者前謂悲近召遠一期變白遠衆既至其樹還青故今既滅其樹永變而四方雙樹兩兩對合垂覆寶床表涅槃八用同冥一體用即兩亦體即雙非然四枯四榮咸皆變白即表榮非榮枯非枯中間涅槃者表不生不滅而現生滅問前列衆中梵王帝釋悉皆在會何故今始飛下耶答前為請住獻供故來已聞談常辨性卒度須跋故歸本宮今聞佛滅是故重至普飲者飲去聲下文同衆劫即多劫也茶毗品機感在生茶毗約佛覩佛神異誠由機感機應合辨以立品名又示生示滅説法現通無非機感今捨通從別別指茶毗茶毗或云闍維亦耶旬此云火葬疏云初更為三者後二段乃是懸科無別經文次出棺現相即下正茶毗中恩深現足三入棺潛形即下化訖掩足也不能勝者勝平聲疏云餘城亦爾者十六城等皆爾也餘時者亦爾者七日之中日日皆如是也餘迹亦爾者百億閻浮悉同此相也其地乃是至處者明三世諸佛化道悉同益物事等皆於此處而闍維之疏云非今人天火也者以遍照世界故非常火倏爾心驚者倏爾即忽爾也擬示六親者父子夫婦兄弟為六親唯有迦葉獨自聞之者迦葉於佛滅後住持佛法為此等人因是不令捨雜碎戒迦葉獨聞良在於此餘不令聞恐染惡故是知餘皆不聞為生善迦葉獨聞為破惡復持舊氎著新氎上而不除舊者使凡聖普受其福故不除之心𮌎中火者以同體慈火焚權迹軀利樂衆生故下偈云自於心中出慈火也廓潤品所遺靈骨名曰聖軀福霑群品故云廓潤廓猶廣也一牙舍利此云靈骨即所遺骨分通名舍利世人既爇唯尋碎粟而棄餘骨一何謬乎應知粟體大骨聖凡俱有但熏修優劣故堅壞不同神用有別非但以碎粟為奇也千張火全不燒至除外一雙者中間皆燒表如來常行中道故金壜者徒含反甒屬雉毛纛者徒倒反爾雅纛翳也郭璞注云今之羽葆幢舞者所以自蔽翳抄掠俱去聲奪取也慨悼者謂粳慨悲悼也疏云或是簡無緣如文所説者即八王不知佛滅俱不獲舍利而還也其文未盡者謂今經無分舍利之文則梵本來尚未盡釋為始者即迦毗羅王是釋種也波肩王當第八故云終訖應是先已請者言私謂者準日本目録云後分疏或云後分科是荊溪所撰何故又稱私謂耶答和會付法藏云是先請者此實無文説是先請但荊溪約義通之是故亦稱私謂應是下謂傳中八王與此八王不同也謂此明八王不知佛滅非先請人付法藏傳明分舍利為三分天海人人中一分復分八國一拘尸國諸末羅衆二波波國諸末梨衆三遮羅國諸跋離衆四摩伽陀國拘利民衆五毗提國諸婆羅門衆六迦維羅國諸釋種衆七毗舍離國諸離車衆八摩竭國阿闍世王衆各云我當於彼求舍利分各嚴四兵即勑香姓婆羅門汝持我名問訊俱尸諸末羅衆起居輕利遊步強耶吾於諸賢每相宗敬鄰國敦義曾無諍言我聞如來於君國中而入涅槃唯無上尊實我所天故從遠來請求骨分冀還本國起塔供養香姓受教白諸末羅誠如君言佛此滅度國內人民自當供養遠勞諸君求舍利分終不可得時諸國王即集諸臣若不見與四兵現在當以力取時拘尸國即集諸臣共以偈答如來遺形不敢相許彼言舉兵吾斯亦有是時香姓喻衆人曰諸賢長者受佛教勑口誦法言心服仁化豈諍舍利共相殺害舍利現在但當分取衆咸稱善尋復語言誰能分者衆舉香姓仁智均平可分舍利即分舍利以為八分瓶塔第九灰塔第十五存時髮天持上天起塔供養明星出時分舍利訖有餘灰者畢鉢村人白衆人言乞地餘灰起塔供養皆云與之諸國各於本處起塔供養若從下約所表釋當知行人若能達三諦唯心修無作八正觀行已上位位進入則是常分如來法身舍利是則遺教遺形何須遠覔故一家釋義唯開五章衆即證性之人施即詮性之教行即能觀之觀義即所觀之理理顯有用折惡攝邪化周掩迹結括五章不離三德施即解脫行即般若義即法身即一而三咸具三德即三而一各守本章衆則自證三德用乃三德化他五章既即三德三德即我一心心性遍融生佛齊貫三無差別其斯謂歟如此了知方名開解若欲修行必依十乘委明十乘在乎止觀故知摩訶止觀通為一切圓頓大乘經教之行門也四種三昧何經不攝十乘十境何教不用教行相濟方有所歸自非一家未聞斯説幸哉鄙末偶此極唱輒以宵燭增暉耀靈辭既不文義亦無取唯願一切諸佛涅槃真法三乘聖賢攝我以慈悲加我以福慧往還五道周旋十方常闡斯經以導含識同歸祕藏共了圓伊虗空有窮我願無盡
