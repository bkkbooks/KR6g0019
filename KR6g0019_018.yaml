body:
  text: 錢塘沙門釋智圓述迦葉品初此下迦葉陳如及後分二卷俱屬涅槃用章而分二段初二品明折惡攝邪用次後分明化周掩迹用若爾後分疏何故云是第六化周掩迹章耶答此於用章別數子科則當第六謂一召請常衆二開演常施三顯示常行四問答常義五折邪攝惡六化周掩迹故有六章今合五六只是常用常家之用故曰常用常即涅槃之理也故知章安之世雖無後分經義已圓故前釋通序但以五事主對五章是知更無別立六章之理如其不然則章安立義便成殘缺況曇無讖云此經義足而文未盡豈非經義不出五章任有餘文當在用攝善始等者前發三十四問稱可佛懷開演常施故云善始今更請問卒顯常用故云令終令亦善也前隨義題品者前雖是迦葉發問其義包廣但隨義類題為長壽等一十四品之別悉無迦葉之號今從等者今之所問唯在折攝其義既約故使品名但從人立地師等者即地論師用天親七分判經也此品明佛慈悲方便持善星闡提之惡住佛性之善故曰慈光善巧住持分也義用異者義約自證用乃化他菩提種子者性為修種亦是修性互為種子如前疏此亦果性者即下經云從無明行及諸煩惱得善五陰是名佛性此則捨無常色獲得常色等當知前品因果各明此品轉因成果故與前異由來解下古人皆作此釋也是應身佛性等者應同萬類之身故有三世法身凝然故非三世聖人果性既有二別凡夫本有此二亦然故向云佛性有三世有非三世此凡夫本有也此不然下今師正釋因中佛性即三世攝者雖三身之性並常自金心已前未究竟故猶是無常故為世攝至果究顯故非世攝合三乘者前取習氣有侵有盡故離今約同到彼岸故合又非但開合異亦應云真妄異前生死河是妄今涅槃河是真六道皆有佛性者一一皆具五佛性也別據萬善了因者前品明生因了因義甚廣又廣破定業示不定令修道品使見佛性即別約修得以説故屬了因通據善惡者今品修性俱明故善惡皆是佛性故云下引品文四句為證善根人有等者善人有修得緣了之善闡提則無闡提人有等者闡提有修惡善人則無然此但引二句應云或有佛性二人俱有或有佛性二人俱無則成四句謂二人俱有性德三因俱無不退性以未入相似位故從初意者五異中從義用異故題大章為涅槃用也以虗妄力者佛性即無明心隨境轉故能起惡以佛性力者無明即佛性理具內熏故能生善斷善由背理起惑生善由反迷成悟兩人更遞者謂作善作惡各是一人謂此人作惡彼人作善彼人作惡此人作善更迭對論故成一雙非約一人以論先後善惡故云然不相關又一下約一人説如文今明下二師各執成非今家雙取為是故引河中七人釋成其義未起四住者謂方有無明未有見思其迷尚淺故於中間接去成佛亦是一時改惡為緣者機緣宜聞故且隨機方便權説夫本迷無始故無次第起惑之事若爾下總斥同彼外道既云始起一品無明有佛接去成佛者是則不假修道自然成佛例此亦應今時造惡之人至惡極時亦須有佛接去是亦不假修道若然者則與外道邪計八萬劫後自入涅槃如放縷丸縷盡則止既同邪計豈是佛法若言下以始起例未起破也應在別處者應在無煩惱處也若爾應元是果佛後漸起惑却作衆生也顛亂之説莫甚於此若從下以始起品例後起品破也自後起品等者且諸經教凡説無明或十二品或四十二品既許最初起一品時有佛接去則後起諸品例應有接起無明既被接起四住時亦應被接何故只云起一品時被接耶故云何不被接若無下以無明窟例四住窟破此亦縱計轉破也縱彼計云由初起一品其迷猶輕故有接去成佛者後起漸重故無接義故今轉破云且小乘教所談破四住盡則得成佛及羅漢果是知四住亦有初起何故不云從四住窟始起非想惑時有佛接去成佛及羅漢等耶此非想惑於界內最輕故其義既非故結云故是難信若爾下牒執正為今經所破若爾者借使無明後品及四住窟悉有接去成佛者是則大小果證悉皆不假修道而自得之上師子吼品頻破此義若佛下正引破文汝謂接去不修則同任得菩提也佛兩弟子者阿難調達是兩弟羅云善星是兩子兩弟是權法華已顯以例兩子非是實人聞不定教執成定解者不了如來隨宜之説而定執一義以破諸餘七句者前四化他能不調能調拔惡始也不淨能淨拔惡終也無歸作歸救苦始也未脫能脫救苦終也後三化他德具八自在救苦之德醫師藥王拔惡之德知病如醫差病以藥即羅云庶兄者異母之子故曰庶兄則顯羅云是耶輸所生是佛嫡子也遠法師云此應是佛堂弟庶兒故説為子具足三德者即戒定慧也經廝下音斯賤役也緣有淺深説有次第者緣深者先為説緣淺者後為説何以下約經先菩薩次聲聞後闡以徵問解云下答釋凡有三段初明小機次第二約大機次第三顯今經包括統前大小初文中提謂文鱗如前説此小機次第以人天教為最初小乘為中菩薩為後略舉方得具足應云般若法華引小歸大悉是教菩薩也此則小機所見先小後大與今經三子喻不同故云自是一途等若初下約大機論次第也初照山王者即喻如日出先照高山是説華嚴先教菩薩也次照平地者即方等已去三味大乘俱教菩薩不言照幽谷者以鹿苑説小大機一向不用故此則大機所見始終俱大亦與今經三子等喻不同故云此復一途以由今經三子等喻皆後教闡提故今此下顯今三喻包括以山王為初者華嚴先教菩薩也文鱗為中者始以歸戒接誘次説生滅令證小果彈斥洮汰至于法華會小歸大悉為二乘此即次教聲聞也雙林為後者此經明闡提有性若能改惡定得成佛即後教闡提也故知三喻始自華嚴終至涅槃五時之教包收並足問此之三喻既攝五時如為聲聞始從人天小教終至法華開顯何故經云淺近之義為聲聞説耶又為闡提正在今經談常顯性超出二死經何以云世間之義為闡提説乎答悉據初説故云淺近等也以小教機必先小故闡提之人必先令信善惡因果故若約會歸同是徵細之義也以二乘闡提俱成菩薩故以家業故者諸佛以化人為事所以最後不棄闡提經藁草古老反禾稈也義兼無差者雖有前後必等教故象不足等者象身巨大師子殺之力似不足兔身微細師子殺之力必有餘量力下象力強兔力弱故殺之合有徐疾之異今獸王一等皆盡其力不以巨細量力而有輕重之殊也就緣下經文但合菩薩闡提略無聲聞疏文具出佛不二三等者合師子王也經反被拘執者反著毛衣詐為鬼狀也拘執即古貝垂毛衣第十一經云拘執䩸衣是也經何故羅漢於阿羅漢者善星謂如來苦得彼此皆是羅漢何故如來羅漢妒嫉苦得羅漢耶上言羅漢下言阿羅漢者具互顯不須異説經踡脊者巨員反曲脊也驗知是權下云云豈但善星是權而彼尼犍亦是權也若是實人豈能以食吐鬼身讚如來之德耶不見後接者但見定當有雨不見後為修羅以手接之入海也夫五緣故雖布陰雲而雨不降一火大焦二風大吹三為修羅所接四惡王治化五衆生業感如經律異相中説即是欲力者十力中當第五也謂知他衆生種種欲解也如無漏無礙等者若約今宗但是分例無漏一發永無失沒闡提遇緣即發善心故非全例若依五性宗此成全例彼明闡提無佛性不得成佛故是知數人義符五性若爾下今師牒斥闡提下今師明義善不並興者善惡相反如水火故此修善也若論性善常自有之善不得生者修善不生也亦是性善不顯故令修善不生故知邪惡由蔽理性故障事善若解佛性事善還生故後惡稍滅等者由解本性故事惡滅稍滅猶漸滅也約位則名觀似真等滅答具有兩義者一有善可斷二無善可斷其曾下次第釋出無善可斷者還成斷善之義以未生善不得起故理內衆生即圓名字已上悟解佛性之人理外即前三教人違於本性故曰理外顛倒虗妄者離二邊求中道捨生死取涅槃欣樂人天不畏惡道此之九界悉名顛倒不稱實相咸名虗妄是故無圓融信等五根也此釋太漫故斥云此義不然也只此下正釋理外者自別已還至于人天節節皆有五根故云亦有信等闡提下明彼起三塗惡尚斷人天等理外五根況佛界五根耶以彼撥無世間出世間因果故既有佛性等者由性本具故能起修以偏圓五根悉理具故只由理具所以遇緣善發而即未有者由修惡為障故然此修惡非指撥無故異闡提言不斷善修性善惡廣在前記定宗者終無善法是闡提之宗但自微弱者善在未來現在未有於今無益故云微弱經如朽敗子等者且據現在以説若約未來朽子還生佛性是善至不可斷是釋迦葉問也言佛性是善是常者悉約正因都無邪我者即空見外道所執之我也諸法皆空故曰都無然其所計自謂非三世攝故舉此我以喻常我語勢牽令佛性是常者謂相帶而來只由真我是佛性異名故經現在世中至闡提世者此據緣了佛性以説若具修得緣了豈是闡提人耶是知言斷善者正約緣了不據正因經快發斯問者能多利益令後世衆生而得正解故約未來得等者正因之性究竟顯發在未來故食可見者因食得命食即是因命即是果説命為食即果中説因也經文下句云見色名觸色是因觸是果此即因中説果觸名不同下備釋見色名觸義論云者成論也問因前生者因前答云佛性者猶如虗空非過去非未來非現在故經牒云義如是者既非三世何故如來前文處處説衆生有佛性既云衆生有佛性則屬三世佛語相反故此問之衆生定有此性者衆生是妄佛性是真妄即是真故衆生有性既如虗空何所不攝豈遺草木獨無性耶應知彼生既然我心亦爾彼我俱迷同立生號心生既爾諸佛咸然心佛衆生三無差別一一互遍彼彼自殊皆是無記者雖有見聞憐愛之善不能牽善果故屬無記業既無下據無正信善邊正屬惡業此於三性但有其二定無善性取業對善欲者取著於善由樂欲故求業對善思者夫身口作善皆由意思故經身業口業意業者業所依也取業求業者業相應也施業解業者業自性也給養親友自相染愛奉事師長但為人情設施外人唯祈恩報由斯施等皆邪業也又澤州疏釋云闡提若有身口意業就具以舉見心造業名取業愛心造業名求業施業解業當相以舉闡提亦有捨財名施亦有讀誦分別名解如是下結明無善何以下釋此解亦通經不求因果者世間因果出世間因果皆撥無故色香非苦者闡提但有憐愛之善喻如色香非苦莊嚴下凡三家解義於三性中各據一性以釋莊嚴謂闡提亦有善性光宅謂是無記性開善謂惡性三家釋義開善為優故道場惠觀亦同此釋而與今師立義符合前二師義一往亦通並無記性者以憐愛之善不能牽人天善果故如棊下以憐愛心亦屬工巧無記所攝也然無記有四一異熟二威儀路三工巧處四通果異熟者謂三界五道果報五陰即異時熟故變異熟故異類熟故具此三義故名異熟二威儀有二一威儀事謂行住坐臥四塵為性二威儀心即意識強盛能引發威儀眼等五識自性羸劣雖緣威儀不能引起威儀第七末郍惟執賴耶為內我既不緣色等四塵所以不發威儀第八賴耶雖緣色等諸塵亦性是羸劣不能引發威儀言路者謂威儀行路也工巧者一工巧事謂彩畫雕鏤五塵為體二工巧心即是意識眼等非威儀準前四通果者謂證果有於通用亦名變化無記一變化事謂改易形質無而欻有小乘以五塵為性大乘以五陰為性二變化心即是意識上為中下注云云者謂更有中為上下也或注云云在如文下者非若定則不爾者若是定者不應斷已還生及得四禪而墮地獄也經具足十力者即是十力中第四知根力也約餘人為答者顯如來具足根力非但知善星一切衆生上中下根悉能知也經無異路者若發菩提心必至佛性泉也經僧鬘此云對面施説教不定者由機不定致令如來説教不定佛如明鏡普現衆像故云照根不同衆生不達者未得教法深益之人致有斯諍特是略耳者過去已謝是故不説又由過去善根生今善根説現知往是故略之諍論下云云者開善合第二十犯重人有性無性在第十九一乘三乘中故但二十冶城謂與前義不同故別開為一故有二十一今師依之非六凡識所知者非凡夫六識所知也初智人聞有等者此約二諦相即聞有無等者聞説雙照即達雙亡若聞雙亡亦知雙照此則聞佛四門之説解四無四而皆互通疏文且據四門亦可權實大小相對以説謂聞權知實聞實知權聞權實知非權實等須知權實四教各有四門而疏不約權實者應是直就圓實以説是則言有是權攝前三教言無是實獨在圓融有無不二即權實不二也一二等者於一法中作二種説應知二説即一法一法即二説面聞下面從佛聞尚有是執末世滅後執之更甚故曰轉尤不解對治意者説有治無執説無治有執愚人不解因起定著豈能破有無之惡邪國土下隨方也時節下隨時也唯得肉食者雖開食之如食子肉不應貪味又得和肉糜飯當以水洗令與肉別九住等者九住亦應少見十住比於後果亦成不見以後望前得云少見以前望後得云不見他所宜故與奪説之故名為他語也世界意下云云者知彼根性差別故作不定而説令聞者歡喜故屬世界應是遺漏者今世行本皆無結文應於作種種説下結云是故如來名為具足知諸根力廣出不定法者即前所説教法也略舉一邊者經中但例三句也涅槃八味者如前名字功德品説經帝釋者此云能作天主憍尸迦者過去世時波羅奈國有婆羅門姓憍尸迦好修福業與其同友三十二人共為邑義憍尸命終為忉利王餘為輔臣佛依本姓呼之經寶頂者從髻中明珠為名寶幢者與修羅戰勝遂立勝幢因以為名論家至為比者只是過未四諦智比於現在故得比名今意在大須依初解澤州亦云佛知生死無常苦無我不淨知涅槃常樂我淨為八七如梵行者此釋可依以七善在大故止就善義者皆約天主具衆德故以立多名故云善義重約五陰者以五陰通善惡故經亦名為諦者遠師云有漏五陰是苦諦無漏五陰是道諦但除色陰者以四陰名心心即識故雖有王數之殊通得名識澤州釋云有漏陰中陰識一種自餘四陰為識所依名四識住所謂識住色中乃至住行中以無二識故不云識住識中與今釋異者恐各有所據經中四識住列在四食之後疏文隨便故先釋之陰通內外者段食在外思觸識三食在內所謂色陰中有段食識陰有識食行陰中有思觸二食受想不論能通名道者由觀五陰即佛性故反迷成悟通至佛果亦可云道謂六道以五陰通六道故此亦兼釋亦名為有也二十五有即六道故此亦兼釋亦名衆生五陰和合成六道衆生故體即無相者此即兼釋亦名為世五陰之相名世體即無相名第一義三修者色名身戒餘四名心經名因果者善惡五陰名習因報陰名果正在行陰者以起三毒等正屬行陰故亦可云有漏五陰從煩惱生能生煩惱故名煩惱有為解脫者五陰身在故為因緣體者十二因緣不出色心故亦名三乘等者即釋經中亦名聲聞等三也有本作三修者文誤以和合色心成三乘身故餘皆可解者即經亦名地獄等以五道三世俱有五陰其義易明故不釋也此即約世説第一義者以阿若但是人名故屬世諦衆生不解致成諍論者如小乘凡二十部執計各殊大乘一性五性宗承兩別若不曉解赴緣之意豈免諍論之失如來略舉二十一事以明不解之端以此例知像末之時東西二土大小兩乘凡有各執悉由不解赴緣之意初明涅槃不涅槃中疏文先懸示部執次隨文正解下文例爾婆多據事者此是有宗多據現事以現見如來灰身入滅故云畢竟涅槃諸仙者釋名曰老而不死曰仙仙遷也遷入山也故制字人傍山也魏伯陽周易參同契云精液理筋骨致堅衆邪闢除正氣常存纍積長久變形而仙有權有實者權人為引實行故故説無常者此大涅槃之用也而無常即常亦即雙非以餘勢故者神通雖失餘勢猶爾故墮不死摩竭提此云不害以國無刑殺故經食唾者乎者以達多化為小兒在闍世膝上闍世以唾飼之口中故佛以此為責經二者殺須陀洹者以父王幽閉七日之中目連飛往為説法要得初果故如十六觀經説假名菩薩即前三教人皆謂定滅如來説常令達圓頓真實即圓人須善部意者此亦二部不同婆沙明有門義故宗婆多成論明空門義故宗無德不同外道者以了無常不同外道計常破諸至離陰者以外道計我是實故以假我破之有相續下正示假我義釋三假如前記不言相待者依經且二具足必三復言實法下實法五陰也以攬五陰成我故五陰既滅假我亦無如指既滅拳名亦滅也復言下實法滅故無但約假則有如血肉之指雖念念滅不妨相續以立拳名是故有我此一向明有我者雖或説無次還明有若我無我破我無我者即招提明以我破無我以無我破我也有此理不者真諦意云中理非我非無我故理中下正破然彼但執雙遮豈知雙照二鳥俱遊何曾理中不得有我無我耶然二宗執我有無是小義真諦依今經意用大理以破之不得有無常等者正是一鳥窮高之涅槃一鳥在下之生死雙遊並息義俱不成是知真諦但見黃在前豈知挾彈居後也若中下疏主正依龍樹中論以申其義説我無我雙照之用諸法實相雙亡之體亡照互融體用相即是則相破義既成兩非義亦成故知招提真諦各得片意例諸諍論者若例次文者應云諸佛或説有中陰或説無中陰諸法實相中無陰無非陰前後諸番悉應例作前明相續假我者以説善惡果報有受故此由相續故從因至果唯因成是體等者相續但是因成經時前後得相續名相待但是因成橫待豎待得相待名故此二假並名為用色心總名者以十二支不出色心故若為其作佛性義者前次第釋經皆躡次師假名性義今更依初師佛性之義次第用釋下句經具為五陰所成等者五陰即佛性故故經云所謂內外乃至五陰也因成所成者所成即續待也即是合義者合會也復是緣義者煩惱潤業令得受生即資助義二手能出譬期者二手合能出於聲譬五陰合能出於我聲譬體者聲從二手而出如業從色心而起相拍譬愛者雖有二手不拍無聲拍故有聲拍是出聲之緣故譬煩惱經衆生業愛者生合二手業合聲愛合拍無計離陰於草木計我者若離陰身別有我者義當草木外物是我也亦不得計離陰有我者此正明經意佛恐即陰被破轉計離陰故云終不離陰等耳即有六有者以中有足五道為六此正當計無中陰家遮計有中陰義也若許有中陰應有六道既但有五道驗無中陰經云無色衆生無有中陰者毗曇法中説除四空餘一切處定有中陰以無色界無處所故向疏云色地受生定有中陰是也二果用等智斷惑者二三兩果也等智即世智謂欣猒之心也凡聖等有故名等智牽羅漢退者而現生必得遲者至死還得羅漢終不隔生沙井喻等者上磚喻羅漢下磚喻初果沙喻中二上去到下者喻羅漢退為初果也有時退失者若據次第修人得電光定從欲界入初禪不云有退今云退者應約超果經一內二外者應以五義分別一約惑復有二種一受生煩惱於受生時起貪等結二障道煩惱現起染汙妨礙聖道彼阿羅漢受生煩惱一向不起名為不退障道煩惱得有起義名為有退二約惑因緣惑起有三一性使不斷為因故起二以不正思惟故起三緣力故起如見女色生貪欲等羅漢無前二因而起煩惱名為不退緣力生結名為有退謂見增上可貪境界暫爾生貪還即攝心斷之令滅三約道道有二種一者有漏等智斷結二者無漏聖道斷結等智則有退無漏則無退四約住散亂有退專修無退五就根鈍根有退利根無退義既如是不得偏執經有時解脫者以要待時方得解脫時有六種一得好衣二得好食三得好臥俱四得好處五得好説法人六得好同學待此六時名為鈍根不假此六得解脫者為利根六人者疏釋可知遠師云舉六羅漢證成有退謂退思護住勝進不動是六羅漢舉譬者觀經譬合二文似明不退而疏主科在初退中未詳所以寄言故有為者以可説故而其理無為者直約因緣相生之理古今常定無一念間故是無為不得云三道即三德是無為也此約因緣妄事説無為故請觀經文餘三句便來者謂正在初句餘三因便而説壞三因者壞愛取有也復無生死者現因滅來果亡云云者有餘羅漢已斷子縛而果身在猶是過公二因所感故云從十二緣得可見云云者凡夫五陰是過因所感故云從緣生現在復起三因牽二果故云亦十二緣經上行生天也下行三塗也有障不障者五欲不障下二果能障那含及羅漢果故知曇無德義與成論同以論宗彼部故多祇二部各據一邊經獲得正道者正道聖果也在凡夫時者即得禪外道後學佛法也經遠離煩惱者以伏惑名遠離經斷四禪煩惱者用世智斷也故佛三説三界不同並是隨機貴在得入相應思為正體者夫施者皆以意思割捨方能有施故以意思為體由意思故即以身口助之令所作成就暢其意也三無為者一虗空無為頌云此中空無礙明虗空無為以無礙為性由無障故色於中行名為虗空二擇滅無為頌云擇滅謂離繫擇者慧也由慧簡擇四聖諦故滅者涅槃不生名滅擇力所得滅名為擇滅三非擇滅無為頌云畢竟礙當生別得非擇滅言當生者當來生法緣會則生緣闕不生於不生時得非擇滅此非擇滅礙當生法令永不起名畢竟礙言別得者謂非擇滅有實體性緣闕位中起別得得故非擇滅得不因擇但由闕緣名非擇滅論云如眼與意專一色時餘不見聞等色聲香味觸落謝過去畢竟不起得非擇滅名經不從智緣者智緣即擇滅也以於內凡忍位便滅三惡故知不從初果無漏擇力所滅也即此計無擇滅無為毗曇定有等者四大是本名為能造餘青黃等是所造成論則無者彼謂四大是假色香味觸四塵集成不造諸色經所謂粗細下列所造色澀滑是所造觸青黃至斜角復是色輕重寒熱飢渴復是觸煙雲塵霧復是色依毗曇更有高下光影明暗正不等並是造色此中略無經如響像者能造四大如鏡如谷所造之色如響如像定云無作非色者具足應云非色非心以德宗用不相應行為戒體故僧祇異前兩師立應云以心為體如前念戒中已釋不作心果者明無表色不為心果何者以無表自以身口作色為因發於無表色為果但是以色因發色果故非心因果也不生餘色者以無作色非顯等色也經戒有七種七支戒也經其心雖在惡者此明無作色不屬於心何者以心在善惡無記中既不失戒驗知不屬於心別有異體者以彼部中宣説同時別有諸數與心別體相應造緣僧祇下但有心王故無異體者唯説一心隨用分為多數不説同時別有諸數斯皆不達如來隨緣之説執之成諍應曉心數亦有亦無唯一知性隨用分多非全心外別有諸數故言非有譬如一金作種種器非是金外別有器體隨用分別想受行等各守自相得言有數如金與器非無差別金器雖別時無先後心行如是安可各執先舉聖人十二因緣者謂變易土中界外十二因緣也皆是根本無明所出次明凡夫中經明十二因緣少異餘處餘處所辨過公因中彰無明行今此具論無明愛取及與行有又復餘處現在果中説識名色六入觸受今此唯説受及名色又復餘處現在因中説愛取有今此通説無明愛取及以行有又復餘處未來果中説生老死此説受觸識與六入十二因緣齊通三世隱顯互論於義皆得故俱舍云略果及略因由中可比二細尋之者令尋文釋義也經聖人色隱等者以行等十一支不出色心如是色心皆從根本無明所起此乃但明過去之因也次正明凡夫中初明後即前經有二段先明過去因經從無明生愛當知愛即無明者無明之心對境染著即名為愛是故此愛即是無明經從愛生取等者即前愛心取著境界即名為取體性不殊是故此取即無明愛經從取生有下即前取心起業名有是故此有即無明等次論現果經從有生受下此名識支以之為受識支即是現報之體從因納得故名為受即前有支轉為此受是故此受即前行有亦應即前無明愛等就近言之也科為後即前者以後後支不離無明故故知心外無別心數故明前生後者以經云生於名色等故然亦明其心法展轉相生更無別數經從受因緣生名色者受增為名所託精血説之為色從受生於無明愛取有及行者從現報受起後因也從受因緣生受觸識六入等者從現報識轉起未來生死果也此中文雖相生義本相即亦應云名色即受乃至六入即受經是故受者下總結無別受心向前即於過去無明愛等向後即名色等故即十二支或謂未來生支為受者疏主出他釋也正解如前記執有心數者疏文可解然經文應明其過因現果現因當果而此文中略無當果辨過因中初言眼色明欲四法生眼識者雖舉四法為取要欲為無明支欲即無明正顯其相此是過去無明支也欲性求時即名愛者過去愛也愛緣取者過去取也取名業者過去行也此言略若具應言取緣有者名之為業次明現果業緣識者生現識支識緣名色起名色支名色緣六入者起六入支六入緣觸起現觸支此心法中觸數名觸下依此觸生諸心法觸緣想受起現受支通想説之觸緣愛者起現愛支觸緣信進定慧等法起現有支如是等法因觸而生然非觸者結明其異由言非觸故諸弟子執有別數婆沙二釋者又正法念經中攝入鬼畜羅睺是師子兒攝入畜中通是一有為者總其三界是一有為果故二十五有中一有者以二十五有但是細開六道故有爾許然於六十有開不開如地獄趣但通總而為一有更不細開八熱八寒等殊鬼畜修羅品類俱多而通總各為一有而已故云如下三趣等應云四趣以二十五有開四趣故人天各離等者人之一趣開成四有天之一趣開成十七言十七者一無想二五那含六欲并梵成九四禪四空處通前為十七此蓋治者釋經中一有義意取四惡趣不細開為一也然依疏主其義頗長既通餘義故更助釋因果者二十五有不因因果也善惡者三善三惡也七識處下河西於欲界分五道云上二界為七謂此處是心王住處故若出三界真空涅槃則非識心住處也又澤州解云三空為三初二三禪為三欲界人天為一故合為七論云識不樂住三途及無想五淨居非想處三惡有苦煎迫識不樂安第四禪有無想殘害識心故不樂居又有五淨居趣入涅槃不欲久安故非識住非想及滅定亦殘害心識識不樂居故非識住此不應然下破河西而今師不出正義今準遠師云人中富貴為一六欲天為六初禪已上合為一是為八名無分優婆塞等如第一疏釋列衆中又人師下此即澤州解也彼云如毗曇五戒要須具受乃得但就持中持一戒者名為一分持二名少分等次明八戒者如前記但是互出者點示經文五戒約不具説而有執具受者為諍八戒約具受説亦有執不具受為諍經不名得齋者一日一夜是齊分故所以滅此但名得戒善不名得齊故毗曇下四卷毗曇業品偈云調御威儀戒是捨於五時禪生及無漏二時覺所説長行釋云威儀戒五時捨罷道犯戒死時邪見增法沒盡禪戒二時捨退及上生無漏戒亦二時捨退及得果更增損之者謂雜心中四捨望四卷毗曇則無法沒盡捨及犯戒捨是損也而有二根生捨是增也故雜心業品偈云別解脫調伏是捨於四時若捨及命終斷善二根生長行釋云謂捨戒身種類滅善根斷二形生律者云法沒盡時彼説戒結界羯磨一切息阿毗曇者説法沒盡時先所受律儀相續生不捨未曾得律儀不得是故説一切息有説犯初衆罪名捨律儀此則不然若捨律儀者犯根本罪已還俗應得更出家已捨律儀故佛言非比丘者以非第一義比丘故此説無過也犯初衆罪於別解脫律儀是比丘於無漏律儀非比丘盡壽律儀四時捨齊律儀至明相起時捨謂住律儀而犯律儀者是犯戒非捨戒故疏云但是穢戒也除法下正示雜心所損二捨也謂雜心無此二捨故云除也並言不捨者謂法滅犯重並不捨戒如向引論二根下即雜心所增一捨也餘部下謂二根生亦不捨戒也若準四分二根生失戒以四分四捨與雜心同故謂一命終二作法三斷善根四二形生故四分中罷道還家須作法捨其不作法者戒體還在犯重亦不失戒以餘支餘境猶轉故若根轉人僧轉為女則懸發尼戒尼轉為男則懸發僧戒故根轉者不失不同二根生即真無漏者見修二道也相似無漏四善根也受道下二即餘凡夫於戒持犯也犯者但名汙道乃至知不失一三皆大乘説者此即大乘初心不達佛旨或言二乘得作佛或言不作佛世有定執五性一性宗義者或似之以五性家謂定性二乘不作佛故非其境界者非小乘諸部境界也若爾豈可至定是耶者故知於一於常起定執者則執實謗權豈知權是實權實執水非波豈非顛倒是故金鐵二鎖貴賤雖殊繫縛一也於一起執其金鎖之謂乎龍樹所謂非論議者所知蓋凡夫易起執著故論主闕之也現在正斷者子縛斷也未來不生者果縛斷也並是近代者指此方齊梁已來人師於此經文隨語各執也當果與真神者佛果在當真神非妄即是離衆生有者以衆生是現是妄故未有佛果及真神也心及衆生等者凡有心者皆當作佛一切衆生皆有佛性聞此説者於即起執並不得佛意者以於即離各起定執故若解今宗六而復即則起於即離有定執耶是故聞即不驚聞離不怪善得佛意吾宗之謂乎及三文者猶如虗空等三段也經一闡提等悉有佛性或説無者一性宗言闡提有五性云無應知言有約性言無約修言有約未來定作佛故言無據現在斷盡善根故得今經意冰執自消婆多明無者如十誦戒本序文但云稽首釋師子也成實宗曇無德故四分戒本序云稽首禮諸佛也多世界則有者薩婆多無十方佛迦葉品之二疑是解津者津謂津濟由疑故得解則疑是解家之津濟也此疑非解者以因邊邪之見而有非因佛教異説而生故疑者猶豫不決也釋出疑由者即經心不了故等也如此事理者涅槃理也濁水事也比度能治者即經云衆生見已即便生疑等經見有二種者見生死苦故云見苦以猒苦故疑有治苦之樂故見非苦苦非苦下釋二種相先釋苦衆生見已下釋非苦經離是四事者即上離善友等四也如種良田等者雨水喻所施之物田即能受之人下種喻能施之心生芽喻所感之福下種是因雨水是緣因緣具足故生芽收穀貧是劣果者如田本無穀施得勝報者如種之獲穀田瘠下若約田有肥瘠則收有多少乃喻施悲敬兩田報有優劣今且通喻既並獲福通號良田故云置而不論私謂下先牒邪執應下種至水土舉喻破也如下種於田冬必收穀施物於貧後必勝報如水土無穀我種之而獲穀若貧窮非富我施之而果富若有施主施利刀等者以惡資施主反破邪執經有五事施者謂色力辨安壽命此偏約施食以説第六復次下疏文消經自是一意經意以供養佛像乃至亡父母雖有能施之人及所施之物而無受者以佛像等非生人故既無受者云何有報臨終一念者如阿耆達王行十善業垂終之際宮女墮扇面上一念重嗔便受蛇身云云惡念既爾善念例然而墮而升者惡念墮三塗善念升天人餘未償等者如石勒前身於罽賓施羅漢以有雞業且墮雞中後以施羅漢因故報為國王不達此等即成邪執故經出邪執疏以正見釋之顯彼邪也經如蓋是一者腦蓋也應有習果者今世亦應有智慧也有智不應斷善以斷善邪執是無智故答意者亦有習果而是世智不妨斷善也清升善根者人天善也以彼撥無世間因果故唯有三塗之惡因耳徐僕射理人者善能決斷他人是非己身有犯而不間答問也南史云徐陵摛之子也字孝穆母臧氏嘗夢五色雲化為鳳集肩上已而誕陵數歲家人擕以候沙門寶志志摩其頂曰天上石麒麟也光宅雲法師嗟陵早就謂之顏回八歲屬文十三通莊老義及長博涉史籍有口辨父摛為普安王詻議及引陵參寧蠻府軍事王為皇太子東宮置學士陵充其選稍遷上虞令御史中丞劉孝綽與陵先有隟風問劾陵在縣贓汙因坐免之為通直散騎侍郎天柱瑜者天柱山在會稽瑜名也時號頓悟禪師不曉世語者未治本云瑜常身病尼問疾云闍梨無所苦已就靈姑卜云無苦即問靈姑是誰答言是剡更問汝向剡耶答云是夜行汝夜行耶而竟不知越俗名鼠為靈姑等故云不曉世語也而是下合例也有世智如理人甚善極解深義不知出世法如不間答問不曉世語經非是下劣等者簡闡提但在人中唯是利根諸天著樂三惡苦重皆無剛決故少此心利人初入者以自然有三念故如前説釋中二者標過未二善也過去下釋出二相果字即結未來不斷者以過去善因若今未受果必在未來即順後報也既無現未過去亦息者以未來望今現在為過去又直約今生已前為過去以今不作善因故不資發過善以過善不得起故故云亦息通別三世者前三問是別後一問是通經如來亦説佛性有六者此據佛於上第七功德中説此六種也是了因者據可見之言即判屬了二謂正因者據一常二真等謂是正因望下下今意謂與九地佛性相當即九地中了因正因也懸取答意者恐佛作此答也若謂往時者未斷善前名為往時正用遣問者雖通舉四種而正以分別答遣迦葉之問故重釋也雖有而無者雖有佛及等覺之性由煩惱故常果未顯屬於三世故云而無雖無而有者必定當得常果故云而有通答前三者初明即有而無何妨斷善即答第一問次明即無而有何妨一切悉有即答第二問總此二意即答第三以斯一文答前三問故云通答當相即非三世所攝者約理則凡聖體一故非三世而未來得復云未來者約事則因果位殊未來方證即前不即不離義也如來則非三世者究竟證常住故自金心已還雖分證常猶有無常故屬三世下經明後身九住同有六事而有常者與而言之未來全見者至具見時即是妙覺若善五陰者四果十地菩提果者究竟果如下疏釋重明後身者真因分果皆屬三世但言可見與前為異者對前後身六事辨異前云六少見今云可見可見則未得少見也不與常名者八住至五住比於九住已上所證淺故奪其常名言善不善異前者五住至初住所證復淺無明尚多故云善不善不同六住已上得純善名下文詳之矣後身下通前簡顯也修得是善者於當位見中道故不修不善者未破上地無明故並云亦應真不真者具足合云亦應修得是真不修不真失念不善者若約今宗圓位初住已得念不退別乃初地並不應失念故此釋非也難亦未去者若欲去難如向記中隨文釋也經定有佛性等者若言定有現在未見若言定無未來必得不許定執即名置答置而不答釋一者遮止反質答之釋二者莫著質問也反問其義不令執著名為置答佛以莫著名置答迦葉以遮止難之私云下置謂棄置遮止莫著悉是棄置所問是故但云以置為答通收二意前疏主釋義別就兩途通別相關其義方顯因中因果者無明煩惱是因中因四果十地是因中果經亦過去現在未來則是因中果也亦非等者究竟果也因中二乘即是三世者因中果也若大菩提等者究竟果也前文下重牒前文示今釋義果性不爾者以有因中果及究竟果故善五陰者即通因果者小乘四果十地分果所有善陰望佛並因唯佛名果向云生善五陰即是果性者且約通説分證究竟及以小乘俱名果故前文下引前文證今義亦三世是四果十地非三世是究竟有人下出他人釋義既疏主已約因果釋之故知他義未當若約煩惱即為因者以煩惱即佛性故善陰果性通因者以四果十地究竟悉名善陰經云得善五陰即是四果十地也而疏云十地之果者望凡名果望佛名因向經云果亦過去未來者望凡以説唯在於果者經云獲得菩提是究竟菩提也從善五陰得菩提果故名陰果備有因中之果及菩提果者初法中善五陰是因中果也菩提果如文經如衆生身等者以衆生身喻菩提精血喻諸煩惱及善陰經佛性亦爾前四味因中果也此亦三世醍醐菩提果也此非三世即合現在以煩惱故能令斷善者以現斷善合樂果也必由過去者合過去業也由昔無信今斷善根無信即煩惱也今言下釋妨既由過惑而今斷善何故經云現在煩惱耶故此釋之合第二譬至不生果者未來若修緣了方能得果故云佛性因緣能生也若鏗然固執者若定執正因佛性在迷未具緣了如執燈明未出不能破暗若因緣假名者若曉未來因緣會時則能得見如了燈日雖復未至未出不可定執不能破暗經未來之生能生衆生者然此段經凡立二譬一燈日譬二生支譬疏但釋燈日後譬略無謂十二緣中未來生支能生衆生能生佛性者能生初住及後身等佛性經若言五陰是佛性者若陰是性則性在身內云何説言非內非外經我先不説衆生佛性為中道耶者此指師子吼品中廣釋佛性為中道義故今指之非內六根等者內六根即正報外六塵是依報為破兩執者內外之執也即一而三即三德性者即中是法身性即空是般若性即假是解脫性備此二義者即三而一即一而三也豈有無真俗之中等者圓融中道即遮而照故具二諦佛性咸遍者中既具俗俗攝三千事理依正無所不統故云是故佛性至咸遍也多處論遍者所出非一故云多處所以至此等者多處論遍是雙照此言雙非是雙遮應知言説雖殊理體無異多處論遍者是即遮而照此非內外是即照而遮遮照一如諸文義等復應雙是者即雙照也尚未能計猶如虗空等者尚未如外道之勝者安曉圓中之大義乎根塵合等者經但云內外合荊溪以根塵釋之也豈非體一等者凡有三句結責他師體一則依正體一相即謂依即是正正即是依既一既即則曉依正俱遍故云豈非性遍豈同計性唯在有情身中如器中有果耶今問下只由經云內外合故所以歷根塵責問顯彼違經先以四句定次若雙非者下正難於四句中且牒雙非以破恐他見此明中道為佛性而執此義言無情無佛性者以經云非外六入故故今以非內難之五陰即內六根既云非內非外則有情五陰亦無佛性何但牆壁無情無佛性耶若約雙照則依正皆有哀哉下傷勸也傷彼迷愚故云哀苦請細下勸曉經旨六門即今明中道六段也以括一部者以一部之文豈離中道文雖異説理必常融此為世人好執下文墻壁無性之義故令以此遮照之旨統括諸文統收一期者此經談理既然諸部圓經固無異轍但由兼等故分五時釋迦以望等者出世之意指歸此性佛佛道齊五佛無別一以貫之故云理無二是五時無別故云事無毫差所失下只由世人不了性遍則使大教徒施圓修虗設故云不輕釋迦等即五佛也一釋迦二十方而以三世為三成五也先出二執者執外道內道也次四復次等者經中約果約修以談佛性然修由性成果由因得良由本具方論修果故使理具轉成修具一一修具無非理具當用此意以尋經文經佛性雖有非如虗空者虗空説無為有故有頗見而佛性可見經猶如燈焰者從初焰至後焰相續不斷故色即佛性等者此明墻壁外色即佛性也金錍云色何以遍色即心故又云若不唯色色非心耶若色等無者若謂墻壁等色無佛性者相好色身亦應無性以俱是色法故若俱無者則有情亦無何但無情二結假説者經云定説非定執也故以假説明之經心不等故者既知酪因乳生則乳中有酪何故不許乳由水草而水草中有乳耶兩物既俱本有而偏執一有一無名心不等經四事和合者此明眼識從四緣生新經論明九緣生如前記初一異因異果者一因生一果故云異因異果故以一字明之經離於方便等者以乳久停或自變為酪故如師子吼品經要須方便者要須人工也經鹽亦應有微不醎性者難意者不醎之物既有醎性鹽醎應有不醎性耶此即互難難有令無難無令有也經不可獨用者以鹽性醎苦獨用則人不堪食若本有淡性何故爾耶經不從方便者不從外四大而增長內也一依理起教用者即如來依佛性理起權實教二明下即機緣稟教立行故曰修因行成證理故曰趣果三習下修因必習於圓解趣果定除於結惑故此三科初一在應後二屬機別明自意者自意是今經正意故更別釋經知殺解脫者知殺貪愛母無明父等得解脫也又是知因殺得解脫如殺五百婆羅門等經乃至邪見者於十惡中略其八種故曰乃至知邪見解脫者知因邪見識達正道名為解脫得無量罪者澤州云波斯匿王先有誠教有犯佛者罰財入官彼聞得罪謂招此坐才過反故求與財隨自他意可知者智人説有我亦説有隨智人是隨他我亦自説是隨自前隨愚人説幻一向是隨他經不見一切衆生定得菩提者此赴宜之説圓人初心定知豈十住不見耶然應比下實見比上則名不見與奪論之義自可了經我説如是汝説亦爾者彼此同知名隨自他意語經然不離於陰入界也者無量諸法不離三科三科不離色心色從心造全體是心一家立行唯能陰界美在斯也經七種語者因中説果名為因語果中説因名為果語説現在法望前為果望後為因名因果語立喻顯法名為喻語假舉世間不應有事而顯諸法名不應語隨世流布説男女等名世流布語有所宣説令他衆生從己化意名如意語雖有七語正約後一明己為生説性之意經衆生現在六入觸因者謂現六入及觸是過世業行家果現所造業復為來因名因果語經説諸衆生悉有佛性至不放逸者寶性論云為衆生於自身中生怯弱心謂己無性絶分不求故説衆生有佛性義與此同初明無所有者由證法身真空之理而外有力無畏相好等即真而應故云無所有無家之有名無所有次明有所無者謂不善無記昔有今無故云有所無又前一顯智德所成後一明斷德所離闡提即有下云云者此修善修惡互論有無如下四句料簡故注云云經衆生不解至自意語者七方便衆生執偏疑圓故云不解經後身至不能解者藏通後身若別教約行教道則初地已解約教教道等覺猶迷若以究竟望之則圓教補處亦名不解自等覺已還悉名其餘菩薩況復淺人者二乘及餘菩薩也世諦種別者即別圓俗諦中十法界業行因果差別故非二乘所解應身為世諦者化迹難量不可思議故非二乘能了上文云現病是佛境界非二乘所知即其例也別有所關者此如法華玄義明七種二諦中引此經文明別教二諦也故彼文云幻有無為俗不有不無為真者有無二故為俗中道不有不無不二為真二乘聞此真俗俱皆不解故如聾啞大經云我與彌勒共論世諦五百聲聞謂説真諦即此意也若約時部或在華嚴或通二酥境界性者惡邪堪為佛所觀境未有一毫之智名境界性萬善了因者了因了於萬善名了因性亦名緣因者指上萬善也或衆生性者五陰和合名衆生性也俱有無記五陰性者陰果之身既酬昔因故是無記現起善惡能作未來世因名善惡陰所謂因通善惡果唯無記也語異意同者三句意同其義可見而俱有句舊云併有正性或衆生性今云俱有無記五陰性云何同耶答五陰即佛性豈非正因色心和合豈非衆生故知義同舊説一句至七句者此通就今中道大章共釋總有五段謂初一句二二句三三句四四句五七句故云一句至七句也自他語亦有亦無者闡提現在未有佛性名亦無當必得故名亦有此古人義不可用修性善惡消此兩亦以修性善惡出今宗故七衆生在下文各有一邊者善人有善邊闡提有惡邊兩人對待故稱俱有也俱無例爾約緣故有得無得者取著迷心名得故闡提有之信理悟心名無得故善人有之如上説者還將二人相對明俱有等單就理內者以善星羅云皆權人而內已證理故順逆二化者善星逆化羅云順化謂此為能解難解者興皇自謂此釋得意也今明下明今釋欲依此文者顯前古人違經背義也故今約下文七衆生出沒以釋順經也次約三諦是順義也俱在恆河者同有正因性也俱不到岸者俱未到分證彼岸也中道因果者真因極果也以善人於圓位但在名字觀行中故而佛性是一者如七類有異同在一河經坻彌三蒼音低下音迷具云帝彌祇羅此云大身魚也其類有四此第四最小者經䱜魚且各反異物志云鐇䱜有鐇骨在鼻前狀如斧斤江東呼斧斤為鐇故謂鐇䱜也合譬具合者具合上總別二譬也前品下對前品辨異經雖得解脫雜煩惱者非想等為解脫也經雖信佛性是衆生有不必皆悉一切有之者或謂闡提無性或云草木無性正坐此失學者知之但求實利者謂求菩提也經二者隨道者順涅槃持戒也餘六深隱者伽陀此云重頌尼陀那此云因緣阿波陀那此云譬喻闍陀伽此云本生毗佛略此云方廣阿浮陀達磨此云未曾有此八深隱難解故不信今意應如法華玄文第六引達磨多羅云不信六部互不相通謂小無廣問記大無緣喻議但信六部其互相通謂修多羅祇夜伽陀伊帝目多伽闍陀伽阿浮陀達磨以消今文其理雅合經惋手比丘烏喚反驚異也未詳何義立名通五方便三十心者小乘四念為一及燸等四為五方便大乘住行向為三十心俱內凡也七方便者即小乘七也於五上更加五停開四念為兩謂總念別念故有七通三十心者且依別位以釋則住行對四方便十向對世第一因前第二等者用前第二人為緣也仍本似位者此釋為正經刁長者鳥跳反而猶有此生者苦依身在故所以未度生死此殊不見理者不知理有真中之別偏真涅槃非佛性中道涅槃是佛三人未見中道云何見性耶亦不同得涅槃者既佛性有見不見例應涅槃有得不得那忽前文以四人同為第七到岸耶涅槃有異者真中別也生死不同者分段變易二種別也即小乘七人者開四為七也開聲聞為四果并支佛菩薩佛故知有七是知前明涅槃是通教義故引釋論證成通義也通別互舉者今説涅槃河是通教義前説生死河是別教義只由今經重施四教故稱四悉機前説於通今明於別而復會歸佛性故與前部不同
