body:
  text: 錢塘沙門釋智圓述六難由佛者向佛遮請明六難四嘆由佛涅槃而得此説非虗實如佛語謙謝從佛等者應改謝為者即云謙者從佛境界生向下明謝乃從於用生經文即從世尊已去也均者齊也謂與文殊位齊也喻智斷者龍是水中大喻定能斷惑象是陸行大故喻智能照理淵泉者淵深也管子云水出於地而不流曰淵霄者文選吳都賦云披重霄而高狩注云霄近天之薄雲謂拔住前淵泉之下處分證雲霄之上也謝無常用者由佛現無常令我獲益也如來未然者方言云𧬏然也郭璞注云皆應聲也𧬏呼爪反音于次譬下初解依法文偏譬於機次解引合文偏譬於應夫聖下斥前兩解也聖言巧密者謂法中偏舉於機合中偏舉於應語雖偏舉意則互明故茲一喻兼乎二意謂衆生戀佛佛戀衆生機應不捨如飢無吐喻意通兼故云巧密無為是傍者獻供正是財施故以論議法施為傍也旁正不同即世界義為傍故論者為傍人生善故論即為人問答權巧者文殊以無常呵請住純陀以常住難無常即對治義如來境界即第一義勝負者輸者為嬴者擔負而去故以義墮為負莊子云有力者負而趍之而昧者不覺彰其非理者常與無常互相拒抗不當正理故云非理後當廣説者哀嘆品中廣説非常非無常舉佛廣説雙非之是顯二人偏執為非也文殊古佛者悲華經云文殊現在北方歡喜世界作佛號歡喜藏摩尼寶積又如楞嚴經云過去無量阿僧祇劫有佛號龍種上尊王亦文殊是約斯事理者託勝負事表三德理深而墮負表即空而假淺而獲勝表即假而空非勝非負以表二邊即中三諦即三德也料簡中三番初番簡有無者由經云有為無為且共置之是則文殊是有純陀是無故今簡之文殊至正法者即經云如是觀行具空三昧欲求正法應如是學也此難文殊有為令成無為對有論無者任將文殊為有純陀為無只以純陀之無對破文殊之有既是待對此無是有論云若法為待成此法還成待今亦例爾若空對有成此空還成有故云還應是有也那忽下結責也解云下答釋望大是有者藏通空理是界外變易生死故別圓即以幻有幻有即空共為俗諦名復俗故云望大是有對有論無者對復俗之有論中道之無也有者無無者若約待成雖名為有而此界外待成之有還破界內當教之無故曰有者無無此約對破説也或可者字誤應云有去無無謂所破之有既泯能破之無亦絶故知待對既絶還得是無又復下次簡勝負純陀於六度中方圓檀度故云行淺文殊古佛萬行已滿故云則深云何淺者却勝深者翻負答中適物等者謂適悅物機故文殊為砧純陀為捶成熟衆生四悉之器示現勝負耳故云非定勝負文殊古佛本無所負示受屈辱而於本證亦無損減純陀淺行本無所勝現能彈呵而於本證亦無增添又文下約是非互得初約今昔是當分明義昔教偏乘以無常破常故以無常為是今經圓頓以常住破無常故以無常為非次約四句是跨節明義是故昔教有為無常今教無為常住悉是大涅槃雙照之用也俱是者謂文殊依有門通理故似執昔然其所通即非有非無中道之體純陀依無門亦然俱非者若執門迷理故二俱非以體非有無故各執則傷體各辨下是兩亦句以有為之用顯雙非體約用為非約體為是無為亦然故云各有等此則將前是非二句相對而説故成第三即用下明第四即二邊用是中道體故文殊有為純陀無為咸契祕藏是非都息往復一如若然者傍論問答豈離三德三德只是一心若能反觀斯義非遠故知四句顯示理盡幽玄今古不異者謂三世道齊從古來今其道不異故知今古二字是釋來義不異二字是釋如義是故諸佛皆具二身成論云乘如實道來成正覺故名如來即是分字以配真應對今所釋但總別之殊耳夫諸下明純陀責文殊意也但如來之稱唯是極聖諸行之號局於凡夫故云生死賤名也群有即二十五有勞纍即八萬塵勞纍縛生死是諸行義三見一聞者水泡事輪聚落是現見非想天壽是聞説車輪譬苦者生死往來如輪運轉故是苦義即是非想者彼天壽命八萬大劫釋失辱中劣即諸行勝即尊號以內有四德之實外彰天中之名故明失辱名實兼舉經爵祿封賞者含文嘉曰殷爵三等周爵五等各有宜也王制曰王之制祿爵凡五等謂公侯伯子男此周制也白虎通曰爵盡也各量其職盡其才也封賞者封亦爵也國也王制曰公俟田方百里伯七十里子男五十里技藝者周禮曰以六藝教國子一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數衆生得佛下合譬雙勸説觀中三初標二舊云下懸談大意敘古中云丈夫譬者即第二遠行譬今家科為勸觀也文中四家釋義大同小異舊以貧女生子譬從境發解丈夫以衣纏身譬護正法謂不説如來是有為也開善捨迷意同護法義少異耳冶城護解者由生故護慚愧還是捨迷義耳招提釋中説佛無為還是護解覆佛有為義同護法歷觀經文研此四家但得片意又前三從行招提約教雖此解釋文義無從且向來已訶説觀至此理須雙勸是知既已呵偏次則勸圓也所以疏主分貧女譬為勸説丈夫譬為勸觀今以等者由內證無緣故外為他説説因慈生如子因女生故云生子譬説丈夫譬剛者説是化他觀是自行化他由慈故以女性柔弱表之自行由智智照無礙故以丈夫剛烈譬之遠行譬觀者理即去究竟遙即遠行義如下六即明觀也譬文下對斥諸師所立但取片意全無承躡今約雙勸譬文顯現又承躡雙呵之文鉤鎖相連既得聖旨豈任𮌎臆然對聖等者謂對寄文殊之上聖訓誡當機之下凡令達中道常住非實呵勸文殊也寓寄也又勸下簡示下凡為當機衆者乃是名字已上人也博地謂理即都未聞名呵勸何益極聖謂究竟即妙理圓極豈勞呵勸文殊本地即是斯位不上不下者非妙覺之上聖非理即之下凡乃是名字發心已上等覺未足已還此為當機正須呵勸問圓中分聖豈須呵勸耶答上地無明既在猶有無常之執呵勸何妨故論云處處説破無明三昧也三初勸下隨文正解六慈者慈即三千妙理遍覆遍攝不著二邊名無緣慈廣如經釋理同故即事異故六以譬下理慈即正因性無修得緣了故云無智無斷此合性為一以悟斥迷故使理具且約正因無有居家等者五果只是三德三德不顯由無智斷又法性即無明法性無住處亦是無有居家也法性即三德總名耳無主無親者理雖本具無機可發不感佛應也主親喻佛而有解説之義者此即性具緣了也解即了因説即緣因由理本具故於修中能解能説乞丐古賴反蒼頡篇曰乞行求請也字體從人從亡言人亡財物則行求丐也癡散所逼者無智故癡無定故散聞名識體知癡昏之性本明散動之心本靜故欲求靜慧而修止觀也靜即是止慧即是觀素𮈔等者淮南子曰墨翟見練絲而悲為其可以黃可以黑今以機發如素絲聞教生解如易染名數即諦觀之名一三之數四方曰方如中道四維曰隅如二邊觀行未成故云薄知微達也止他下釋觀行中且約助道以明故云逆旅等而不言陰即法界也然正助合行事理不二故止舍等言是五品位始修十乘在名字中五品即據行成者説逆旅者逆迎也旅客也即迎賓之所名為逆旅也陰身無主故以喻之生如暮合死如朝散六入下更約十二入明義以陰入但是開合之異入即內根塵即外境內外相涉俱得名入本無宰主如空聚落凡夫妄計如貪夫不知聚空於中求物六塵外侵六根被害故塵如賊愚故貪著如不避賊必為所害如是觀察了知陰入由心所造當體即心心即三諦廣如止觀陰境所説悲己昔迷愍他未悟愍痛之甚如被焚灼灼燒也齊此下結前三即內解外説俱未彰顯如子在胎中理全未知未彰可見名字觀行雖解雖觀事用未顯故十不二門云三千未顯驗體仍迷故相似位成六根遍照也故前三即通屬未彰生清淨解者即三德佛性相似解發也慈説已彰者慈即是境依境生解故解亦名慈法華云唯獨自明了餘人所不見即慈彰也由內解明故外能説法華云欲以一音遍滿三千界隨意即能至者即説彰也本性如女解説如子解説從於理性而生如女生子母義方顯須知慈是正因解即是了説即是緣文義連環不逾三性通前下正示經文譬三障意也前之三即悉有三障而經偏於相似位中説者良由至相似時已破分段同體之慈悉皆倚伏變易三鄣三鄣為難故強被伏故弱三觀被難故弱破障故強故云更互故於下只為相似位中三障將破強弱相陵故經文備作譬説其實三障通前三位也經寄生一子者法瑤曰解託陰生曰寄真而無二曰一舍主等者報障只是五陰故以舍主譬之慈解同體即境智一如初住實理名涅槃城名字慈後等者即指假名五品及十信位通為中路以此三即在理即全迷初住分果之中間也遇惡下名字五品至第六信猶有界內業此業粗強能牽分段故如風雨為害滋甚七信已去有界外業此業微弱但招變易故喻蚊虻侵損蓋寡又內業即意地外業即身口界內界外悉備三業經螫者舒亦反説文云蟲行毒也又呼各知列二反暹師云案琰法師經音云螫別是一蟲名故先舉蚊虻蜂螫後以毒蟲二字結之也經由恆河者由因也因河而度也論語云誰人出不由戶煩惱潤業故以河水喻之抱兒等者度河但喻煩惱而云於三障者以被驅中路度河悉皆抱兒故約抱兒以明即障達理內既達了外復化他説障即德三德融即一體無殊常與無常縛脫明暗俱約二邊以顯三德咸皆中道初則報即法身次則業即解脫後則惑即般若應知此之三障兼界內外以相下明更互強弱也慈解既強粗垢自落分段障破故云障不能障此即解強障弱漂疾等者漂芳妙反流急也分段雖破變易障強於相似中易起法愛名為頂墮法愛煩惱障惑潤結業牽生方便土中果報此名激奪體妙者反觀心源法愛即滅名為不屈故能捨相似位進入初住故以俱沒表捨似位生梵天者以慈無量心是梵天因故以天表分真究竟所顯天然之理也由相似三慈入于初住即慈念功德生於梵天也通途下明經文通合四慈意也已來者即名字五品六根三位也以未證理未能觀機故自行化他唯尚圓融故須三慈等運三觀圓修三諦圓説遮其偏一故云不應偏説非正護等者偏説如來同於有為諸行非住前行人正護圓法也若正護者應當為他圓説三諦謂有為無為非有非無三一相即名不偏説無慧眼者此慧眼即佛眼耳法華云願得如世尊慧眼第一淨住前未證故經云未有慧眼故須三觀圓修後方證得外既偏説則內無圓解此即不應偏解也正理即三諦圓融偏説有為即乖三諦此則不應偏運也以三慈即三諦故廣有所破者一一文皆對破三教屬偏非正護非慧眼非正理得意廣説故注云云皆有偏圓者住前登住解證雖別三諦融即故圓雙照二邊故偏前未見機理者化他則未見四機自行則未是真證唯宜但許圓説不許偏説故云止偏即法華明安樂行者有所難問不以小乘法答但以大乘而為解説也問何故爾耶答若本有小機強為説大則乖機成惱大機已發而為説小令失大益一等未能見機故令但説於圓小雖未受亦為遠種抑又自行未能證理故但圓説內資理觀故云未見機理等也既自責愚癡則是無明全在也後見下即分真究竟破惑見理稱機設化説偏説圓咸令獲益經文舉偏況圓故但舉偏正見即分證三智也又正下重解此文亦成圓説是則三諦圓證名為正見此之正見即中道無為故無為之名語似於偏其義則圓從語從名且云偏説開偏如文者開謂開許且依初解以無為為偏説也示是見第一義者善分事理故對二悉經當言如來同於無為者此即純陀鑒機偏作無為而説對破文殊有為之見而言偏意圓無為即法性中道也有為即無常無為即常住由説常住為因故得分證究竟菩提常果故以梵天喻之經不求解脫者以二邊即中故無二邊繫縛可離亦無中道解脫可求如是觀者自至解脫是勸觀者前勸説是約教今勸觀是約行也六卷即竺法護所翻名般泥洹經與今經廣略異耳今文雖無丈夫之言既不云女人則知經云如人遠行是約丈夫也理寂而照者空中即假三千宛然故云而照又理非三一三一宛然故云而照始末兩間者始謂理即末謂究竟間謂四即故以中路通譬四即疲極下名字行人聞圓起解知由煩惱勞纍之因招生死拘逼之果於是近善知識謙下自卑咨疑請益發明自性也禮云請業則起請益則起孔頴達云業謂篇卷益謂己受業不明更請審之是尊師重道之義也五欲妄染非三諦之己性故以五欲為他理為惑蔽故云所壓沈昏者觀行雖成三惑全在故云不醒即不二門云三千未顯驗體仍迷也寤警也解惑相排者謂相似解無明惑互相排蕩也入海見平者大論云如欲見海不見樹木山林前相知海不遠何以故大海處平無樹木前相故今以海喻真因平相喻似解即猶未死者無明尚在故白法即似解照境不周者如別人十住但能照真不照假中十行照俗亦然圓觀三諦無所不周如衣遍覆釋命終中先破他解他人謂行人爭法被他問難義屈為死以合命終然被下今師破也然義墮之家豈可俱生梵天耶以他師但以難屈合命終義而不顧生天之言故疏主以此為破今言下今師正約從賢入聖釋義則命終生天之義俱成三十二下明以天譬真位義即與下經所明三十三天甘露臣主共服義同三十二臣即住行向開為三十十地合一等覺為一故三十二一主即妙覺究竟而言下既云王故知但譬妙覺三觀分真妙覺所離即界外三惡乃小乘見修無學三趣也經安樂處者顯發三德妙理也經重勸中即斥文殊同彼外道及以破戒也經説同有為者是小乘義以大斥小同於邪外以妄語故即是破戒妄語是惡因地獄是惡果但合至命終者即經云應捨無知求於正智也謂捨相似位無知求分真正智此無知即無明也他以等者他師以此文三十二相合上生忉利天也謂三十二天同尊帝釋如三十二相共嚴佛身合主不合臣者以三十二相正在於佛故知約妙覺合天主不約分真合三十二臣也若爾下經文既以三十二相合生忉利例應以八十種好合前八十反作梵王等也無敵者以果人十八不與下地共故猶如金輪四洲無敵此以不共義合不約十八數也此段雖無八十種好及十八不共之名下文殊稱美中有故此探取以成合譬義也兩勸者勸説勸觀也兩呵亦然正見即佛眼正知即種智此皆住前相似眼智也以具眼智故能內護外説則見知為因護説為緣以外為他説內資觀慧能為分證常住因緣也前合譬者即指貧女譬也善覆等者相似位中圓觀三德名為善覆如衣覆身也後譬者即指遠行譬也常受安樂者經文應從以是善心去今文從要牒文耳一言呵勸者即前文殊一呵一勸也爾許猶若干也即前雙呵説觀雙勸説觀各有法譬等也抵攘者誣訶也攘以手禦也揎袂出臂曰攘老子云攘臂而仍之復以下謂純陀向執小教初成受乳無常五果以難今經受供常住五果者但是為機設疑以為發起耳妨於等者謂純陀恐彼執小初成之人違妨涅槃常住之説乃假設疑難故使如來廣答二施無差以破小初也是則旁為新衆正為未來言新衆者即是凡夫不經諸味方於此會初證小果名為新衆若歷諸味至今經者名為舊衆何以下明非舊所以一代者即始從鹿苑至于今經謂鹿苑證小方等彈斥般若洮汰法華開會咸歸一實彈指小善尚成佛因二乘所行寧非妙道故云已會毫善如斯舊衆來至今經但增道損生進入上位豈執無常頓同鹿苑故知純陀設疑但為新衆正為下純陀正為滅後鈍根執小謗大之者故引法華為證即經云若有實得羅漢不信此法無有是處除佛滅度後現前無佛此言滅後方得羅漢執權謗實聽非上慢今純陀正為此人若不下反顯位高若不爾者者謂若言純陀不是權行也豈有下徵文廣顯凡以三義驗之知是權行一為佛受供力及時會二能難如來無差之義三能以文殊深位傍論三義在文故知下結示也受勸者即經云俱亦當覆如來有為此即正受純陀之勸同於純陀覆用顯體故云俱示等又汝下即釋經文有為無為且共置之也有為即無為之用故云不能盡其用無為即有為之體故云不能罄其極體用相即其猶波水故非言論所及絶而置之忘言得意真識體也亦如淨名杜口方為真入此即下文第一義意也指廣置略者既指哀嘆佛自廣説故我與汝略談體用且可置之置略待廣廣略不同世界明矣非體非用者正體泯然絶乎待對體用相待豈契真源故須置之方為入理更互是非送為藥病莫知孰是宜共置之正為獻供以生物善置傍取正故云置之四悉消文置義允合一家窮理其在茲乎經清淨給與者大論云為道故施清淨心生無諸結使不求今世後世果報恭敬憐愍故是名淨施淨是趣涅槃道之資糧古佛道法者毗羅三昧經瓶沙王問佛何故日中佛食答云早起諸天食日中三世佛食日西畜生食日暮鬼神食佛制斷六趣因令同三世佛故又如請觀音疏明中食表證中道也文殊同他見者示同凡小所見也謂純陀行淺者時衆但覩其迹莫識其本佛破時情令生深敬故且印其無為之説若論法體實非有無亦悅一切者一念三千彼彼互遍故悅一人即遍一切則與彌勒如得受記衆生如亦得受記義同也兩番關並者若定下出第一番義若不下出第二番義成佛愛憎者悅可無為則愛純陀不印有為則憎文殊此則文殊執事難理亦是執別難圓以別教理事相隔故有悅不悅圓教理事俱融故自他互遍經則是倒想若執有悅可則是煩惱故云倒想煩惱為因牽生死果故云則是生死須知悅可由心心本自無悅可安寄如來顛倒永盡故無愛憎故經云無有愛念之想普淨悅可者如來等觀三無差別凡聖一如自他泯淨故云普淨其猶父子天性本同故經云等視如羅睺也非我爾所知者爾汝也究竟所證非分真所知喻有無明者龜龍如分真水如無明也經黿鼉上魚袁反三蒼云似鱉而大下徒多反三蒼云似蛟而大山海經云江水足鼉郭璞云似蚸蜴大者長一丈有鱗采皮可以為鼓敘古解中開善以驢不及駟喻下地不知上果金翅觀海喻上果能知下地此但據喻準經合文俱是下不知上冶城所釋稍同今解但後譬約境與今約惑為異耳靈味前據合法後據譬喻分為二身初云如來微密深奧故云是法身後云金翅見影故云應身若據合法既云如來智慧應約報義為便三家解義偏局取文義既可見不能委破故注云云問今家既以智斷釋文何故初喻合云微密深奧後段合云如來智慧耶答微密是智之所照以所顯能還是智義智慧是惑之能斷以能顯所還是斷義法譬符合智斷義明高推佛境者即前純陀云我與仁者不能籌量如來智慧也發者下即我於此事下經文也斯則文殊自發迹顯本故云我非不達但欲試汝拂我等者謂純陀拂除我執有為之義佛身有為只是涅槃無常之用尚非常用豈識雙非之體故知有為非通方説故云一途也試我文誤應云因我試汝即文殊云因我執有為試汝純陀也執乃假設故試非實故我前云有為無為且共置之前置有為是拂自迹故云故言有為非有為汝推未詳者推吐回反詳審詳也即向純陀云我與仁者不能籌量如來智慧也純陀雖説無為既自推未詳故知無為非無為此皆疏主追取前文以成文殊拂迹之義是則有無雙捨本體方彰前文下約言思雙遣以顯本體言語道斷者以不作有無而説故云共置也即前經云有為無為且共置之也是佛境界者即純陀向云即是諸佛智慧境界非我所知者如向經云不能籌量如來智慧説觀皆寂者前純陀呵偏説觀勸圓説觀今文殊發迹則言思道斷言盡故説寂思窮故觀寂圓法尚泯豈況偏耶前來諸瑞者即第一卷中九瑞也文殊下敘意文殊同居因地故可彈呵佛果尊極聲光自催師嚴道尊豈敢違拒故云不敢前却謂前拒却退其命也會教故扶上合機故化下二人既皆由佛力故知砧槌互扣成熟機緣是則發言放光語默且殊印讚義等未諾故默者雖是光催猶是文殊發言故還未諾諾奴各反應也止亂者應思法利悲啼無益亂心迷道非行人所宜故先止亂次説觀門六譬空者芭蕉無堅熱𦦨不實水沫假聚幻物非真變化虗設鬼城誑立以茲六譬顯法本空三譬無常者壞器易壞電光速滅畫水隨合體非常住三譬不淨者死因可惡熟果濕爛段肉來蠅故喻不淨兩譬無我者織不由經碓上須下皆不自在以喻無我總結者以諸行之內有為之果悉皆空寂無常不淨多諸過患而妄計常淨如雜毒食損害身命也何故下示文意此即佛以無住破其請住也本為開道者請佛住世意為衆生開示妙道況今機緣宜當示滅佛尚無常而況凡品故能因滅而修五門因門入道與佛在何異故云與住不殊等故引遺教持戒例成修觀門今經顯性談常何故此中佛令純陀修無常等五門耶答大般涅槃具足二用而對治適時向來文殊執有為無常故純陀以無為常住治之今純陀執常請住故佛以無常等治之又無常約事常住約理事即理故無常即常理即事故常即無常此仍理事待對而説若約絶待非常非無常而此絶待即是心性在因在果理事俱融性具三千二用具足九界無常佛界即常十界一心始終無改二鳥雙遊於茲可識故此一經或談於常或説無常或理或事去就有別妙性常融若了此旨豈迷異説講者聽者彌須照懷問純陀謂佛入滅所以請住是見無常何故云純陀執常耶答只據請佛常在世間則屬常見故佛以無常五門而破其執若謂入滅是無常者則如金光明中信相所疑及前文文殊呵勸故使四佛純陀以常義而破也入滅為哀愍者欲令衆生因滅以悟道如法華醫師譬故注云云二偈即雪山偈及四出偈也指後疏文會釋故云當説長行中經一切行雜者即向經云當觀諸行猶雜毒食也遠師云汝觀一切行雜勸其觀苦諸法無我勸觀無我無常不住勸觀無常此身多有無量過患勸觀不淨猶如水泡勸觀空釋須解中不滅而滅等者即解方便示現涅槃也謂雖知真身不滅應身有滅隨順世間不能無悲請之儀也滅而不滅即解覆自思惟等也覆音福謂雖知即應而真滅即不滅亦隨順世間不能無慶悅之意皆言雖知者雖是與奪之詞雖知二身一體而不免悲悅之殊良由悲請慶悅俱佛境界耳知如來真實者知真故喜故舉二鳥等者以娑羅義翻為雙如娑羅樹非但唯翻堅固亦云雙樹也二鳥雙遊並息用譬真應相融故云權實不得相離也春陽是養子之時故譬衆生得道機熟適悅契會四益無乖咸歸祕藏如集彼池阿之言無耨達云煩熱此龍無火沙惡風金翅等三種煩熱常居此池因以得名故譬三德涅槃自在周遍無生死業惑煩熱之畏也二法即權實權實逗緣同歸祕藏如二鳥合集生子不離此池經諸佛法爾者法爾猶自然也謂隨順機緣示生示滅自然而然皆如幻相無可悲也亦是共行等者涅槃即應佛入滅是權非涅槃即法身常住是實權實相冥名為共行譬如二鳥故下迦葉問云云何共聖行娑羅迦鄰提即此義也廣如鳥喻品下地絶思者下地即指經中我等今者及聲聞緣覺等也以究竟共行非分真及二乘下地思量故經云實不能量如來涅槃及非涅槃也携反者同門曰朋同志曰友文殊催供傍論乃知與我同志相携共辦也釋哀嘆品荼毒者尚書云弗忍荼毒孔氏傳曰荼毒苦也廣而下約失四悉益以釋哀嘆一一皆引下經為證內喪道法由外失蔭無內外益是失世界義也訛謬也即已生善不增長也翳隱也即未生善不生也現惡謂見思將惡謂塵沙無明應獲祕者祕謂三德之理也應入住證理而不得證不失即獲失即不獲互其文耳故知四悉約位竪分第一義唯在初住對治為人即相似位粗垢自落即破惡六根清淨即生善五品觀行成就故歡喜即世界也又粗垢落是對治觀行善生是為人聞名識體是故歡喜今佛若滅四益全失但有理性而已然四下結意也十異中從人故題純陀從事故題哀嘆對俗謂工巧之子對道謂三修比丘無供者比丘非獻供衆也雙請者請受供及住世單請者但請住世也因人者上經云汝哀愍我等唯願速請佛久住於世間利益無量衆即是因大衆所以純陀請此品諸比丘率己請住非因他人率從也略明佛性者以因獻食開常未明三點四德之義名之為略論今教者且約佛及純陀皆論今教圓常之法具今昔者此品具明勝劣三修二人論等者前品文殊純陀俱是因位今品比丘因位對佛果人動執生疑者因聞二施無差即執昔疑今興於五難破執除疑者破劣修之執除勝修之疑聞法抑割即純陀聞説五門觀等抑止割捨悲戀之情故前經云低頭飲淚而白佛言也備有通別者約通則十義俱通二品何者前品純陀號哭即是哀嘆之事此品比丘能哀亦是於人前品文殊是道此品天龍是俗前品道衆無供此品俗衆有供前品正為受供請亦成單此品既有俗衆俗衆則有供故請亦成雙前品獻供乃是率自今品哀嘆既云聞是語已身毛皆豎亦是因他前品法談五果喻該六即乃成廣明此品但明三點却成略説前品呵勸文殊旁斥昔教今品三點正在於今前品如來印讚亦成對佛今品對佛亦成二人以佛亦人故前品純陀上根已自破除疑執此品下根聞説三點方更動執生疑前品純陀亦因晨朝聞地動哀嘆此品比丘亦因聞法抑割如下經云時諸天人等聞佛所説止不啼哭即其事也此即十義彼此俱通今去通就別且如前品正從人旁有事此品正從事旁約人餘九例説是知捨旁取正十義自別故云今舉一邊別彰其異也此品有七者謂請訓各三為六并結會是七祈請者爾雅祈叫也郭璞云祈祭也叫呼而請事以命要請者謂以己命要難於佛佛若入滅我亦捨命意令如來慜我不滅如來下明譏諷若不下明要請情無所措者措置也論語云民無所措手足矣故教有興廢者前有邪常病故無常教興真常教廢證小果後有無常病故真常教興無常教廢施教早晚者早謂昔説無常晚謂今方説常紆回下顯佛無差機之失只由汝機不一故紆回如來無量神德屈曲隨逐先小後大咸使入圓豈是佛之差機耶早晚下結責如此下興皇結示也斯乃下今師斥破通談七意一往似美隨文釋義相生未允問誰下問意者誰以神速動地為比丘哀請之緣也答中二意初明因緣故動無有作者文中先離四執法謂哀請因謂比丘緣即地動不在因故非自不在緣故非他不在因緣即非共不離因緣非無因四執既遣法體斯彰若論其事即是因緣和合而生故躡前破無因句便成共生故云不離因緣等也所謂比丘機發為因地動為緣悲戀哀請即所生法故此悲戀既從因緣因緣虗假無有宰主故無作者者謂主宰也雖無下謂雖云因緣性虗非他造作若以機對應明乎道交則是佛及純陀內證三德妙用斯彰故能隨機利益所以動地為緣生彼悲戀還入三德亦是安置諸子祕密藏中所以將悲對喜及以雙非共顯三德又地動由通通因定發以定對智故約説法智定所契理體存焉展轉互明而成三德文中先明能應次約能感應中復二謂主及伴主即牟尼化主伴謂純陀文殊究竟分證益物可見知滅故悲滅即解脫聞常故喜常即般若雙非二邊法身顯矣純陀文殊為發起衆轉佛揚化共熟機緣故云亦是傍論復宗蒙佛印讚知智在説故云智力機緣稟教還獲此智故云開解入般若中地動表滅所以悲戀不滯於常故入解脫第一義者即是定慧所契法身之體也大衆下明能感機即是理具三德開顯機熟故感地動感對治者即是聞談常住以斥無常既破小執所以歡喜悲哀則三業善生故感地動是為人力雙非即理其旨易明此但對三悉者三法不同即是世界文雖但三約義必四其義無量者五十二衆能引所引若應若機人人具四無非三德故義無量是則感應因緣作斯地動不作而作主宰斯成引淨名文以證四悉四事則前品末佛舉境界方便等四以止純陀悲也純陀姓華氏腷臆上符逼反意不泄也焉止梵宮者焉於乾反安也豈也無色四心者即受想行識六種及十八動等如釋序中記文一四天下等者謂閻浮動名小動四天下動名大動小千動名大大動又一四天下為小動小千為大中千為大大等經兜率者新云覩史陀此云知足八相者一升天二下閻浮三生時四出家五降魔六成佛七轉法輪八般涅槃應是地震等者例前光中有聲也初長行中經人非人者人即比丘等四衆俱人趣也非人即天龍等非是人趣或謂非人是疑神即緊那羅也此下偈雖同聲共説乃是比丘為其端首故下佛答即云告諸比丘也調御師者調他心名調御師略舉三事者調御師喻喪師人仙喻喪主犢母喻喪親困病謂病之甚也經衆生下合譬也初二句合困病上句明愛惑下句明見惑界內外皆有愛見如病之困次二句合無醫等遠離佛醫更隨邪教如食不便更增其病故云服食邪毒藥醫王即醫師故譬喪師也喪主譬者國無君主既兵且荒老子云大軍之後必有凶年故經云飢饉也爾雅五穀不熟曰飢菜蔬不熟曰饉三譬皆注云云者主親師義廣在前釋此第三譬有一偈半即是譬如長者子新喪於父母我等於今日云何不愁惱如來見放捨猶如棄洟唾即初半偈是譬次一偈是合故前分科云次七行一句廣請三二行結請今世行經本我等於今日偈在結請二偈後書則廣請但有六行一句結請却有三行恐是傳寫訛舛若據遠師釋北本又與世行本符合若然者應是疏主據本不同又恐謝氏已曾修定故移置前後後人不曉往往以北本對校擅自改易致使經文與疏乖各上文至還明衆生者上略請中既云如犢失其母貧窮無救護今廣請竟還有救護之言但前譬此法有殊耳故知此文是結成上義高圓明譬主者周易云日月麗于天是高也白虎通云日之為言實也常滿有節此言其圓也又易云懸象著明莫大乎日月此言其明也譬主者感精符云三綱之義日為君月為臣也高則巍巍在上喻法身圓則無黨無偏喻般若明則光宅天下喻解脫萬物得日光而生猶子從二親而生照了除暗如師發蒙決疑而譬下商較經文論照了者即經云既能還自照等合文明除暗者即經云能除我苦惱以除苦惱合滅暗也是知如正言師益故云師義是本而高圓明及生長萬物經既不説故屬傍兼山三義者以須彌出水八萬由旬入水亦爾四寶所成映臨四海咸作寶色譬親益者水浸於山如子依親師德下釋出譬師益義即師有道德高遠如山四衆弟子如海師宣妙慧之教照破弟子昏迷發生智慧如水色同山是則山喻正亦在師意兼主親耳舊解下明諸家釋經文既能還自照句也光宅下意謂因時修行有反照智果滿智息故云無有佛道同故者以佛佛道同故可借用今更下今師斥光宅初舉道同難汝既云佛果智息又許道同此則佛佛皆無反照何得借諸佛智耶又並下舉二覺並況二覺備滿方得稱佛既無自覺便同凡夫四失者謂無反照智是四失中一也梁世義學光宅為最而立茲四義全乖正理故時人以樏隔等四喻彼非相亦呼為四可笑也雲之高勝尚有所失況餘人乎樏隔下列四失義所談二諦真在俗外如樏檠之相隔牛糞下意謂娑婆土本不淨如淨名經中釋迦足指案地此則神力變化方乃清淨猶如穢地以牛糞磨拭方淨也西域風俗皆以雪山牛糞用潔其地以彼牛純食香草故也指端下謂證妙覺已既無反照之智如人之眼但見指端不能反見己面也無記下明如來知見出於善惡之外名曰白淨無記次斥開善莊嚴此二師雖立反照智反觀種覺未審復用何智照了反照智耶若言無者反照但觀種智而不自照雖強立一重亦未殊光宅若言重重有反照者則有無窮之咎佛無反照等者謂無別反照智只此佛果種智便能自照故云只自有智等即害兩家者言無反照則害開善莊嚴言只自有智能照則害光宅今明下示今釋一家明義三智圓融反照照他自在無礙文中初明三一互融次一道下寄次第顯示一即三是假三即一是空非三一是中雙遮而三一是中雙照寄次第顯示也外破諸暗者空中即假三千宛然故以此假智遍照諸法即能覺他以物機無量不出三千能應雖多不出十界故能反自照者假中即空亡外照內即自覺也空假不二心性無殊名為一切種智非內非自是遮一切智非外非他是遮道種智若即下結破可難光宅者既即一而三則假智即具空中光宅何得云但有種智而無反照智耶況種智是假智反照是空智假尚即中豈不即空難開善者此三即一開善莊嚴何得於種智外云別有反照耶難觀師者況即一而三三用差別即三而一一體無殊三一互融不可思議觀師云佛無反照只自有智智能反照此乃釋義暗昧全無指歸既云無反照又云只自有智智能反照既自能照己是有反照智豈得云無耶此亦自語相違也若知三一互融其義方顯即三而一則無反照即一而三自有反照此一心三智是諸佛之本源大教之心膂文殊之所承龍樹之所闡山家祖述心要在茲故曉此旨諸師自破經云既能還自照又云亦滅一切暗其義易通巨有所妨者以諸聲聞來至法華悉已入圓豈於此會云付旃陀羅耶今則下今師但以二乘法合伎藝等則法喻允合故云可見是則此諸二乘皆是不經法華會者問法華五千退席合在涅槃得悟何得不經法華耶答退席是未證謂證其實凡夫若住小果只於彼會而得入住初教至餘惑者修戒定慧已破四住是有始不教圓頓令破無明是無終為無明障法身害慧命如付魁膾令殺也經善學諸論者西域記云婆羅門學四吠陀論舊云毗陀訛也一曰壽謂養生繕性二曰祠謂享祭祈禱三曰平謂禮儀占卜兵法軍陳四曰術謂異能技數禁呪醫方疏主以四論譬四魔數義俱當合中經云諸法即是已破四魔故云通達諸法也誓盡度生即本因之時發四弘誓最初即云衆生無邊誓願度也機謝告終者機緣既盡故佛入滅夏曰下釋囹圄是三代獄名也囹力丁反圄魚呂反廣雅云夏曰臺拘湯是也殷曰薑里薑音酉紂拘文王是也周曰囹圄皆獄之別名風俗通亦同此説周禮三王始有獄案急就章咎繇上音高下音遙舜時臣造獄後代因之白虎通者後漢章帝諱炟於白虎殿會群儒論五經同異所作也班固字孟堅奉詔纂其事奏御凡十卷又劉熙釋名云囹者領也圄者禦也謂領囚徒禁禦之也愆去乾反過也即密教者謂三德妙理佛若不説凡小莫知故法華論云法華亦名祕密即此義也非是八教中祕密經夷塗平路也從佛口生等者此謂比丘稟三藏教名從口生證學無學名得佛法分此但借用法華經語義與彼殊不以文害意也故三藏教三乘雖異所證無殊故使四果證真名得法分即是形貌端正及伎藝通利義也有本伎藝字下多者字非也學人下解付旃陀羅義學人即初二三果無學即四果此約小乘當分以思惟習氣為旃陀羅若大下約大乘乃根本無明未破悉名付旃陀羅乃至別圓地住已前皆為無明毒害法身慧命也前譬謂怖畏譬也威武者諡法曰強毅執政曰威克定禍亂曰武傳曰止戈為武後譬即違本誓譬也通達下釋出初譬怖畏此論如為歒欺者以論喻歒既於論怖是被論欺初學下釋出後譬民無聊生者聊略也謂不暇略為生活也思習無明義如向説煩惑繫閇如彼牢獄百姓等者尚書湯誥云其爾萬方有罪在豫一人孔傳云自責化不至今以此詰詞例同法王誓願也既云衆生誓度今衆生未免生死苦惱云何如來自入涅槃是則衆生受苦過在於佛如百姓有罪在我天子一人也內惜良方者文心雕龍云方者隅也醫藥攻病各有所主專精一隅故藥石稱方攀類文殊者即前譬明佛偏教文殊而遺棄我等高攀妙德以類於己譏師有偏也而恥行險路者即後譬恥行諸有嶮路欲登圓頓正道亦是以嶮道譏師也是知學人思惟未盡猶在分段二十五有嶮道中行無學雖出分段尚在變易三有中也初止外悲等者對下又以譬顯故此名初也凡夫下釋止外悲也八風等者得則四順故喜失則四違故憂道謂比丘俗即天人道則升進涅槃俗則沈墜生死碩大也既其大異故止云莫如凡夫諸天人等愁憂啼哭也何者下徵釋止悲所以且如世間已失樂事尚不可以愁憂追還未得樂事亦不可以愁惱而獲豈如來去住由汝愁憂耶故引下經以證無益若能下釋勸修觀即是當勤精進繫心正念經文也勤遮二惡者見思本起名已生惡塵沙無明名未生惡當勤修三觀遮此二惡勤生二善者二乘已生真善勤加增長未生假中之善令速發生惡是下明由有三惑之惡故有界內外憂喜之情故云惡是憂喜之本也若破三惑之惡顯三德之善則無界內界外憂喜之事故云善故無憂喜若遮惡生善唯當反觀心源清淨常一觀道無間名勤精進苦惱由心心即空中苦惱安在故云止其苦惱由有苦惱則攀佛滅今觀心性生佛無差性體不遷誰云去住故無攀緣何所為作如此觀察謂之正念即無念下更釋出正念義只是一切諸法不離一念此念亦無名為正念若無下歷前三請以示感應性虗一念尚無機應寧有從親主師至者何凡三雙六句初二兩雙並先應後機後雙初機後應機應俱亡故云無朕朕直引反謂兆朕也由是下釋經時諸天人至不啼哭也天人聞佛勸比丘衆令修內觀豁然意解通入妙道名得正路次又以下即如有人喪其愛子去文也得善等者佛在得大乘善如愛子佛滅失大乘善名喪子今聞近慧者即聞繫心正念也是知大乘正慧即心而具近豈過此即捨分別攀緣之情故如殯迭已訖互有二義者初偈云當開意則是勸觀次偈云自慰則是止悲故云互有二用皆方便者示生示滅皆是權施化儀合爾而生滅即無生滅何得見生則喜聞滅則悲鎮照等益山鎮於海日照於暗各喻主親師之三益故云等益無目不流者喻無受道之機也若言有益者汝若言佛住世有益也開其問端者即若空不空等十五雙悉是問端必無二是宜應問之若能下釋亦當為汝去經文也貶其不及者聲聞既不能問則何殊無目不流則是貶其智力不及也止其祈請者若能問則説法後滅不能問則住亦無益雖能與不能俱定入滅不須祈告請住也兼顯菩薩者如有目流之人也故下迦葉能問於佛酬其嘆請祈請者前祈請舉日山為嘆也藥病是約二諦藥真病俗乃至二不二者二是病不二是藥也空是生死者以生死虗妄體本空故兼開衆問者即開下三十四問也諸釋無咎者全取三師釋義則無咎若各執則有過廣分別之下注云云者應約四教各有三門四門以消經文則四教各具一十五雙也又以四教豎歷五時則華嚴有二教十五雙乃至法華唯圓十五雙今經重施三教十五即圓十五以此為今對鹿苑唯小為昔三門四門者三門即沒兩亦以兩亦只是合前二門故也問經文十五雙但是二義何故作三門四門釋耶答兼用即成兩亦俱捨便是雙非故知既具空有即具三四況開偏小咸皆入圓良由諸法唯心心即三諦真諦即空門俗諦即有門中諦雙遮雙照即是兩亦雙非若約當分明義則前二教雖明三四但歸於空別教四門正歸於有以圓三諦攝無不周若合三為二只是真俗空中二諦合為一真故附經文且作二説暹師用澤州疏釋此十五雙者全背今家三門四門義也須知今師明義諸雙始終只是二諦今從難解者略消其名常即空門下疏云不為緣生故常也無常即有門有為遷變故無常苦即有門經云有身即苦生無身苦不生不苦即空門依即有門有法可依故非依即空門經云稽首如空無所依去即有門有生滅故不去即空門無去無來故有門則有三寶可歸空門達寶如幻無寶可歸經云設有一法過涅槃者我亦説如幻如化恆即空門下疏云不為緣滅故恆非恆即有門有法為緣所滅故衆生是有門非衆生是空門達衆生假名即空故實是有門有五陰實法故不實是空門五陰即空故密是空門不密是有門二是有門不二是空門是故諸義雖殊不出空有二義三門四門已如前説收攝文旨豈離自心新伊字下有先歎者又二五字者後人妄加也先嘆次示者先歎即初二兩階次示即第三階先即四五兩階後與即六七八三階俱云階者即取階級第義酬五譏者前譏請有五番也復言下釋經汝等遇我不應空過也他取寶城等者即疏主因便敘他據此文明涅槃之名不可翻義興皇者既以他義間斷故須重云興皇也非其因下約五六二階酬不等譏初是第五奪其因非次示勸下第六顯真法性捨昔下約七八二階酬無慈譏初是第七捨昔依今次説新下是第八正示新伊已上八階酬前五譏講者當以經文對疏釋出義自可見今解中初斥破興皇八階凡有二失故總斥云不然由具五難即離八難故云同是一意故今但以釋譬結分文何以興皇分五難八難為兩階耶此一失也又只斥中酬譏自足何煩八階共答五譏此二失也故總結云是故不用復須示真者示真即獎勸也能得能離者能得五難能離八難釋中初對上辨異即對上天衆歎純陀中有六難也離八下預示所離八難之名雖在結中即是此文五難所離故預示之三途者四解脫經謂地獄為火途道此據八熱鬼為刀途道畜為血途道應法師云三塗者意將此方三塗山是九州之險以名地獄後人妄謂三塗為畜生餓鬼地獄也應師所釋殊不知三途之義出在經文也丹越此云勝謂勝餘三州故亦云高上其意亦然及邊地難者以佛唯生中國故得出家者即經云成就禁戒具足無缺是一難也以律制根不具者不聽出家既云成就禁戒即離此難羅漢已得無漏正智即離世智邪推所言五難者佛世難值人身難得合為一成就禁戒得羅漢果開為二難故成五也以禁戒是因羅漢是果故譬中如求金於沙甚難可得生死法中求是五事至極難得曇華亦爾結中八難舉所離以結能離之五也八者三途為三根不具為四世智辨聰為五佛前佛後為六單越為七長壽天為八前三在下三趣次四在人後一在天又成論云四輪摧八難一宿世善根輪摧前四難二勤發正願輪摧世智三供養諸佛輪摧佛前後四生中國輪摧單越長壽天不得不離者不得五難不離八難取意釋者即探取第三段酬怖畏經釋無始終義也何者下徵釋不應以親認佛義也既其不識法身常住非是法王之子何得認佛為親不識下既汝前自喻端正今喻既遇寶城而取偽物四德涅槃即心而具而不識知翻取小法故非端正無明自覆等者既迷法性自起無明則是汝自投魁膾傷害法身豈是佛遣故云何須遣付非止一途者財法二施種種差別悉是難行故非一途甘之如薺者詩云誰謂荼苦甘之如薺荼味苦薺味甘也捐捨身命勤施財法凡夫以之為苦如來達苦法界故云如薺此則總喻二施也無上下別示二施法施故有慧財施故有恩初明法施云其門不小者斯則體內方便大乘之門也非我無慧者汝自不受大乘非我不惠施於汝也夫身下示財施財有內外內則身命外則妻子國城在文可見但為下汝自放逸致使繫閇生死獄中非我無財施之恩及汝也功德具足者圓戒定慧無所不收故云具足名此三學以之為城釋名云城盛也盛受國都也墻壁者釋名墻障也所以自障蔽也壁辟也言辟禦風寒也今明國城墻壁則禦敵防盜故喻戒學止惡防非圓常之戒防止二邊故云嚴峻絶嶮也衆魔四魔也以群盜喻衆魔也塹者坑也繞城水也水性澄靜故以喻定首楞嚴定橫該法界故無涯豎徹如理故無底睥睨或作俾倪上匹計反下五計反又字林作普米吾禮反釋名云城上垣謂之睥睨言於孔中睥睨非常事也或曰裨助城之高也或言女墻言其卑小比於城若女子之於丈夫也或言堞取其重疊義也今以慧鑒圓普不著二邊如睥睨於非常也鑒微識遠是實智博達今古即洞照三世是權智有怖有畏者比丘但證小果而為界外變易死魔等怖畏也表裏皆實者向既以三學釋城應以戒防身口為表定慧為裏又修德為表性德為裏皆常樂我淨故云皆寶琳琅者尚書禹貢云厥貢惟球琳琅玕孔氏傳曰球琳皆玉名琅玕石似珠現文既以琳琅環琦四事釋表裏皆寶即應以此四喻四德也商人者白虎通云商其遠近度其有亡通四方之物故謂之商也取者即商人以喻小機自不受大非如來咎是不猒糞掃者內染小法外著袈裟即同貧子不猒粗弊垢膩之衣故云糞掃也不欣瓔珞者即不欣舍那珍御之服也貧里小乘上味大法剃除鬚髮表小智除惑盤桓不進兒隘路者大品斥小乘猶隘路不容二人並行此以無欣無猒等者汝自不欣非我無慈汝自無猒非我無悲此佛亦我等者明四德具足應云亦樂言亦我者文誤此釋經中我字是四德之一以該餘三耳但識應化者但見丈六劣應身也非説法人者以小機所見劣身不能説大法也若圓機見真應不二釋迦牟尼名毗盧遮那即能説大法淨名下即斥須菩提文也衆數即僧此斥小乘既不見法報之佛又不聞圓頓之法故不入三賢十聖之衆數也既不預大乘三寶故斥彼小同於外道六師比斥雖然非全同邪外不識下總結汝等遇我一句是斥其不得五難也不得真果者但得小乘虗偽之果不得圓乘分證真實之果也難亦不離者雖無界內八難而有界外八難也亦名理八難謂見修無學為三惡道無為正位不能發心名墮惡道乃至無學亦爾若入無餘永滅佛道豈非三惡道難四北洲定壽難者四諦中滅諦對北方聲聞證滅如彼定壽五長壽天者二乘名為淨天若入無餘即歸第一義天豈可化也六佛前佛後者二乘入觀見真出觀緣俗不見中理即佛前佛後七世智辨聰者二乘未見中道發無漏慧是為世智辨聰八聾盲瘖啞者二乘之人無菩薩根雖得六通不見十界之色如盲不聞十界之聲如聾不能以一音説法隨類得解如啞此理八難名義出淨名疏記等即是下總結不應空過一句是奪其不離八難也文云奪其不得者得字誤也道前謂等覺已還即分真相似觀行名字悉名道前也道後即妙覺究竟將後例前者經明道後既云無上則類例道前苦行等亦是無上以因果雖殊俱超偏小故復有一行等者五行圓修不同次第故云一行此即聖行品文然五行即三諦始從名字終乎等覺聖凡雖異所觀何殊二鳥雙遊即鳥喻品文謂果證之後雙照常無常也故是圓用若約果用初住分得今論極果的指妙覺不見真法等者前佛約能證人故向云無上方便等今法即約所證理故經云正法寶城以城是所居如理是所證故云即真善妙色出生妙善者以圓戒定慧由理本具故隨外熏發生三學此圓三學遍攝偏小故云一切三學等若非一念百界安能遍括大小戒定慧耶徹三諦故縱高遍法界故橫廣縱橫相即故云充溢彌滿下心即小志上法即大乘經雖得出家等者雖是與奪之詞與之則於彼小乘得名出家奪之則不慕大乘未破無明猶名在家此則已出分段家未出變易家也別約因果者以比丘之名因果各具三義因名破惡怖魔乞士果名殺賊不生應供此因果三義次第主對如因名破惡果名殺賊等今佛以大乘六義非之故疏釋云汝之因果皆非真僧也袈裟者應法師云此云不正色諸草木中若皮若葉若華等不成五味難以為食者則名袈裟此物染衣其色濁赤故梵本五濁之濁亦名袈裟非破五住等者以小乘但破四住惡唯怖界內魔是則袈裟雖染而未染大乘淨法非應供乞士者以經乞食之言則兼斥因果二義二乘雖歷人天多處而為福田而非遍十法界普於其中應受供養雖離四邪名為乞士而未免邪求涅槃非殺賊不生者以經剃髮之言則兼斥果上二義以小乘未殺無明賊未盡變易生故經云未為正法等謂形雖除鬚髮而未破無明由未破惑則為變易生死所遷故經結使之言兼於殺賊不生二義具於下法寶即法身德即一而三故具三點三德遍攝故云藏一切法佛僧例然者經文雖略義必各具故曰例然是知佛即般若法即法身僧即解脫既各具三則開之成九九只是三三只是一一三融即開合適時初譬説祕藏中譬為三下大地譬法身山藥譬般若為衆生用譬解脫初大下釋此三譬一皆具三三九相即初明法身具三普載者喻法身理遍也亦不生而生者理非智慧故曰不生而能發智故曰而生生於藥草此明法身具般若也亦無用而用者理非應用而依理起用如地非作用而人依地作用此明法身具解脫也藥草下明般若具三所生不離能生者所生藥草不離能生之地藥草堅性全是地堅如所生智不離於境即智是境此明般若具法身也亦即至用者即所生藥為人治病之用譬由智契境即智起用始智內照外宣圓法為機緣破惑之用此明般若具解脫也雖復下明解脫具三然此三法機應共論法身般若約能應説解脫一法就能感明以順經文喻意也雖復取用等者謂衆生雖用地藥治病然地藥實非他物蓋大地是我同業所招藥草仍由我福德所感此喻機緣稟教得脫蓋由己性本與果佛法身體同故喻業招大地此明解脫具法身也又由機發感佛以般若力説法被我故喻福感藥草此明解脫具般若也三種宛轉等者如向所明三各具三宛轉相即開之成九合還是三三一一三融即不二故云不得相離此順經文喻意且與機應對明應知機應各具三九展轉無礙一一相融若曉生佛理同三諦性等隨意轉作豈俟詳論種別下結祕密藏名文中分字釋義大地山藥衆生三事不同故云種別不一具一切物者只是攬上一三三一互融無礙名一切物包藏此物故得藏名三法身者即法報應報即般若應即解脫三身互融俱立法稱大地三義者即上非但普載已下文是般若解脫合上亦然三般若謂實相般若觀照般若文字般若實相文字即法身解脫異名三解脫謂真性實慧方便真性是法身實慧是般若講者細對上文合釋令義無壅為衆生用者即經云而為衆生等也我今下皆言超合者以前喻則先大地次藥後用今先合用故云超也據此應云追合大地亦言超者恐文誤合用者以一切衆生即指初住人最初離無明縛故合解脫用義諸子四部者以諸菩薩德堪紹繼故説為子四部即二住已上至等覺凡四十位十位為一部名四部則是以在家出家四衆以表其位此既分分發生中智故合藥草般若義也我亦下我即如來自指也合大地者以妙覺顯理究竟故合大地法身義也病若下約喻法雙結初結喻次安住下結法機應同歸祕藏故曰安住湛然衆生得益也此合病愈衆生既以得益故應用息用息則報法亦息故云般若功亡法身用息此據應用由境智相冥而有故用應息及于報法一切下顯位釋疑咸見佛性者以四十二位咸破無明證佛性理此以證名見問衆下釋疑問中舉衆生佛者此約初住對妙覺問其分證究竟所顯之理為是同否答六位分別者理同故即祕藏無別事異故六凡聖差分若約理同則理即本迷尚云理入名等三即入義亦然而況分證祕藏豈不同耶地人下地論明阿梨耶識是真常淨識不立第九故指淨識為惑所覆名為祕藏若攝大乘論梨耶是無記無明隨眠之識九識乃名淨識是知八九皆是隨機若就非異義説唯至第八若就非一義説故強立第九在衆生外者以論師所見謂迷悟碩異因果大殊故指果佛在衆生外涅槃下初簡四計次明正義身內即正報身外即依報非身內下是雙非非非內下是兩亦非非內者謂非不是內即亦內也非非外謂非不是外即亦外也於四起計謂有佛者並非祕密衆生即是等者謂絶四之理衆生即具具此理故名為祕密為此論破者地人計妄惑內成論計衆生外故彼二解但是此論所破內外兩句論師雖復轉云亦內亦外而亦未逃四計昔教下初總解名謂無下別示義無常覆常約理相覆無相約行不了覆了約教即是圓頓理行教三為偏小三覆實被權覆名為祕密如形下即下經文迦葉明昔教密義也今經下初約喻明今經顯露如月處空豈比形殘故云不如昔教但以下正明今經雖云祕密其實顯露異名衆生不解者理雖即是日用不知名難解理名為祕密不同昔教隱故名祕法界包含等者三諦法界具足三千三一相即名攝一切互融互入故用不盡指此為藏不同昔教以偏覆圓名為藏也舉涅下結示破人師如向所明破方便教者以今破昔亦如向文大風譬前舉論舉經卷霧喻破人師昔教清漢喻祕藏正義揚大風則昏霧收卷舉經論則非義破壞邪破正顯如清漢昞然清漢者纂要云天河謂之天漢亦云雲漢星漢河漢清漢等一往而言等者且約表對以配事理事謂教行二法也二往而論三點天目是喻三德是法以喻顯法耳以約依教立行行契於理次位義便故就一往分文約言教者文字是言教故約修行者三目在天面修行約人身故約理者下經云諸佛所師所謂法也即所證理名為佛師故名三德即是約理又是佛印等者劉熙釋名印信也所以封物為驗也許慎説文曰執政所持信也今以三德妙理喻之如印教無理印則教虗偽行無理印則行邪倒若契三德方可信用言説相應者教詮此理信教解理即名字人修習相應者修觀照境境智冥合名祕密行修此行者即觀行相似人證得相應者即分真究竟證得三法故約下結示由教行理義旨該通故約此義以分經也外國者且指己所居地名為中華故名天竺以為外國若論地分迦毗羅國方是中也如宋朝嚴觀二師與太史何承天共論此土是邊是中觀乃引周公測影之法以一尺二寸土圭用測日影京洛之地夏至之日猶有餘陰天竺此日則無餘陰準此算法地上寸影天上萬里據此以驗中邊可知舊伊可譬等者示舊伊縱橫義初示縱義云法身本有者謂百劫已滿得王宮相好之身此名法身本有般若修成者謂次於樹下三十四心名為種智般若入無餘等者謂八十入滅無餘在當故云方是解脫既有前後上下之義譬之縱三點水此即小乘所用生公釋此伊字義云般若居宗在上等全濫小乘又約下示橫義約身約智等者即相好身中樹下斷結證智雖未全得二種解脫而已破子縛故云分得有餘解脫此則樹下初成一時具三故云橫一時有而身智脫三體用各異故云三法各異等也此亦小乘所用此文縱橫與止觀體相所明小義有同有異縱義全同橫義則異故彼文云般若種智已圓果縛尚在解脫未具身猶雜食又帶無常一優二劣譬之橫川走火此之小義悉是縱橫又諸大乘師説凡有三家初云法身是正體有佛無佛本自有之非適今也了因般若無纍解脫此二當有隔生跨世彌亘淨穢亦是縱義生公所解設異小乘還同此釋次云三德無前後一體具足以體從義而有三異蓋乃體橫而義縱耳三云體義俱不殊而有隱顯之異俱不異未免橫隱顯異未免縱欲釋新伊應須先了他人異解方免舊伊縱橫等過乃至邪宗橫計等失故塗灰外道亦計大自在天具足三德而云法身充滿法界報身居自在天三目八臂即摩醯首羅是也化身隨形六道況大小乘諸師釋義為是義故先出昔教以驗諸師新伊下譬今教中釋此三點且順教義天目順行三德順理已如前説即照是般若亦即自在是解脫此乃法身之處即具餘二故云名一為三亦應更云般若即遍亦即自在解脫即遍亦即是照遍謂法身周遍也文明法身具二餘可例知故且從略三無至非縱者約三一互融以明離過即三是一故無別體一則非橫即一而三非前有法身乃至非後有解脫三德俱具故非縱一即至細畫者更約互融以釋字義而三下結成不思議不可等者只由互融故不可定作一説一思定作三説三思三即成烈火之橫一即成點水之縱縱橫名義乃可思可議偏小之法耳不可思議者下約雙非結歸祕藏祕藏即伊字所喻也又總覽前義還成三諦三德而三而一是真即般若德而一而三是俗解脫德非三非一是中法身德展轉復疏不出三法如斯三法即我自心心外無境一切咸爾此句下結示斥失此句者即指伊字喻文名為此句一經衆義猶如枝條三德妙理喻以根本義咸符理枝必依根故云是茲經之根本也廣立問答者迦葉三十六問豈有餘途只是廣顯三德因問有答發生諸品所以序中序於三德從純陀品至大衆問凡十六品明涅槃施純陀一品略明三德長壽以去一十四品解釋三德從現病去凡有五品明涅槃行修此三德師子吼品明涅槃義研核三德迦葉陳如二品明涅槃用即三德功能故云致二十五品洋洋無盡也洋洋水流貌論語云洋洋乎盈耳哉若失下斥失也若失始終三德意者雖能隨文釋義其猶逐葉忘根則解行二途指歸無處若了三德在一心中則此經一部居于方寸況法華開顯十方三世同説三軌三軌妙故故云妙法華嚴法界淨名解脫不共般若與此三德一體無殊若識此意今文可了十方佛法在一剎那如斯指歸功不徒棄寄語後學彌須介懷若念念不忘則佛果非遠三目釋者下若約經即是以喻顯喻共譬三德今從一往則是約行明祕藏也摩醯首羅即大自在也色界頂即色究竟天首羅為彼天主大千世界共一四禪中千共一三禪小千共一二禪故俱舍云四大洲日月蘇迷盧欲天梵世各一千名一小千界梵世即初禪也故二禪統小千矣首羅是四禪之主故統大千若並下並即是橫別只是縱三千即大千也三德亦爾下合法內心具德以合嚴主以內攝外三無差別以合照世注云云者意在此矣約三德中若約經文即是前二喻喻合法今約從事入理義便即是約理釋祕藏也果地下此約果上所顯之理若對初心行人以説則教在名字行通五品六根理顯通分真究竟若約教主以説則理唯極果故果地之言義意兼攝衆德即萬德也諸法雖多此三攝盡故曰兼諸然則一家宗承其唯三觀觀之所契即此三德故諸經論名相多者當以義裁斷以略攝廣令順三德名相少者亦應約義開對既知多少不出此三然後了三只我一念夫如是則免同數寶豈類算沙法身下示法體還約三身三智三脫以明則九三互攝展轉相融文中皆先示雙非次明雙照雙非即法身德實相般若真性解脫雙照即二身二智二脫遮照同時三一不二若先了此旨則至文易見法身德中初明雙非色即應身無色即報身此自受用報也理非質礙故不可形相見理非觀照故不可心想知雖非下即遮而照見知宛然法身之處應身常在則有相好形令衆生見故云雖非色而色也充滿下示應身相下經文明八自在中初一多義也故經云示一身以為多身身數大小如微塵充滿十方如來身實非塵以自在故現塵塵身巨細相容等者即八自在中第二大小也故經云示一塵身滿大千界也三者輕重以滿大千之身輕舉飛空實無輕重四者色心如來一心安住不動所可示化無量形類五者相六根互用六者得得一切法如來之身亦無得想七者説演一偈經無量劫義亦不盡八見如來遍滿一切處如虗空不可得見此八中第六似報第八似法餘皆應義文中略舉一多小大意該餘四此乃法身即解脫也雖非下不離法身而是報智故云亦可尋求謂亦可以智慧觀察也能發下示尋求相言衆生者從因以説由因中以三觀尋求故使妙理發生智慧則無明頓盡究竟成佛也故曰下引勝髮證既云如來色無盡智慧亦復然則知即境發智此乃法身即般若也即法身德四字是總結既即一而三故於法身德中具足餘二次般若中非知即遮觀照非字即遮文字此顯實相般若即是般若德中具法身也非知下釋成其義動慮分別即能觀觀境非觀智故云不可言説者由有應身方能言説法非應用故亦不可紳者大帶也此方古者以善言書于几杖盤盂紳帶之上使常見之而自誡也論語子張書諸紳即是其事今以貝多黃卷類彼書紳亦非下雙照則可以觀智思文字説也不同灰滅者小乘灰身滅智入無餘者則一向無知知即是智以滅智故今即境而智常寂常照故非不知不同灰滅也不同偏空者小乘偏空離文字而有解脫今無説即説故不同之極佛境界者三諦至極是佛境界由於三觀而得開發凡聖並明者凡謂我心及衆生聖謂諸佛三千三諦二互遍故曰並明此觀照般若也而半滿具足者無説而説稱彼群機世間即人天教出世間即藏通上出世間即別上上出世間即圓文略別教引淨名可知此文字般若也即般若德者雖具足三而觀照當其正體也解脫中初雙非即真性解脫即法身德也喧縛謂生死寂脫謂涅槃惑性本無故五住不能繫四住是分段因無明是變易因舉因收果也法身元寂故十智不能虗十智者世智他心智苦集滅道智法智比智盡智無生智世及他心照俗餘皆照真并如實智名十一智今非空邊故但言十以如實智照中道故故不論也此明解脫中具法身德也非脫下明雙照雖非偏空解脫而中道法身不思議空解脫二邊生死空邊變易生死有邊分段生死也如百下百句雖廣不出斯義此正是解脫德自體也非縛而縛者雖常冥至極而稱物施為故雖非二邊之縛而現二邊之縛為訥鈍邪癡是示為空邊縛小乘不能説大故訥內無大智故鈍偏沈於空故邪無明全在故癡約分真言之則內祕菩薩行外現是聲聞也分真尚爾妙覺可知闡提外道者是示為有邊縛即經云又現邪見相也故有下引證病行則示有二邊煩惱兒行則示為真俗之善住首下只由住中道妙定故能示現二邊善惡善即兒行惡即病行雖鄙必施者施平聲雖二邊鄙惡為調伏機緣必施為被縛如醫下明雖示現繫縛而同塵不染如良醫不染於病如蓮華不著於水故云無染無著此明解脫中具般若德也問般若是智何故明示二邊縛耶答平等大慧常鑒法界由慧鑒故施設二邊故是般若德也名解脫德者總結也雖具三法而以方便解脫當其正體然此三德約其旁正分別雖爾應知三一互融互攝故得一皆具三佛身下攝三業以身對身其義便故故法身攝於身業欲知智在説故般若攝於口業斷惑離縛由於意故故解脫攝於意業此亦約義對當如此若論理體心色一如身口等意不三不一思之易明又大下收諸經般若五陰皆淨只是三德顯相以五即三故迷而為五悟只是三色即法身受想行即解脫識即般若此亦別對若論理體色即是心心空假中從心所起一切諸法皆空假中諸法空假中即心空假中也三諦即三德其旨可知五陰皆淨義在茲也如來莊嚴只是三德所嚴法身能嚴二德六根清淨即如法師功德品所明還是唯心三德相似發相內凡尚爾究竟可知總諸下指廣也般若法華既不出三德故知一代其旨咸然所以諸經不出三德包含總別者總唯三德別出群經攝別入總咸歸三德故曰包含事理者名相事別三德理同指事即理如囊括結一中無量者無量即三舉一而三故云一中無量也餘例可知
